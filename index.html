<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SRXLABS — Security & Compliance Learning Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --paper:#FBF8F2; --paper2:#F3EEE3; --ink:#22262B; --muted:#6B6357;
  --navy:#1F3A5F; --navy2:#2E6DB4; --gold:#B8901F; --gold-soft:#C9A227;
  --line:#E3DCCD; --card:#FFFFFF; --code-bg:#1c2530; --code-fg:#e8eef5;
  --callout:#F1ECE0; --callout-bar:#2E6DB4; --warn:#F7ECDC; --warn-bar:#C9A227;
  --sb:#21304a; --sb-ink:#cdd6e3; --sb-mut:#8a98ad; --sb-active:#fff; --sb-hover:#2b3c59;
  --sel:#1F3A5F;
}
[data-theme="dark"]{
  --paper:#0F141B; --paper2:#161D27; --ink:#E6E9EE; --muted:#9AA4B2;
  --navy:#9CC2F0; --navy2:#7FB0EC; --gold:#E0B84A; --gold-soft:#D8B23E;
  --line:#26303D; --card:#161D27; --code-bg:#0a0e14; --code-fg:#dce6f2;
  --callout:#17202C; --callout-bar:#7FB0EC; --warn:#231C12; --warn-bar:#D8B23E;
  --sb:#0B0F15; --sb-ink:#c3cdda; --sb-mut:#737f90; --sb-active:#fff; --sb-hover:#161d27;
  --sel:#2E6DB4;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:"Newsreader","Iowan Old Style",Georgia,"Times New Roman",serif;
  font-size:18px; line-height:1.68; -webkit-font-smoothing:antialiased;
}
::selection{background:var(--sel); color:#fff}
a{color:var(--navy2); text-decoration:none}

/* ---- layout ---- */
.app{display:grid; grid-template-columns:288px 1fr; min-height:100vh}
.progressbar{position:fixed; top:0; left:0; height:3px; background:var(--gold); width:0; z-index:60; transition:width .15s ease}

/* ---- sidebar ---- */
.sidebar{
  background:var(--sb); color:var(--sb-ink); position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; overflow:hidden; border-right:1px solid rgba(0,0,0,.2)
}
.brand{padding:22px 22px 14px; cursor:pointer}
.brand .logo{font-family:"Fraunces",Georgia,serif; font-weight:700; letter-spacing:.14em; font-size:20px; color:#fff}
.brand .tag{font-size:10.5px; letter-spacing:.22em; color:var(--sb-mut); margin-top:3px; text-transform:uppercase}
.searchwrap{padding:4px 16px 12px}
.search{
  width:100%; background:var(--sb-hover); border:1px solid transparent; color:var(--sb-ink);
  padding:9px 12px; border-radius:9px; font-family:inherit; font-size:14px; outline:none
}
.search:focus{border-color:var(--navy2)}
.search::placeholder{color:var(--sb-mut)}
.nav{flex:1; overflow-y:auto; padding:4px 12px 20px}
.nav::-webkit-scrollbar{width:8px}
.nav::-webkit-scrollbar-thumb{background:var(--sb-hover); border-radius:8px}
.group-label{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--sb-mut); padding:16px 12px 6px}
.navitem{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px;
  cursor:pointer; font-size:14.5px; font-family:"Spline Sans",ui-sans-serif,system-ui,sans-serif;
  color:var(--sb-ink); transition:background .12s
}
.navitem:hover{background:var(--sb-hover)}
.navitem.active{background:var(--navy); color:#fff}
.navitem .num{font-size:11px; color:var(--sb-mut); width:20px; font-variant-numeric:tabular-nums}
.navitem.active .num{color:#cfe0f5}
.navitem .check{margin-left:auto; width:16px; height:16px; border-radius:50%; border:1.5px solid var(--sb-mut); flex:0 0 auto; position:relative}
.navitem.done .check{background:var(--gold); border-color:var(--gold)}
.navitem.done .check::after{content:"✓"; position:absolute; inset:0; font-size:11px; color:#1a1205; display:flex; align-items:center; justify-content:center; font-weight:700}
.sb-foot{padding:12px 18px; border-top:1px solid rgba(255,255,255,.07); font-size:12px; color:var(--sb-mut); display:flex; align-items:center; gap:10px}
.sb-foot .bar{flex:1; height:6px; background:var(--sb-hover); border-radius:6px; overflow:hidden}
.sb-foot .bar > i{display:block; height:100%; background:var(--gold); width:0}

/* ---- main ---- */
.main{display:flex; flex-direction:column; min-width:0}
.topbar{
  position:sticky; top:0; z-index:40; background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:14px; padding:12px 28px
}
.topbar .mtitle{font-family:"Spline Sans",system-ui,sans-serif; font-size:14px; color:var(--muted); font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.topbar .spacer{flex:1}
.iconbtn{
  border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer;
  width:38px; height:34px; border-radius:9px; font-size:15px; display:flex; align-items:center; justify-content:center;
  font-family:"Spline Sans",system-ui,sans-serif
}
.iconbtn:hover{border-color:var(--navy2)}
.readbtn{
  border:1px solid var(--gold); background:transparent; color:var(--gold); cursor:pointer; height:34px; padding:0 14px;
  border-radius:9px; font-size:13px; font-family:"Spline Sans",system-ui,sans-serif; font-weight:600; white-space:nowrap
}
.readbtn.is-done{background:var(--gold); color:#1a1205}
.hamb{display:none}

.scroll{overflow-y:auto; flex:1; scroll-behavior:smooth}
.layout{display:grid; grid-template-columns:1fr 232px; gap:40px; max-width:1180px; margin:0 auto; padding:0 40px}
.content{padding:46px 0 120px; min-width:0; max-width:760px}
.toc{padding:54px 0 60px; position:sticky; top:0; align-self:start; height:max-content}
.toc .tl{font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:12px}
.toc a{display:block; font-size:13px; color:var(--muted); padding:5px 0 5px 14px; border-left:2px solid var(--line); font-family:"Spline Sans",system-ui,sans-serif; line-height:1.4}
.toc a:hover{color:var(--ink)}
.toc a.active{color:var(--navy2); border-left-color:var(--navy2); font-weight:600}

/* ---- content typography ---- */
.doc-head{margin-bottom:34px; padding-bottom:22px; border-bottom:1px solid var(--line)}
.doc-head .kicker{font-family:"Spline Sans",system-ui,sans-serif; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold); font-weight:600}
.doc-head h0,.doc-head .h0{display:block; font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:40px; line-height:1.1; color:var(--ink); margin:10px 0 6px}
.doc-head .sub{color:var(--muted); font-size:19px}
.content h1{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:27px; line-height:1.2; color:var(--ink); margin:42px 0 8px; padding-bottom:8px; border-bottom:2px solid var(--gold); scroll-margin-top:80px}
.content h1:first-of-type{margin-top:6px}
.content h2{font-family:"Spline Sans",system-ui,sans-serif; font-weight:600; font-size:19px; color:var(--navy); margin:30px 0 6px}
.content h3{font-family:"Spline Sans",system-ui,sans-serif; font-weight:600; font-size:16px; color:var(--ink); margin:22px 0 4px}
.content p{margin:0 0 14px}
.content ul,.content ol{margin:6px 0 16px; padding-left:26px}
.content li{margin:0 0 7px}
.content ul li::marker{color:var(--navy2)}
.content ol li::marker{color:var(--navy2); font-weight:600}
.content strong{font-weight:700; color:var(--ink)}
.content em{color:var(--muted)}
code{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.84em; background:var(--paper2); padding:1.5px 6px; border-radius:5px; color:var(--navy)}
[data-theme="dark"] code{color:var(--gold)}
pre.code{background:var(--code-bg); color:var(--code-fg); border-radius:12px; padding:16px 18px; overflow-x:auto; margin:6px 0 18px; border-left:4px solid var(--muted); box-shadow:0 8px 24px -16px rgba(0,0,0,.5)}
pre.code code{font-family:"JetBrains Mono",ui-monospace,monospace; font-size:13.5px; line-height:1.62; background:none; padding:0; color:inherit; white-space:pre}
.callout{background:var(--callout); border-left:4px solid var(--callout-bar); border-radius:10px; padding:16px 20px; margin:6px 0 20px}
.callout.warn{background:var(--warn); border-left-color:var(--warn-bar)}
.callout-title{font-family:"Spline Sans",system-ui,sans-serif; font-weight:700; font-size:14px; color:var(--navy); letter-spacing:.01em; margin-bottom:7px; text-transform:uppercase}
.callout.warn .callout-title{color:var(--gold)}
.callout p{margin:0 0 8px; font-size:16.5px}
.callout p:last-child{margin:0}
.tbl-wrap{overflow-x:auto; margin:6px 0 20px; border:1px solid var(--line); border-radius:12px}
table{border-collapse:collapse; width:100%; font-family:"Spline Sans",system-ui,sans-serif; font-size:14px}
thead th{background:var(--navy); color:#fff; text-align:left; padding:10px 14px; font-weight:600}
[data-theme="dark"] thead th{color:#0b1118}
tbody td{padding:9px 14px; border-top:1px solid var(--line); vertical-align:top; color:var(--ink)}
tbody tr:nth-child(even){background:color-mix(in srgb, var(--navy) 5%, transparent)}
hr{border:none; border-top:1px solid var(--line); margin:24px 0}

/* ---- nav buttons ---- */
.pager{display:flex; gap:14px; margin-top:50px; padding-top:24px; border-top:1px solid var(--line)}
.pager button{flex:1; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; cursor:pointer; color:var(--ink); font-family:inherit}
.pager button:hover{border-color:var(--navy2)}
.pager .pl{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-family:"Spline Sans",system-ui,sans-serif}
.pager .pt{font-family:"Fraunces",Georgia,serif; font-size:17px; color:var(--ink); margin-top:3px}
.pager button.next{text-align:right}
.pager button:disabled{opacity:.35; cursor:default}

/* ---- home ---- */
.home{max-width:1100px; margin:0 auto; padding:60px 40px 100px}
.home .hero .kick{font-family:"Spline Sans",system-ui,sans-serif; font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); font-weight:600}
.home .hero h1{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:48px; line-height:1.05; margin:12px 0 10px; border:none; padding:0; color:var(--ink)}
.home .hero p{font-size:19px; color:var(--muted); max-width:640px}
.cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:18px; margin-top:38px}
.card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; cursor:pointer; transition:transform .14s, border-color .14s, box-shadow .14s; position:relative; overflow:hidden}
.card:hover{transform:translateY(-3px); border-color:var(--navy2); box-shadow:0 18px 40px -26px rgba(31,58,95,.6)}
.card .cnum{font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--gold); font-weight:600}
.card h3{font-family:"Fraunces",Georgia,serif; font-weight:600; font-size:20px; margin:8px 0 6px; color:var(--ink)}
.card p{font-size:14px; color:var(--muted); margin:0; font-family:"Spline Sans",system-ui,sans-serif; line-height:1.5}
.card .cdone{position:absolute; top:14px; right:14px; width:18px; height:18px; border-radius:50%; background:var(--gold); display:none; align-items:center; justify-content:center; font-size:11px; color:#1a1205; font-weight:700}
.card.done .cdone{display:flex}
.grouphdr{font-family:"Spline Sans",system-ui,sans-serif; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:42px 0 4px; font-weight:600}

mark{background:var(--gold-soft); color:#1a1205; border-radius:3px; padding:0 2px}

/* ---- responsive ---- */
@media (max-width:1120px){ .layout{grid-template-columns:1fr} .toc{display:none} }
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed; z-index:70; width:300px; transform:translateX(-100%); transition:transform .22s}
  .app.nav-open .sidebar{transform:none}
  .hamb{display:flex}
  .scrim{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:65; display:none}
  .app.nav-open .scrim{display:block}
  .layout,.home{padding-left:22px; padding-right:22px}
  .content{padding-top:30px}
  .doc-head .h0{font-size:32px}
  .home .hero h1{font-size:34px}
}

</style>
</head>

<script>
const DATA = [{"id":"00","navTitle":"Study Plan","title":"Study Plan","subtitle":"Day-by-Day Roadmap for the Full Series","html":"<h1 id=\"sec1\">1. How to Use This Plan</h1><p><strong>This is a 35-day accelerated track</strong> covering all eleven modules at <strong>1.5 hours per day</strong>. It is sequenced so each topic builds on the last: the compliance/GRC foundation first (because every later module plugs into it), then the offensive/technical track. Study 6 days a week and keep the 7th as a flex/catch-up day, and you finish the full series in about six weeks.</p><h2>1.1 The daily 90-minute structure</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Block</th><th>Time</th><th>What you do</th></tr></thead><tbody><tr><td>Theory</td><td>~50 min</td><td>Read the day's sections; highlight; note questions</td></tr><tr><td>Practice / apply</td><td>~30 min</td><td>Do the day's task (lab, template, or worked example)</td></tr><tr><td>Recall &amp; review</td><td>~10 min</td><td>Answer the self-test; jot what to revisit tomorrow</td></tr></tbody></table></div><div class=\"callout info\"><div class=\"callout-title\">Three rules that make this stick</div><p>1. End every session by writing 3 things you learned from memory — active recall beats re-reading. 2. Don't skip the practice block; for technical modules, hands-on is where it lands. 3. Each module ends with a self-test — if you can't pass it, add a review day before moving on rather than rushing.</p></div><h2>1.2 The two phases</h2><ul><li><strong>Phase 1 — Compliance &amp; GRC (Days 1–16): </strong>Modules 1–6. Reading-heavy; the foundation for your consulting work and audits.</li><li><strong>Phase 2 — Offensive &amp; Technical (Days 17–35): </strong>Modules 7–11. Hands-on; needs a lab (a spare laptop, Kali VM, and free practice platforms).</li></ul><h1 id=\"sec2\">2. Phase 1 — Compliance &amp; GRC (Days 1–16)</h1><div class=\"tbl-wrap\"><table><thead><tr><th>Day</th><th>Module &amp; focus</th><th>Practice task</th></tr></thead><tbody><tr><td>1</td><td>GRC §1–2: meaning of GRC, governance, Three Lines</td><td>Write your own one-line definition of G, R, and C</td></tr><tr><td>2</td><td>GRC §3: risk vocabulary, lifecycle, treatment options</td><td>Draft a 5-row risk register for SRXLABS</td></tr><tr><td>3</td><td>GRC §3.5–4: quantitative risk (ALE), NIST CSF 2.0</td><td>Calculate ALE for a laptop-theft scenario</td></tr><tr><td>4</td><td>GRC §5: audit types, lifecycle, design vs operating</td><td>Map the audit lifecycle to a mock engagement</td></tr><tr><td>5</td><td>GRC §6–7: building a program, KPIs/KRIs, pitfalls + self-test</td><td>Pass the GRC self-test; list 3 KRIs</td></tr><tr><td>6</td><td>ISO 27001 §1–2: standard, 2022 changes, clauses 4–10</td><td>Write a 1-line ISMS scope statement</td></tr><tr><td>7</td><td>ISO 27001 §3: Annex A themes, the 11 new controls</td><td>Map one risk to 3 Annex A controls</td></tr><tr><td>8</td><td>ISO 27001 §4–5: implementation plan, SoA, certification</td><td>Draft a mini Statement of Applicability (10 controls)</td></tr><tr><td>9</td><td>ISO 27001 §6 + self-test</td><td>Pass the ISO self-test; note IMS overlaps</td></tr><tr><td>10</td><td>SOC 2 §1–3: TSC, Common Criteria, Type I vs II</td><td>Choose TSC categories for a sample SaaS</td></tr><tr><td>11</td><td>SOC 2 §4–6: report anatomy, readiness, case study + self-test</td><td>Pass the SOC 2 self-test</td></tr><tr><td>12</td><td>GDPR §1–3: principles, lawful bases, rights</td><td>Pick a lawful basis for 4 processing activities</td></tr><tr><td>13</td><td>GDPR §4–6: accountability, transfers, breaches + self-test</td><td>Draft a 72-hour breach-notification checklist</td></tr><tr><td>14</td><td>DPDPA §1–4: roles, consent, legitimate uses, children</td><td>Map DPDPA roles to GDPR equivalents</td></tr><tr><td>15</td><td>DPDPA §5–6: rights, Board, transfers, workflow + self-test</td><td>Draft a DPDPA readiness checklist for a client</td></tr><tr><td>16</td><td>FERPA (full) + self-test</td><td>Write the 'school official' conditions from memory</td></tr></tbody></table></div><div class=\"callout info\"><div class=\"callout-title\">End of Phase 1 milestone</div><p>You can now run a risk assessment, scope an ISMS, explain SOC 2 to a buyer, and advise on GDPR/DPDPA/FERPA. Reward: assemble a one-page “SRXLABS compliance services” sheet from what you learned — it doubles as revision and marketing.</p></div><h1 id=\"sec3\">3. Phase 2 — Offensive &amp; Technical (Days 17–35)</h1><div class=\"callout warn\"><div class=\"callout-title\">Set up your lab first (Day 17, before anything else)</div><p>Install a Kali Linux VM, sign up for free accounts on TryHackMe and PortSwigger Web Security Academy, and bookmark HackTheBox. For Phase-2 modules, the practice task assumes this lab exists. Spend the first session getting it working.</p></div><div class=\"tbl-wrap\"><table><thead><tr><th>Day</th><th>Module &amp; focus</th><th>Practice task (hands-on)</th></tr></thead><tbody><tr><td>17</td><td>Lab setup + VAPT §1–2: VA vs PT, lifecycle, methodologies</td><td>Get Kali + TryHackMe working; read PTES phases</td></tr><tr><td>18</td><td>VAPT §3: recon &amp; enumeration</td><td>Run nmap + a subdomain tool on a TryHackMe box</td></tr><tr><td>19</td><td>VAPT §4: OWASP Top 10, SQLi &amp; XSS</td><td>Complete PortSwigger SQLi + XSS intro labs</td></tr><tr><td>20</td><td>VAPT §5: exploitation, AD, CVSS</td><td>Do a guided Metasploit room; score a finding with CVSS</td></tr><tr><td>21</td><td>VAPT §6: reporting, legal, certs + self-test</td><td>Write a 1-page finding report (desc/PoC/CVSS/fix)</td></tr><tr><td>22</td><td>OT/ICS §1–2: IT vs OT (AIC), Purdue model</td><td>Sketch the Purdue model from memory</td></tr><tr><td>23</td><td>OT/ICS §3–4: protocols, Stuxnet/TRITON, kill chain</td><td>Read a Modbus capture in Wireshark (sample pcap)</td></tr><tr><td>24</td><td>OT/ICS §5–6: safe assessment, defences, IEC 62443 + self-test</td><td>List the 5 SANS ICS controls; pass self-test</td></tr><tr><td>25</td><td>IoT §1–2: attack surface, hardware hacking, UART</td><td>Identify UART/JTAG on a teardown photo/datasheet</td></tr><tr><td>26</td><td>IoT §3: firmware extraction &amp; analysis</td><td>binwalk + grep a sample firmware image for secrets</td></tr><tr><td>27</td><td>IoT §4: radio &amp; SDR</td><td>Watch/replay a captured signal in URH (sample file)</td></tr><tr><td>28</td><td>IoT §5–6: app/API/cloud, OWASP IoT Top 10 + self-test</td><td>Probe a test MQTT broker; pass self-test</td></tr><tr><td>29</td><td>Cloud §1–2: shared responsibility, IAM, escalation</td><td>Read an over-permissive IAM policy and spot the risk</td></tr><tr><td>30</td><td>Cloud §3: AWS/Azure/GCP essentials, SSRF→IMDS</td><td>Start the flAWS.cloud challenge (levels 1–2)</td></tr><tr><td>31</td><td>Cloud §4–5: methodology, containers, K8s</td><td>Run ScoutSuite/Prowler on a personal AWS sandbox</td></tr><tr><td>32</td><td>Cloud §6: defences, CIS, CSPM + self-test</td><td>Finish a CloudGoat scenario; pass self-test</td></tr><tr><td>33</td><td>AI/LLM §1–3: surface, OWASP LLM Top 10, prompt injection</td><td>Beat several Gandalf (Lakera) levels</td></tr><tr><td>34</td><td>AI/LLM §4–5: adversarial ML, model attacks, methodology</td><td>Run Garak against a test LLM endpoint</td></tr><tr><td>35</td><td>AI/LLM §6: defences, governance + self-test + final review</td><td>Pass self-test; review all 11 self-tests</td></tr></tbody></table></div><div class=\"callout info\"><div class=\"callout-title\">End of Phase 2 milestone</div><p>You can scope and run web, OT, IoT, cloud, and AI assessments and write a professional report. Combine with Phase 1 and SRXLABS can offer the full sweep: GRC + audit + VAPT + OT/IoT + cloud + AI red teaming.</p></div><h1 id=\"sec4\">4. Faster &amp; Slower Variants</h1><h2>4.1 If you want it even faster (compress to ~24 days)</h2><ul><li><strong>Double up reading days </strong>on the compliance modules (they're conceptual) — e.g. cover a whole short module like FERPA or SOC 2 in one 1.5-hr session of focused reading + self-test.</li><li><strong>Keep the technical modules at full pace </strong>— don't compress hands-on practice; that's where real skill forms.</li><li><strong>Add a second 1.5-hr session </strong>on weekends to claw back days.</li></ul><h2>4.2 If 90 minutes feels rushed (extend to ~50 days)</h2><ul><li>Split any day marked with two section ranges across two days.</li><li>Add a dedicated lab day after each technical module to redo the practice unaided.</li></ul><h2>4.3 Tracking your progress</h2><p>Keep a simple log: date, day number, module/sections, self-test result (pass/revisit), and one sentence on what clicked. Reviewing this log weekly is the single highest-leverage habit for retention.</p><div class=\"callout info\"><div class=\"callout-title\">Order rationale</div><p>Compliance first is deliberate: GRC gives you the risk and control vocabulary that the technical modules assume, and the frameworks (ISO/SOC 2) reappear as the 'defence' sections of the cloud and AI modules. Learning to attack is far more meaningful once you know what 'good' looks like.</p></div>","sections":[{"id":"sec1","title":"1. How to Use This Plan"},{"id":"sec2","title":"2. Phase 1 — Compliance & GRC (Days 1–16)"},{"id":"sec3","title":"3. Phase 2 — Offensive & Technical (Days 17–35)"},{"id":"sec4","title":"4. Faster & Slower Variants"}]},{"id":"01","navTitle":"GRC & Audit","title":"GRC & Audit Fundamentals","subtitle":"Governance, Risk, Compliance & Auditing","html":"<h1 id=\"sec1\">1. Introduction — What GRC Is and Why It Exists</h1><p><strong>Governance, Risk, and Compliance (GRC)</strong> is the integrated discipline through which an organisation directs itself toward its objectives (governance), manages the uncertainty that threatens those objectives (risk), and conforms to the obligations placed upon it (compliance). The word that matters most is <strong>integrated</strong>. Run separately, these three functions duplicate work, contradict each other, and leave gaps; run as one operating model, each strengthens the others. The auditor sits outside all three and independently confirms that the system actually works.</p><p>Before GRC emerged as a named discipline, large organisations ran governance in the boardroom, risk in a treasury or insurance function, and compliance in legal — three silos that rarely shared a vocabulary. A risk the security team tracked might never reach the board; a control the compliance team relied on might have quietly stopped working. The 2000s wave of corporate scandals and the regulation that followed (Sarbanes-Oxley in the US, Basel in banking, and later GDPR and India's DPDPA) forced these silos together: regulators began demanding evidence that leadership knew its risks and could prove its controls. GRC is the response — a single chain of accountability from the boardroom to the engineer operating a control.</p><div class=\"callout info\"><div class=\"callout-title\">The mental model to carry through this entire series</div><p><strong>Objective → Risk → Control → Evidence → Assurance.</strong> You have a business objective. Risks threaten it. Controls reduce those risks. Evidence proves the controls operate. Assurance (audit) independently confirms the evidence. Every framework you will study — ISO 27001, SOC 2, GDPR, DPDPA — is a different vocabulary laid over this same five-link chain. If a control links to no objective or risk, it is waste; cut it. If a control produces no evidence, it will fail every audit, no matter how well intentioned.</p></div><h2>1.1 GRC versus ERM versus IRM — precise distinctions</h2><p>These terms are used loosely in the market, and using them loosely in front of a client signals inexperience. Learn the distinctions exactly.</p><ul><li><strong>GRC </strong>is the day-to-day integrated operating model spanning governance, risk, and compliance. It is broad and operational.</li><li><strong>ERM (Enterprise Risk Management) </strong>is the firm-wide view of ALL risk categories — strategic, financial, operational, hazard, and cyber — considered together so leadership can make portfolio-level decisions. The reference frameworks are COSO ERM (2017) and ISO 31000 (2018). Information-security risk is one slice of ERM.</li><li><strong>IRM (Integrated Risk Management) </strong>is Gartner's evolution of the GRC label, stressing technology-enabled, near-real-time, risk-aware decision-making rather than periodic compliance checklists.</li></ul><p><strong>How they nest: </strong>ERM is the widest lens (all enterprise risk). GRC is the operating model that makes governance, risk, and compliance work together. When you implement ISO 27001 you are performing ERM scoped to information security, executed through a GRC operating model, and proven through audit. Holding these relationships in your head lets you place any client request in the right layer.</p><h2>1.2 The OCEG GRC Capability Model and “principled performance”</h2><p>OCEG (the body that coined “GRC”) frames the goal as </p><p><strong>“principled performance” </strong>— reliably achieving objectives while addressing uncertainty and acting with integrity. Its Capability Model organises GRC into four components you will recognise as a continuous loop:</p><ol><li><strong>LEARN </strong>— understand the context, culture, stakeholders, and objectives.</li><li><strong>ALIGN </strong>— set strategy, objectives, and risk appetite; align actions and resources to them.</li><li><strong>PERFORM </strong>— implement controls, run operations, and respond to events.</li><li><strong>REVIEW </strong>— monitor, audit, and improve.</li></ol><p>If that loop looks like Plan-Do-Check-Act, it is — every management-system standard in this series runs on the same engine of continual improvement.</p><h2>1.3 The business case — why organisations fund GRC</h2><p>A practitioner must be able to justify GRC in the language of the business, not of auditors. The arguments that win budget:</p><ul><li><strong>Avoided loss: </strong>fewer and smaller incidents, breaches, fines, and outages — quantifiable with the risk-quantification methods in Section 4.</li><li><strong>Revenue enablement: </strong>certifications and attestations (ISO 27001, SOC 2) are gate-keepers to enterprise and government contracts. GRC directly unlocks deals.</li><li><strong>Efficiency: </strong>one control mapped to many frameworks eliminates duplicated effort across audits.</li><li><strong>Defensibility: </strong>when something goes wrong, documented governance and risk decisions limit legal liability and reputational damage — “we assessed this risk and treated it reasonably” is a defence; silence is not.</li><li><strong>Better decisions: </strong>leadership steering with a clear, current view of risk makes faster, safer strategic choices.</li></ul><h2>1.4 The GRC maturity model</h2><p>Use this to position any client and to set a realistic improvement target. Maturity is not about buying tools; it is about how repeatable and measured the organisation's behaviour is.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Level</th><th>Name</th><th>Characteristics</th><th>Typical signs</th></tr></thead><tbody><tr><td>1</td><td>Initial / Ad hoc</td><td>Reactive, undocumented, person-dependent</td><td>Spreadsheets, firefighting, no owner</td></tr><tr><td>2</td><td>Managed</td><td>Some policies exist; execution inconsistent</td><td>Policies written but not followed</td></tr><tr><td>3</td><td>Defined</td><td>Documented, repeatable processes org-wide</td><td>Standard procedures, named owners</td></tr><tr><td>4</td><td>Quantitatively managed</td><td>Metrics-driven; risk measured in numbers</td><td>KRIs, dashboards, trend analysis</td></tr><tr><td>5</td><td>Optimising</td><td>Continuous improvement; risk informs strategy</td><td>Risk-adjusted decisions at board level</td></tr></tbody></table></div><p><strong>Practical use: </strong>most SMEs sit at Level 1–2. A realistic first engagement moves them to a solid Level 3 (documented, repeatable, owned). Chasing Level 5 prematurely wastes money — target the maturity the business risk justifies.</p><h1 id=\"sec2\">2. Governance in Depth</h1><p>Governance is the system of direction and oversight: it answers who decides, who is accountable, how much risk the organisation will accept, and how performance against objectives is measured. Without governance, risk and compliance work has no authority and no consistency — controls drift, exceptions multiply, and no one owns the outcome.</p><h2>2.1 Corporate governance principles</h2><p>Modern governance rests on a few principles that recur in every code (the UK Corporate Governance Code, OECD principles, India's Companies Act and SEBI LODR):</p><ul><li><strong>Accountability </strong>— every objective, risk, and control has a single named owner. “The team” is not an owner.</li><li><strong>Transparency </strong>— decisions, risks, and performance are visible to those who need them, including the board.</li><li><strong>Responsibility </strong>— roles and authorities are defined; people act within them.</li><li><strong>Fairness </strong>— stakeholders' interests are balanced.</li><li><strong>Independence </strong>— oversight (audit, risk) is structurally separate from the operations it oversees.</li></ul><h2>2.2 Governance structures — who sits where and does what</h2><p>You must be able to describe a governance structure to a board and to draw the reporting lines. The bodies and their cadence:</p><div class=\"tbl-wrap\"><table><thead><tr><th>Body / role</th><th>Responsibility in GRC</th><th>Reports to</th><th>Cadence</th></tr></thead><tbody><tr><td>Board of Directors</td><td>Ultimate accountability; approves risk appetite &amp; strategy</td><td>Shareholders</td><td>Quarterly</td></tr><tr><td>Audit Committee</td><td>Oversees internal &amp; external audit, controls, financial integrity</td><td>Board</td><td>Quarterly</td></tr><tr><td>Risk Committee</td><td>Owns risk framework; reviews appetite breaches</td><td>Board</td><td>Monthly/Qtr</td></tr><tr><td>CEO / Executive</td><td>Sets tone; resources the program</td><td>Board</td><td>Continuous</td></tr><tr><td>CISO</td><td>Runs information-security risk &amp; controls</td><td>CEO/CIO/CRO</td><td>Continuous</td></tr><tr><td>CRO</td><td>Owns enterprise risk framework (2nd line)</td><td>CEO/Board</td><td>Continuous</td></tr><tr><td>DPO</td><td>Privacy compliance &amp; advice (independent)</td><td>Top mgmt</td><td>Continuous</td></tr><tr><td>Control owners</td><td>Operate &amp; evidence specific controls (1st line)</td><td>Line mgmt</td><td>Daily/Weekly</td></tr></tbody></table></div><p><strong>Why the committee structure matters: </strong>the audit committee exists so that internal audit can report bad news about management without management filtering it. If internal audit reports to the CFO it audits, its independence is compromised — a governance defect an external assessor will flag.</p><h2>2.3 The policy management lifecycle</h2><p>Policy is how governance intent becomes binding rules. A mature organisation manages policy as a lifecycle, not a one-time drafting exercise:</p><ol><li><strong>Develop </strong>— draft against a requirement (a risk, a law, a framework control).</li><li><strong>Review </strong>— stakeholders (legal, IT, HR) comment.</li><li><strong>Approve </strong>— the appropriate authority signs and dates it.</li><li><strong>Communicate </strong>— publish; require acknowledgement; train.</li><li><strong>Enforce </strong>— controls and consequences make it real.</li><li><strong>Review &amp; retire </strong>— re-approve on a schedule (usually annually); retire when obsolete.</li></ol><h3>The document hierarchy, with worked examples</h3><ul><li><strong>Policy </strong>— high-level intent, board-approved, stable. Example: “SRXLABS protects the confidentiality, integrity, and availability of all information assets.”</li><li><strong>Standard </strong>— mandatory, measurable rule that enforces the policy. Example: “All user accounts with access to production must use phishing-resistant multi-factor authentication.”</li><li><strong>Procedure </strong>— the exact, repeatable steps. Example: “To grant production access: (1) raise a ticket; (2) line-manager approves; (3) IT provisions least-privilege role; (4) access auto-expires after 90 days.”</li><li><strong>Guideline / baseline </strong>— recommended practice or hardening config (e.g., the CIS benchmark for a given OS). Not mandatory but advisory.</li></ul><div class=\"callout warn\"><div class=\"callout-title\">The single most common audit failure</div><p>A beautifully written policy that nobody follows because no procedure operationalises it and no evidence accumulates. A policy without a procedure and records is a “paper control” — it fails the audit on operating effectiveness. Every policy you write must be paired with a procedure and a defined place where evidence is generated automatically (a ticket queue, a log, a report).</p></div><h2>2.4 Segregation of Duties (SoD)</h2><p>SoD splits a sensitive process so that no single person can complete it alone, preventing both error and fraud. The classic example is payments: the person who creates a vendor must not be the person who approves payment to it; otherwise they can invent a fake vendor and pay themselves. In IT, the developer who writes code should not be the one who approves and deploys it to production unchecked.</p><ul><li><strong>Detect SoD conflicts </strong>by building an access-vs-duties matrix and flagging any individual holding two conflicting capabilities.</li><li><strong>When SoD is impractical </strong>(a 5-person company), use a compensating control: independent after-the-fact review of the sensitive actions, logged and signed.</li></ul><h2>2.5 Risk appetite, tolerance, and capacity — a distinction clients always blur</h2><ul><li><strong>Risk appetite </strong>— the amount and type of risk the organisation is willing to pursue to meet objectives, stated broadly. Example: “We will accept moderate availability risk to ship quickly, but near-zero risk to customer-data confidentiality.”</li><li><strong>Risk tolerance </strong>— the acceptable variation around a specific objective, stated measurably. Example: “Unplanned downtime must not exceed 4 hours per quarter.”</li><li><strong>Risk capacity </strong>— the maximum risk the organisation could absorb before it fails (a hard ceiling set by finances/regulation). Appetite should always sit below capacity.</li></ul><div class=\"callout info\"><div class=\"callout-title\">A usable risk appetite statement (copy the shape)</div><p>“SRXLABS will not accept any residual risk rated High (≥13 on a 5×5 scale) affecting customer data. Medium residual risks (7–12) require a documented, time-bound treatment plan owned by a named manager. Low residual risks (≤6) may be formally accepted by the relevant control owner. Any breach of these limits is escalated to the Risk Committee within 5 business days.” That single paragraph drives every treatment decision in the risk register.</p></div><h2>2.6 The Three Lines Model (IIA, 2020 update)</h2><p>This is the governance model every auditor expects you to know cold. It separates who owns risk from who oversees it from who independently assures it. The 2020 update renamed it from “Three Lines of Defence” to “The Three Lines Model” and stressed collaboration over rigid walls.</p><ul><li><strong>First line — own and manage risk: </strong>operational management and staff who run the processes and operate the controls directly (the engineers, the ops team, the developers).</li><li><strong>Second line — oversee and advise: </strong>risk and compliance functions that set the frameworks, provide expertise, monitor, and challenge the first line (the GRC team, CISO, CRO, DPO).</li><li><strong>Third line — independent assurance: </strong>internal audit, structurally independent of the first two, reporting to the audit committee/board, giving objective assurance that the whole system works.</li></ul><p><strong>Worked example (a bank): </strong>loan officers approve loans within policy (1st line); the credit-risk function sets the limits and monitors adherence (2nd line); internal audit periodically tests whether the limits were actually respected and reports findings to the audit committee — not to the lending head it just audited (3rd line). The independence of the third line is what makes its assurance credible.</p><h2>2.7 Governance frameworks worth naming</h2><ul><li><strong>COBIT (ISACA) </strong>— governance and management of enterprise IT; separates governance (EDM: Evaluate, Direct, Monitor) from management. Common in IT-audit contexts.</li><li><strong>ISO/IEC 38500 </strong>— corporate governance of IT (principles for the board).</li><li><strong>COSO Internal Control – Integrated Framework </strong>— the five-component model (control environment, risk assessment, control activities, information &amp; communication, monitoring) that underpins SOX and SOC 2's Common Criteria.</li></ul><h1 id=\"sec3\">3. Risk Management — Concepts and Frameworks</h1><p>Risk management is the disciplined process of finding what could stop you achieving your objectives, deciding how much of that uncertainty you will tolerate, and treating the rest. It is the analytical heart of GRC: governance sets the appetite, compliance is one source of risk, and audit checks that risks were handled — but risk management is where the actual thinking happens.</p><h2>3.1 The vocabulary, defined precisely</h2><p>Imprecise language here causes real errors. A vulnerability is not a risk; a threat is not a risk. Risk is the combination of a threat exploiting a vulnerability, expressed as likelihood times impact.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Term</th><th>Precise definition</th><th>Worked example</th></tr></thead><tbody><tr><td>Asset</td><td>Something of value to protect</td><td>Customer database</td></tr><tr><td>Threat</td><td>A potential cause of an unwanted event</td><td>Ransomware operator</td></tr><tr><td>Threat actor</td><td>The entity behind the threat</td><td>Organised crime group</td></tr><tr><td>Vulnerability</td><td>A weakness a threat can exploit</td><td>Unpatched VPN (CVE)</td></tr><tr><td>Likelihood</td><td>Probability over a defined period</td><td>0.4 events/year</td></tr><tr><td>Impact</td><td>Magnitude of loss if it occurs</td><td>₹5 cr + 3-day outage</td></tr><tr><td>Risk</td><td>Likelihood × impact of a threat-vuln pair</td><td>Probable data breach via VPN</td></tr><tr><td>Inherent risk</td><td>Risk before any controls</td><td>5 × 5 = 25</td></tr><tr><td>Residual risk</td><td>Risk remaining after controls</td><td>2 × 4 = 8</td></tr><tr><td>Control</td><td>A measure that reduces risk</td><td>Patch + MFA + monitoring</td></tr></tbody></table></div><h2>3.2 ISO 31000:2018 — the international risk-management standard</h2><p>ISO 31000 is principles-based and applies to any risk, not just cyber. It has three parts you should be able to recite: principles, framework, and process.</p><h3>Principles (the 8 that make risk management effective)</h3><p>Risk management should be integrated, structured &amp; comprehensive, customised to context, inclusive of stakeholders, dynamic (responsive to change), based on the best available information, account for human and cultural factors, and be continually improved. The single most important is that it must create and protect value — risk management that doesn't help the organisation achieve objectives is bureaucracy.</p><h3>Framework (the organisational scaffolding)</h3><p>Leadership and commitment sit at the centre, surrounded by a cycle of integration, design, implementation, evaluation, and improvement of the risk-management arrangements. This is the governance wrapper that makes the process actually run.</p><h3>Process (the operational steps — these are what you execute)</h3><ol><li><strong>Communication &amp; consultation </strong>— ongoing with stakeholders throughout (not a phase, a constant).</li><li><strong>Scope, context &amp; criteria </strong>— define what's in scope, the internal/external context, and the criteria for evaluating risk.</li><li><strong>Risk identification </strong>— find the risks.</li><li><strong>Risk analysis </strong>— understand likelihood and consequence.</li><li><strong>Risk evaluation </strong>— compare against criteria/appetite and prioritise.</li><li><strong>Risk treatment </strong>— select and implement responses.</li><li><strong>Monitoring &amp; review + recording &amp; reporting </strong>— the steps beginners skip; risk is a living thing.</li></ol><h2>3.3 COSO ERM (2017) — the enterprise lens</h2><p>Where ISO 31000 is a lean process, COSO ERM ties risk explicitly to strategy and performance. It organises enterprise risk management into five interrelated components (with 20 underlying principles):</p><ul><li><strong>Governance &amp; culture </strong>— the board's risk oversight and the organisation's risk culture and values.</li><li><strong>Strategy &amp; objective-setting </strong>— risk appetite is set here and woven into strategy; you consider risk when choosing objectives.</li><li><strong>Performance </strong>— identify, assess, prioritise, and respond to risks that affect achieving objectives.</li><li><strong>Review &amp; revision </strong>— assess how the ERM components are functioning and revise.</li><li><strong>Information, communication &amp; reporting </strong>— the connective tissue across all components.</li></ul><p><strong>ISO 31000 vs COSO ERM: </strong>ISO 31000 is concise, flexible, and applies to any risk — good for an operational risk programme. COSO ERM is heavier and strategy-centric — favoured by US-listed companies and finance functions. Many organisations use ISO 31000 for the process and borrow COSO's strategy linkage. Know both names and their flavour.</p><h1 id=\"sec4\">4. The Risk Process, Step by Step</h1><h2>4.1 Risk identification techniques</h2><p>You cannot treat a risk you never found. Mature programmes use several complementary techniques rather than relying on one workshop:</p><ul><li><strong>Asset-based: </strong>list assets, then ask what threatens each (good for ISO 27001).</li><li><strong>Scenario-based: </strong>imagine concrete adverse scenarios (“key engineer leaves and takes source code”) and work backwards.</li><li><strong>Threat-intelligence-driven: </strong>use external feeds and MITRE ATT&amp;CK to identify realistic attacker behaviours.</li><li><strong>Brainstorming &amp; Delphi: </strong>structured group elicitation; Delphi anonymises expert input across rounds to avoid groupthink.</li><li><strong>Checklists &amp; taxonomies: </strong>drive completeness against a known risk catalogue.</li><li><strong>FMEA (Failure Mode &amp; Effects Analysis): </strong>systematically examine how each component can fail and the effect — borrowed from engineering.</li><li><strong>Bow-tie analysis: </strong>map a central risk event to its causes (left) and consequences (right), with preventive controls on the left and mitigative controls on the right — excellent for communicating to executives.</li></ul><h2>4.2 Risk analysis — qualitative</h2><p>The starting point for most organisations. Rate likelihood and impact on defined scales (commonly 1–5), multiply, and plot on a heat map. The discipline is in defining the scales precisely so two assessors agree.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Likelihood scale</th><th>Meaning</th><th>Impact scale</th><th>Meaning</th></tr></thead><tbody><tr><td>1 Rare</td><td>&lt; once in 5 yrs</td><td>1 Insignificant</td><td>&lt; ₹1 L</td></tr><tr><td>2 Unlikely</td><td>Once in 2–5 yrs</td><td>2 Minor</td><td>₹1–10 L</td></tr><tr><td>3 Possible</td><td>Once a year</td><td>3 Moderate</td><td>₹10–50 L</td></tr><tr><td>4 Likely</td><td>Few times a year</td><td>4 Major</td><td>₹50 L–5 cr</td></tr><tr><td>5 Almost certain</td><td>Monthly+</td><td>5 Severe</td><td>&gt; ₹5 cr</td></tr></tbody></table></div><p><strong>Score bands: </strong>1–6 Low (green, accept/monitor); 7–12 Medium (amber, treat on a plan); 13–25 High (red, treat urgently and escalate). Always define the scales in the document so the heat map is reproducible, not subjective.</p><h2>4.3 Risk analysis — quantitative (the advanced layer that wins budget)</h2><p>Qualitative “high/medium/low” cannot answer “how much should we spend?” Quantitative methods express risk in money, which boards understand. Learn both the classic SLE/ALE method and the modern FAIR model.</p><h3>Classic method: SLE, ARO, ALE</h3><pre class=\"code\"><code>SLE (Single Loss Expectancy) = Asset Value (AV) × Exposure Factor (EF)\nALE (Annualised Loss Expectancy) = SLE × ARO (Annual Rate of Occurrence)\n\nExample — laptop theft:\n  AV (device + data) = ₹2,00,000   EF = 0.6 (60% loss if it happens)\n  SLE = 2,00,000 × 0.6 = ₹1,20,000\n  ARO = 0.5 (one theft every two years)\n  ALE = 1,20,000 × 0.5 = ₹60,000 per year\n\nDecision: full-disk encryption + tracking @ ₹15,000/yr is justified\nbecause the control costs far less than the ₹60,000 annual exposure.</code></pre><h3>Modern method: FAIR (Factor Analysis of Information Risk)</h3><p>FAIR decomposes risk into measurable factors so you can defend the numbers. Risk = Loss Event Frequency (LEF) × Loss Magnitude (LM). LEF itself = Threat Event Frequency (TEF) × Vulnerability (the probability an attempt succeeds). Loss Magnitude splits into Primary Loss (direct) and Secondary Loss (fines, reputation, response).</p><pre class=\"code\"><code>Scenario: phishing -&gt; business email compromise -&gt; fraudulent wire.\n  Threat Event Frequency (TEF)  = 12 attempts/year\n  Vulnerability (success rate)  = 0.10\n  LEF = 12 × 0.10 = 1.2 events/year\n  Primary Loss   = ₹8,00,000 (the wire)\n  Secondary Loss = ₹2,00,000 (response, legal, reputation)\n  Loss Magnitude = ₹10,00,000\n  ALE = LEF × LM = 1.2 × 10,00,000 = ₹12,00,000/year\n\nAdd MFA + payment call-back verification (₹1,50,000/yr):\n  New Vulnerability = 0.02 -&gt; LEF = 0.24 -&gt; ALE = ₹2,40,000/year\n  Risk reduced by ₹9,60,000 for ₹1,50,000 -&gt; fund it.</code></pre><h3>Monte Carlo &amp; Value at Risk — for mature programmes</h3><p>Single point estimates hide uncertainty. Instead, model TEF, Vulnerability, and Loss as ranges (e.g., PERT or triangular distributions with min/most-likely/max), then simulate 10,000+ iterations. The output is a loss-exceedance curve: “there is a 10% chance annual loss exceeds ₹50 lakh.” That 90th-percentile figure is your cyber Value at Risk — exactly the language a CFO uses for financial risk. Tools: open FAIR-U training material, RiskLens-style platforms, or a spreadsheet with a Monte Carlo add-in.</p><div class=\"callout info\"><div class=\"callout-title\">Why quantification is the senior-consultant skill</div><p>Anyone can label phishing “High risk.” Saying “this ₹1.5 L control returns ₹9.6 L/yr of avoided loss, and cuts our cyber Value-at-Risk from ₹50 L to ₹15 L” gets budget approved in one meeting. The ability to move between qualitative speed and quantitative rigour is what separates a checklist-filler from a trusted advisor.</p></div><h2>4.4 Risk evaluation and treatment</h2><p>Evaluation compares analysed risk against the appetite/criteria to decide what needs treatment and in what order. Treatment then applies one of four responses — the “four T's”:</p><ul><li><strong>Treat / Mitigate (reduce): </strong>add or strengthen controls to lower likelihood or impact. The most common response. Example: patch + MFA + monitoring on the vulnerable VPN.</li><li><strong>Transfer / Share: </strong>shift the financial consequence to a third party — cyber insurance, or outsourcing with contractual SLAs and indemnities. Note: you can transfer financial impact, but rarely accountability or reputational damage.</li><li><strong>Terminate / Avoid: </strong>stop the activity that creates the risk. Example: decide not to store credit-card numbers at all, removing the entire PCI burden.</li><li><strong>Tolerate / Accept: </strong>consciously retain the risk because it is within appetite or treatment would cost more than the exposure. Acceptance must be formal, documented, owned, and time-bound — never implicit.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Inherent → control → residual, made concrete</div><p><strong>Inherent risk</strong> is the risk with no controls (5×5 = 25). You apply controls until <strong>residual risk</strong> falls below appetite (2×4 = 8, within a ≤12 appetite). Risk acceptance is always a decision about the residual, signed off by the risk owner. If residual still exceeds appetite after reasonable treatment, you escalate — you do not quietly accept it.</p></div><h2>4.5 The risk register — your central artifact, fully specified</h2><p>Every engagement revolves around a living risk register. A professional register has at least these fields:</p><div class=\"tbl-wrap\"><table><thead><tr><th>Field</th><th>Example value</th></tr></thead><tbody><tr><td>Risk ID</td><td>R-014</td></tr><tr><td>Risk statement</td><td>Internet-facing VPN with a known CVE is exploited for initial access</td></tr><tr><td>Category</td><td>Cyber / External</td></tr><tr><td>Threat / vulnerability</td><td>Ransomware actor / unpatched appliance</td></tr><tr><td>Owner</td><td>Head of IT</td></tr><tr><td>Inherent likelihood × impact</td><td>5 × 5 = 25 (High)</td></tr><tr><td>Existing controls</td><td>Perimeter firewall; basic logging</td></tr><tr><td>Residual likelihood × impact</td><td>2 × 4 = 8 (Medium)</td></tr><tr><td>Treatment decision</td><td>Mitigate: 14-day patch SLA + MFA + alerting</td></tr><tr><td>Target &amp; due date</td><td>Residual ≤ 6 by 30 Jun 2026</td></tr><tr><td>Status</td><td>In progress (60%)</td></tr><tr><td>Last reviewed</td><td>2026-05-20</td></tr></tbody></table></div><h1 id=\"sec5\">5. Monitoring, Metrics, and Risk Culture</h1><h2>5.1 KPIs versus KRIs</h2><ul><li><strong>KPI (Key Performance Indicator) </strong>— measures how well something is performing now (e.g., “98% of systems patched within SLA”). Backward/present looking.</li><li><strong>KRI (Key Risk Indicator) </strong>— a leading, predictive metric that signals risk is rising before it materialises (e.g., “number of overdue critical patches trending up for 3 weeks”). A KRI breaching its threshold should trigger action.</li></ul><p>The art is choosing KRIs that genuinely predict loss events and setting thresholds (green/amber/red) that prompt timely action rather than alert fatigue.</p><h2>5.2 A worked KRI dashboard</h2><div class=\"tbl-wrap\"><table><thead><tr><th>KRI</th><th>Green</th><th>Amber</th><th>Red</th></tr></thead><tbody><tr><td>Critical patches overdue</td><td>0</td><td>1–3</td><td>&gt; 3</td></tr><tr><td>Privileged accounts without MFA</td><td>0</td><td>1–2</td><td>&gt; 2</td></tr><tr><td>Overdue access reviews</td><td>0</td><td>1</td><td>&gt; 1</td></tr><tr><td>Phishing-simulation click rate</td><td>&lt; 5%</td><td>5–10%</td><td>&gt; 10%</td></tr><tr><td>Mean time to patch (critical)</td><td>&lt; 7d</td><td>7–14d</td><td>&gt; 14d</td></tr><tr><td>Open high-risk findings past due</td><td>0</td><td>1–2</td><td>&gt; 2</td></tr></tbody></table></div><h2>5.3 Risk reporting</h2><p>Different audiences need different views. The board wants a one-page heat map, top-5 risks, appetite breaches, and trend arrows. Management wants the full register with owners and due dates. Operations wants the specific controls and tasks. Tailoring the report to the audience is a core consulting skill — a board does not want a 200-line register, and an engineer does not want a heat map.</p><h2>5.4 Risk culture — the factor that decides whether any of this works</h2><p>The best framework fails in a culture that punishes bad news or rewards shortcuts. Signs of healthy risk culture: people report incidents and near-misses without fear; leaders visibly make risk-informed decisions; risk ownership is accepted, not dodged; and “tone at the top” is matched by “mood in the middle.” Measuring culture (surveys, near-miss reporting rates, time-to-report) is itself a maturity indicator.</p><h1 id=\"sec6\">6. Compliance Management</h1><p>Compliance is conforming to the obligations placed on the organisation — laws, regulations, contractual commitments, and internal policy. The practitioner's job is to turn a sprawling, overlapping set of obligations into a managed programme with clear ownership and evidence, rather than a panic before each audit.</p><h2>6.1 The regulatory landscape (global + India)</h2><p>You must know which regimes touch a given client. A partial map:</p><div class=\"tbl-wrap\"><table><thead><tr><th>Regime</th><th>Domain</th><th>Who it binds</th></tr></thead><tbody><tr><td>GDPR</td><td>Privacy (EU)</td><td>Anyone handling EU residents' data</td></tr><tr><td>DPDPA 2023</td><td>Privacy (India)</td><td>Anyone handling Indian individuals' data</td></tr><tr><td>IT Act 2000 + rules</td><td>Cyber/India</td><td>All Indian entities (incl. CERT-In rules)</td></tr><tr><td>PCI DSS</td><td>Card data</td><td>Anyone storing/processing card payments</td></tr><tr><td>RBI / SEBI / IRDAI</td><td>Finance/India</td><td>Banks, NBFCs, markets, insurers</td></tr><tr><td>HIPAA</td><td>Health (US)</td><td>US healthcare &amp; associates</td></tr><tr><td>SOX</td><td>Financial reporting (US)</td><td>US-listed companies</td></tr><tr><td>ISO 27001 / SOC 2</td><td>Voluntary assurance</td><td>Often contractually required</td></tr></tbody></table></div><p><strong>India specifics worth knowing: </strong>the CERT-In Directions (2022) impose strict incident-reporting timelines (notably reporting certain incidents within 6 hours) and logging-retention obligations — a live compliance item for Indian firms that SRXLABS clients frequently overlook.</p><h2>6.2 Elements of a compliance programme</h2><ul><li><strong>Obligations register: </strong>a catalogue of every applicable requirement, its source, the owner, and how it's met — the compliance equivalent of the risk register.</li><li><strong>Mapping/crosswalk: </strong>link each obligation to the controls that satisfy it (one control often satisfies many).</li><li><strong>Monitoring &amp; testing: </strong>periodically confirm obligations are still met.</li><li><strong>Regulatory-change management: </strong>watch for new/changed laws and feed them into the register — compliance is a moving target.</li><li><strong>Training &amp; attestation: </strong>staff know the rules and acknowledge them.</li><li><strong>Reporting &amp; escalation: </strong>breaches and gaps reach the right level quickly.</li></ul><h2>6.3 Third-party / vendor risk — a compliance and risk hotspot</h2><p>Most modern breaches involve a supplier (recall Target via an HVAC vendor). Third-party risk management means: inventory vendors, tier them by the data/access they hold, assess each (security questionnaire + review of their SOC 2/ISO certificate), contract for security obligations and breach notification, and monitor continuously. NIST CSF 2.0 elevated this to its own focus (GV.SC). For SRXLABS, vendor risk assessments are a sellable service in themselves.</p><h1 id=\"sec7\">7. Control Frameworks in Depth</h1><p>Controls are the layer auditors actually test. A control is any measure — administrative, technical, or physical — that reduces risk by lowering likelihood or impact. Fluency in classifying and selecting controls is core.</p><h2>7.1 Control classification (two axes)</h2><div class=\"tbl-wrap\"><table><thead><tr><th>By function</th><th>By nature</th><th>Example</th></tr></thead><tbody><tr><td>Preventive</td><td>Technical</td><td>MFA, firewall rule, input validation</td></tr><tr><td>Detective</td><td>Technical</td><td>SIEM alert, file-integrity monitoring</td></tr><tr><td>Corrective</td><td>Technical</td><td>Auto-isolate host, restore from backup</td></tr><tr><td>Preventive</td><td>Administrative</td><td>Policy, training, segregation of duties</td></tr><tr><td>Detective</td><td>Administrative</td><td>Access review, log review, internal audit</td></tr><tr><td>Preventive</td><td>Physical</td><td>Badge access, mantrap, locks</td></tr><tr><td>Deterrent</td><td>Any</td><td>Warning banners, visible CCTV</td></tr><tr><td>Compensating</td><td>Any</td><td>An alternative when the primary isn't feasible</td></tr></tbody></table></div><p>Defence in depth means layering preventive, detective, and corrective controls so that if one fails another catches the event — you don't rely on a single control for a serious risk.</p><h2>7.2 NIST Cybersecurity Framework 2.0 (2024) — in full</h2><p>CSF 2.0 organises a whole security programme around six Functions. Version 2.0's headline change was adding GOVERN as the central function that wraps the other five — a direct nod to the GRC mindset.</p><ul><li><strong>GOVERN (GV): </strong>establish and monitor the cybersecurity risk-management strategy, expectations, roles, policy, and — importantly — supply-chain risk (GV.SC).</li><li><strong>IDENTIFY (ID): </strong>asset management, risk assessment, and improvement — know your assets, data, suppliers, and risks.</li><li><strong>PROTECT (PR): </strong>identity management &amp; access control (PR.AA), awareness &amp; training (PR.AT), data security (PR.DS), platform security, technology resilience.</li><li><strong>DETECT (DE): </strong>continuous monitoring (DE.CM) and adverse-event analysis.</li><li><strong>RESPOND (RS): </strong>incident management, analysis, mitigation, and reporting.</li><li><strong>RECOVER (RC): </strong>recovery plan execution and communications.</li></ul><p>Each Function contains Categories (e.g., ID.AM = Asset Management) and Subcategories (specific outcomes). CSF also defines Implementation Tiers (1 Partial → 4 Adaptive) describing rigour, and Profiles (Current vs Target) used to plan a roadmap. A gap analysis is literally Current Profile vs Target Profile.</p><h3>Worked CSF gap analysis</h3><div class=\"tbl-wrap\"><table><thead><tr><th>Category</th><th>Current Tier</th><th>Target Tier</th><th>Gap action</th></tr></thead><tbody><tr><td>ID.AM (Asset Mgmt)</td><td>1 Partial</td><td>3 Repeatable</td><td>Deploy discovery + CMDB</td></tr><tr><td>PR.AA (Access)</td><td>2 Risk-informed</td><td>3 Repeatable</td><td>Enforce MFA; quarterly reviews</td></tr><tr><td>DE.CM (Monitoring)</td><td>1 Partial</td><td>3 Repeatable</td><td>Stand up SIEM + alerting</td></tr><tr><td>RS.MA (Response)</td><td>1 Partial</td><td>3 Repeatable</td><td>Write &amp; test IR plan</td></tr></tbody></table></div><h2>7.3 CIS Critical Security Controls v8 — the prioritised action list</h2><p>Where CSF is outcome-oriented, the CIS Controls (18 controls, grouped into Implementation Groups IG1–IG3 by organisation size/risk) give a concrete, prioritised to-do list. The first handful eliminate the majority of common attacks:</p><ul><li><strong>1–2 Inventory of enterprise assets &amp; software </strong>— you can't protect what you don't know exists.</li><li>3 Data protection · 4 Secure configuration · 5 Account management · 6 Access control management.</li><li>7 Continuous vulnerability management · 8 Audit log management · 9 Email/web protections · 10 Malware defences.</li><li>11 Data recovery · 12 Network infrastructure · 13 Network monitoring · 14 Security awareness training.</li><li>15 Service-provider management · 16 Application software security · 17 Incident response · 18 Penetration testing.</li></ul><p><strong>Practical use: </strong>for an SME, IG1 (basic cyber hygiene across all 18) is a realistic, defensible baseline you can implement and audit against quickly.</p><h2>7.4 Other catalogues to name</h2><ul><li><strong>NIST SP 800-53 </strong>— a large control catalogue (20 families: AC, AU, CM, IR, SC, etc.) used by US federal systems; 800-171 is the trimmed version for contractors.</li><li><strong>ISO 27002:2022 </strong>— the implementation guidance for ISO 27001's 93 Annex A controls (covered fully in Module 2).</li></ul><h2>7.5 The control crosswalk — build once, satisfy many</h2><p>The highest-leverage artifact a GRC practitioner maintains: one master control set mapped to every framework the organisation must meet, so a single well-run control answers multiple audits.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Control</th><th>ISO 27001</th><th>SOC 2</th><th>NIST CSF</th><th>CIS v8</th><th>DPDPA</th></tr></thead><tbody><tr><td>Quarterly access review</td><td>A.5.18</td><td>CC6.2/6.3</td><td>PR.AA</td><td>6</td><td>Safeguards</td></tr><tr><td>MFA on all access</td><td>A.8.5</td><td>CC6.1</td><td>PR.AA</td><td>6</td><td>Safeguards</td></tr><tr><td>Encryption in transit/rest</td><td>A.8.24</td><td>CC6.7</td><td>PR.DS</td><td>3</td><td>Safeguards</td></tr><tr><td>Security awareness training</td><td>A.6.3</td><td>CC1.4</td><td>PR.AT</td><td>14</td><td>—</td></tr><tr><td>Incident response plan</td><td>A.5.24</td><td>CC7.3/7.4</td><td>RS.MA</td><td>17</td><td>Breach duty</td></tr><tr><td>Audit logging &amp; review</td><td>A.8.15</td><td>CC7.2</td><td>DE.CM</td><td>8</td><td>Safeguards</td></tr></tbody></table></div><h1 id=\"sec8\">8. Audit — Fundamentals and Planning</h1><p>Audit is independent verification that controls exist and operate. For SRXLABS this is both a service you sell and the experience your clients face when getting certified. Master it from both chairs.</p><h2>8.1 Types of audit</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Type</th><th>Who performs it</th><th>Example</th></tr></thead><tbody><tr><td>First-party (internal)</td><td>The organisation on itself</td><td>Internal ISO 27001 audit before cert</td></tr><tr><td>Second-party</td><td>A customer audits its supplier</td><td>A bank audits its SaaS vendor</td></tr><tr><td>Third-party (external)</td><td>Independent body / CPA</td><td>BSI certifies ISO 27001; a CPA issues SOC 2</td></tr></tbody></table></div><h2>8.2 Audit standards &amp; professional bodies</h2><ul><li><strong>IIA IPPF </strong>— the Institute of Internal Auditors' International Professional Practices Framework (standards for internal audit independence, objectivity, competence).</li><li><strong>ISACA ITAF </strong>— the IT Assurance Framework; CISA is the headline IT-audit certification.</li><li><strong>AICPA SSAE 18 </strong>— the attestation standard SOC reports are performed under.</li></ul><h2>8.3 Risk-based audit planning</h2><p>Mature audit functions don't audit everything equally; they focus effort where risk is highest. An audit universe (all auditable entities) is risk-ranked, and the annual audit plan allocates time to the riskiest areas. Each engagement then gets a scope, objectives, criteria (the standard you audit against), and a timeline agreed in an engagement letter.</p><h2>8.4 The audit lifecycle</h2><ol><li><strong>Planning &amp; scoping </strong>— define scope, objectives, criteria, risk, and resources.</li><li><strong>Fieldwork </strong>— gather evidence via inquiry, observation, inspection, re-performance, and CAATs.</li><li><strong>Testing </strong>— evaluate control design and operating effectiveness.</li><li><strong>Findings </strong>— document gaps with evidence, rated by severity.</li><li><strong>Reporting </strong>— issue the report; management responds.</li><li><strong>Follow-up </strong>— verify remediation actually happened.</li></ol><h1 id=\"sec9\">9. Audit — Evidence, Testing, and Sampling</h1><h2>9.1 Evidence-gathering techniques</h2><p>Auditors live by evidence; a claim without it is worthless. The five techniques, in roughly ascending reliability:</p><ul><li><strong>Inquiry: </strong>asking staff. Weakest alone — always corroborate.</li><li><strong>Observation: </strong>watching a process happen (e.g., watching a badge-access door).</li><li><strong>Inspection: </strong>examining documents/records/configs (a policy, a log, a firewall ruleset).</li><li><strong>Re-performance: </strong>the auditor independently re-runs the control (re-calculates, re-checks an access list) — strong evidence.</li><li><strong>CAATs (Computer-Assisted Audit Techniques): </strong>scripts/queries that test 100% of a population rather than a sample (e.g., query all users for any without MFA). The future of audit.</li></ul><p>Strong evidence is sufficient (enough), appropriate (relevant + reliable), independent (not produced solely by the auditee on request), and contemporaneous (created when the control ran, not the night before the audit).</p><h2>9.2 Design vs operating effectiveness — the central distinction</h2><ul><li><strong>Design effectiveness: </strong>if operated as described, would the control actually address the risk? Tested by inspection and walkthrough at a point in time.</li><li><strong>Operating effectiveness: </strong>did the control actually operate consistently across the whole period? Tested by sampling over time.</li></ul><div class=\"callout info\"><div class=\"callout-title\">The classic exam trap</div><p><strong>A SOC 2 Type I</strong> tests design at a point in time; <strong>a SOC 2 Type II</strong> tests operating effectiveness over a period. A control can be perfectly designed yet fail operating-effectiveness testing because it wasn't actually run — e.g., the access-review policy is excellent, but reviews were skipped for two quarters. Design pass, operating fail.</p></div><h2>9.3 Sampling — the numbers and the logic</h2><p>Auditors rarely test 100% (unless using CAATs); they sample. You must understand populations, sample sizes, and exceptions so your evidence survives scrutiny.</p><ul><li><strong>Population: </strong>all instances of the control operating in the period (e.g., all 312 access changes).</li><li><strong>Statistical vs judgmental sampling: </strong>statistical uses random selection for projectable results; judgmental targets higher-risk items based on auditor judgement.</li></ul><div class=\"tbl-wrap\"><table><thead><tr><th>Control frequency</th><th>Typical sample size</th></tr></thead><tbody><tr><td>Many times per day</td><td>25–40</td></tr><tr><td>Daily</td><td>25</td></tr><tr><td>Weekly</td><td>15</td></tr><tr><td>Monthly</td><td>5</td></tr><tr><td>Quarterly</td><td>2</td></tr><tr><td>Annually</td><td>1</td></tr></tbody></table></div><p><strong>Exceptions: </strong>any sampled item that fails. One exception triggers an isolated-vs-systemic assessment. If the root cause suggests the whole population is affected, a single exception becomes a control failure. This is precisely why automated controls (clean populations) beat manual ones.</p><h1 id=\"sec10\">10. Audit — Findings, Root Cause, and Reporting</h1><h2>10.1 Writing a finding — the 5 C's</h2><p>Every professional finding follows the same structure so a reader can act on it without the auditor present:</p><div class=\"callout info\"><div class=\"callout-title\">Finding F-007 — Terminated-user access not revoked within SLA</div><p><strong>Criteria: </strong>Policy SEC-STD-04 requires access revocation within 24 hours of termination.</p><p><strong>Condition: </strong>2 of 25 sampled terminations (8%) retained VPN access for 6 and 9 days.</p><p><strong>Cause: </strong>Offboarding relies on a manual HR email to IT with no ticket, deadline, or alert.</p><p><strong>Effect (risk): </strong>Former staff could access internal systems; data-exfiltration and unauthorised-access exposure.</p><p><strong>Recommendation: </strong>Integrate the HRIS with the identity provider to auto-disable accounts on termination; alert if not completed within 24h.</p><p><strong>Rating: </strong>Medium. <strong>Management response: </strong>Accepted; SCIM auto-deprovisioning live by 30 Jun 2026 (owner: Head of IT).</p></div><h2>10.2 Root-cause analysis</h2><ul><li><strong>5 Whys: </strong>ask “why” iteratively until you reach the systemic cause, not the symptom. “Access wasn't revoked” → why? “IT wasn't told in time” → why? “no deadline on the handoff” → why? “the offboarding process has no enforced gate” — fix the gate, not the symptom.</li><li><strong>Fishbone (Ishikawa) diagram: </strong>categorise possible causes (people, process, technology, environment) to structure the analysis.</li></ul><h2>10.3 Opinions, nonconformities, and CAPA</h2><ul><li><strong>Attestation opinions: </strong>Unqualified (clean) / Qualified (specific exceptions) / Adverse (controls not effective) / Disclaimer (insufficient evidence).</li><li><strong>ISO nonconformities: </strong>Major (a whole requirement missing/systemic — blocks certification) / Minor (isolated lapse — fix on a plan) / Observation (advice, not a failure).</li><li><strong>CAPA (Corrective and Preventive Action): </strong>correction fixes the specific instance; corrective action removes the root cause to prevent recurrence; then you verify closure.</li></ul><h2>10.4 Reporting and follow-up</h2><p>The audit report carries an executive summary (risk posture in business language), scope &amp; methodology, detailed findings with evidence and ratings, and management responses with owners and dates. Follow-up audits then verify findings were genuinely closed — an unverified “fixed” is not closed. Continuous auditing (automated, ongoing testing via CAATs) is the modern direction, replacing point-in-time sampling for many controls.</p><h1 id=\"sec11\">11. Building a GRC Program — 90-Day Playbook</h1><ol><li><strong>Days 1–10 — Mandate &amp; scope: </strong>secure an executive sponsor, define scope, choose a primary framework (ISO 27001 or NIST CSF), and set the risk-appetite statement.</li><li><strong>Days 11–25 — Discover: </strong>build the asset &amp; data inventory and a system/dataflow diagram. You cannot protect or assess what you can't see.</li><li><strong>Days 26–40 — Assess risk: </strong>run workshops, populate the risk register, score inherent risk, assign owners.</li><li><strong>Days 41–55 — Design controls: </strong>map controls to risks (crosswalk), write policies/procedures, define each control's evidence source.</li><li><strong>Days 56–75 — Implement &amp; evidence: </strong>deploy controls; wire each to an automatic evidence source (tickets, logs, reports).</li><li><strong>Days 76–85 — Operate &amp; monitor: </strong>stand up KPIs/KRIs; begin the evidence trail.</li><li><strong>Days 86–90 — Internal audit + management review: </strong>test a sample, fix gaps, report to leadership, plan the next cycle.</li></ol><h2>11.1 GRC tooling</h2><ul><li><strong>Compliance automation: </strong>Vanta, Drata, Sprinto, Secureframe — auto-collect evidence and map controls; ideal for SOC 2 / ISO 27001.</li><li><strong>Enterprise GRC/IRM: </strong>ServiceNow IRM, Archer, OneTrust, LogicGate, AuditBoard — for larger risk registers, workflows, and reporting.</li><li><strong>Quantitative risk: </strong>FAIR-U / RiskLens-style tools or a Monte-Carlo spreadsheet.</li><li><strong>Lean start: </strong>a well-structured spreadsheet register + a documented evidence repository is entirely valid for early-stage clients.</li></ul><h1 id=\"sec12\">12. Templates Library (Use Verbatim)</h1><h2>12.1 Risk-acceptance memo</h2><pre class=\"code\"><code>RISK ACCEPTANCE — R-022\nRisk: Legacy reporting server cannot support MFA (vendor end-of-life).\nResidual rating: Medium (9). Appetite: ≤ 12 for internal systems.\nCompensating controls: network-isolated VLAN; jump-host-only access;\n                       weekly log review; quarterly re-evaluation.\nAccepted by: CISO          Date: 2026-05-20\nReview date: 2026-11-20 (or on decommission, whichever is first).</code></pre><h2>12.2 Internal audit programme (excerpt)</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Control</th><th>Test procedure</th><th>Sample</th><th>Evidence</th></tr></thead><tbody><tr><td>Access reviews (A.5.18)</td><td>Inspect review records; reperform 1</td><td>2 of 4 qtrs</td><td>Signed review sheets</td></tr><tr><td>Change mgmt (CC8.1)</td><td>Inspect approvals; trace to deploy</td><td>25 changes</td><td>PRs + CI logs</td></tr><tr><td>Backups (A.8.13)</td><td>Inspect logs; confirm a restore test</td><td>Monthly</td><td>Restore-test record</td></tr></tbody></table></div><h2>12.3 Vendor risk assessment (mini)</h2><ul><li>Tier the vendor by data/access; request their SOC 2/ISO certificate; issue a security questionnaire; review encryption, access control, breach-notification terms; record residual risk and a re-assessment date.</li></ul><h2>12.4 BIA fields (for the continuity link)</h2><ul><li>Process · criticality · RTO (how fast to recover) · RPO (max data loss) · dependencies · minimum resources. A BIA drives your DR/BCP priorities and feeds availability risk.</li></ul><h1 id=\"sec13\">13. Real-World Case Studies (GRC Failure Analysis)</h1><ul><li><strong>Equifax (2017, ~147M records): </strong>an unpatched Apache Struts vulnerability — with a patch available for roughly two months — was exploited; an expired certificate then blinded detection for months. GRC failures: broken asset/patch inventory (ID), and detective controls that existed on paper but weren't operating (DE). The technology fix existed; governance and operating effectiveness did not.</li><li><strong>Target (2013, ~40M cards): </strong>attackers entered through an HVAC vendor's stolen credentials, then moved laterally to point-of-sale systems. GRC failures: third-party/vendor risk management and network segmentation. Lesson — supplier risk (now CSF GV.SC) is squarely in scope.</li><li><strong>Capital One (2019, ~100M records): </strong>a misconfigured web-application firewall plus an over-permissive IAM role let an attacker read cloud storage. GRC failures: cloud control design and least privilege — a governance and risk issue, not just an engineering bug.</li><li><strong>SolarWinds (2020, supply chain): </strong>attackers compromised the build pipeline to ship malicious updates to thousands of customers. Lesson — software supply-chain integrity and third-party assurance are now board-level risks.</li></ul><p>The recurring pattern: in almost every major breach the decisive failure was governance, inventory, third-party oversight, or untested response — exactly the things GRC governs. The exploit was often the least interesting part.</p><h1 id=\"sec14\">14. Hands-On Labs</h1><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Quantify and decide (45 min)</div><p>A SaaS firm faces credential stuffing: 50,000 attempts/yr, 0.3% succeed, average loss per account takeover ₹40,000. Compute LEF and ALE. A bot-mitigation + MFA control costs ₹6,00,000/yr and cuts success to 0.02%. Recompute ALE and decide. (LEF before = 150; ALE = ₹60,00,000. After: LEF = 10; ALE = ₹4,00,000. Saves ₹56,00,000 for ₹6,00,000 — fund it.)</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Write a finding (30 min)</div><p>Backups exist but no restore has ever been tested. Write a finding using the 5 C's, assign a rating, run a 5-Whys to the root cause, and distinguish the correction from the corrective action.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Build a mini risk register (60 min)</div><p>For SRXLABS, list 8 risks across cyber, people, vendor, and compliance. Score inherent L×I, name a control and owner, estimate residual, choose a treatment, and flag any residual above a ≤12 appetite.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — CSF gap analysis (45 min)</div><p>Pick three CSF categories (e.g., ID.AM, PR.AA, RS.MA). Rate Current vs Target tiers for a small company and define the concrete gap action for each. Produce a one-page roadmap.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 5 — Build a crosswalk (30 min)</div><p>Take five controls you operate and map each to ISO 27001, SOC 2, NIST CSF, and DPDPA. This is the artifact that lets one control satisfy four audits.</p></div><h1 id=\"sec15\">15. Interview / Certification Q&amp;A</h1><p>Questions phrased the way CISA, CRISC, and ISO Lead Implementer exams (and client interviews) ask them.</p><ul><li><strong>Q: Inherent vs residual risk? </strong>A: Before vs after controls; you treat until residual is within appetite, then a named owner accepts the residual.</li><li><strong>Q: When accept rather than mitigate? </strong>A: When residual is within appetite, or treatment cost exceeds the ALE; acceptance must be documented, owned, and time-bound.</li><li><strong>Q: Difference between a policy, standard, and procedure? </strong>A: Intent (board-approved) / mandatory measurable rule / exact steps.</li><li><strong>Q: What is a compensating control? </strong>A: An alternative giving comparable risk reduction when the primary control isn't feasible (e.g., isolation + monitoring when MFA can't be applied).</li><li><strong>Q: ISO 31000 process steps? </strong>A: Context → identify → analyse → evaluate → treat → monitor/review, with communication throughout.</li><li><strong>Q: COSO ERM vs ISO 31000? </strong>A: COSO is strategy-centric and heavier (US-listed); ISO 31000 is lean and applies to any risk.</li><li><strong>Q: Design vs operating effectiveness? </strong>A: Is the control built right (point-in-time) vs did it run consistently (over a period, sampled).</li><li><strong>Q: Sample size for a daily control? </strong>A: ~25, risk-adjusted; one exception prompts an isolated-vs-systemic assessment.</li><li><strong>Q: Explain the Three Lines Model. </strong>A: Own (1st) / oversee (2nd) / independently assure (3rd, reporting to the audit committee).</li><li><strong>Q: KPI vs KRI? </strong>A: Performance achieved vs a leading indicator that risk is rising.</li><li><strong>Q: Six NIST CSF 2.0 functions? </strong>A: Govern, Identify, Protect, Detect, Respond, Recover — Govern was added in 2.0.</li><li><strong>Q: The 5 C's of a finding? </strong>A: Criteria, Condition, Cause, Effect, Recommendation.</li></ul><h1 id=\"sec16\">16. Glossary, Certifications, and Next Steps</h1><
