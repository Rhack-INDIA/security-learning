h2>16.1 Glossary</h2><ul><li><strong>ISMS / SoA / RTP: </strong>Information Security Management System / Statement of Applicability / Risk Treatment Plan.</li><li><strong>ERM / IRM: </strong>Enterprise / Integrated Risk Management.</li><li><strong>ALE / SLE / ARO / EF: </strong>Annualised Loss Expectancy / Single Loss Expectancy / Annual Rate of Occurrence / Exposure Factor.</li><li><strong>LEF / TEF / LM: </strong>Loss Event Frequency / Threat Event Frequency / Loss Magnitude (FAIR terms).</li><li><strong>BIA / RTO / RPO: </strong>Business Impact Analysis / Recovery Time Objective / Recovery Point Objective.</li><li><strong>DPIA / CAPA / SoD: </strong>Data Protection Impact Assessment / Corrective &amp; Preventive Action / Segregation of Duties.</li><li><strong>KRI / KPI / CAAT: </strong>Key Risk Indicator / Key Performance Indicator / Computer-Assisted Audit Technique.</li></ul><h2>16.2 Certifications that map to this module</h2><ul><li><strong>Governance/risk: </strong>CRISC (risk), CGEIT (governance).</li><li><strong>Audit: </strong>CISA (IT audit), CIA (internal audit).</li><li><strong>Security management: </strong>CISM, CISSP.</li><li><strong>Implementer: </strong>ISO 27001 Lead Implementer / Lead Auditor (your next module).</li></ul><h2>16.3 One-line cheat sheet</h2><p><strong>Objective → Risk → Control → Evidence → Assurance.</strong> ALE = SLE × ARO. FAIR: Risk = LEF × LM. Treat = Mitigate/Transfer/Avoid/Accept. Findings = Criteria/Condition/Cause/Effect/Recommendation. CSF = GV-ID-PR-DE-RS-RC. Three Lines = Own/Oversee/Assure.</p><div class=\"callout info\"><div class=\"callout-title\">Mastery check — you've mastered this module if you can…</div><p>1. Place GRC, ERM, and IRM correctly and state the GRC maturity levels.</p><p>2. Run the full ISO 31000 process and choose between qualitative and quantitative analysis.</p><p>3. Quantify a risk with both ALE and FAIR, and justify a control on ROI / Value-at-Risk.</p><p>4. Build a risk register row and a risk-acceptance memo with compensating controls.</p><p>5. Explain control types and build a crosswalk mapping one control to four frameworks.</p><p>6. Run a NIST CSF current-vs-target gap analysis.</p><p>7. Execute the audit lifecycle: plan, sample, test design vs operating, and write a 5-C's finding.</p><p>8. Take a nonconformity from root cause (5 Whys) through correction, corrective action, and verification.</p></div>","sections":[{"id":"sec1","title":"1. Introduction — What GRC Is and Why It Exists"},{"id":"sec2","title":"2. Governance in Depth"},{"id":"sec3","title":"3. Risk Management — Concepts and Frameworks"},{"id":"sec4","title":"4. The Risk Process, Step by Step"},{"id":"sec5","title":"5. Monitoring, Metrics, and Risk Culture"},{"id":"sec6","title":"6. Compliance Management"},{"id":"sec7","title":"7. Control Frameworks in Depth"},{"id":"sec8","title":"8. Audit — Fundamentals and Planning"},{"id":"sec9","title":"9. Audit — Evidence, Testing, and Sampling"},{"id":"sec10","title":"10. Audit — Findings, Root Cause, and Reporting"},{"id":"sec11","title":"11. Building a GRC Program — 90-Day Playbook"},{"id":"sec12","title":"12. Templates Library (Use Verbatim)"},{"id":"sec13","title":"13. Real-World Case Studies (GRC Failure Analysis)"},{"id":"sec14","title":"14. Hands-On Labs"},{"id":"sec15","title":"15. Interview / Certification Q&A"},{"id":"sec16","title":"16. Glossary, Certifications, and Next Steps"}]},{"id":"02","navTitle":"ISO 27001:2022","title":"ISO/IEC 27001:2022","subtitle":"Lead Implementer Field Guide","html":"<h1 id=\"sec1\">1. ISO/IEC 27001 — What It Is and Why It Dominates</h1><p><strong>ISO/IEC 27001:2022</strong> is the international standard that defines the requirements for an <strong>Information Security Management System (ISMS)</strong> — a risk-driven, continually improving system of policies, processes, people, and technology for protecting information. It is the one infosec standard you can be formally <strong>certified</strong> against by an accredited certification body, and that certificate is recognised globally. Enterprise and government buyers across Europe, Asia, and increasingly North America demand it before signing. For SRXLABS this is the highest-value compliance service: the qualification you need to win serious deals, and the standard your clients will pay you to implement.</p><p>The key idea, and the thing that throws beginners, is that ISO 27001 does not prescribe specific technology. It does not tell you to use a particular firewall, encryption algorithm, or vendor. Instead, it tells you to run a system that finds your risks, selects appropriate controls to treat them, operates those controls consistently, monitors how well they work, and continually improves. Two certified organisations can therefore look very different from each other technically — both valid, because each can justify its choices through documented risk assessment.</p><h2>1.1 The ISO 27000 family of standards</h2><p>ISO 27001 sits at the centre of a family of related standards. You should be able to name the most useful ones and what each adds:</p><ul><li><strong>ISO/IEC 27000 </strong>— vocabulary and overview of the entire family. Read this first if you want the official definitions of every term.</li><li><strong>ISO/IEC 27001:2022 </strong>— the certifiable requirements (the “what”). Clauses 4–10 and Annex A.</li><li><strong>ISO/IEC 27002:2022 </strong>— implementation guidance for each of the 93 Annex A controls (the “how”). Not certifiable but indispensable when you operate controls.</li><li><strong>ISO/IEC 27003 </strong>— implementation guidance for the ISMS itself (the “how” for clauses 4–10).</li><li><strong>ISO/IEC 27004 </strong>— monitoring, measurement, analysis, and evaluation (metrics).</li><li><strong>ISO/IEC 27005 </strong>— information-security risk management.</li><li><strong>ISO/IEC 27017 </strong>— cloud-specific control guidance for cloud service providers and customers.</li><li><strong>ISO/IEC 27018 </strong>— protection of PII in public clouds (often required by cloud providers' clients).</li><li><strong>ISO/IEC 27701 </strong>— a privacy extension to 27001/27002 (a “PIMS”) that helps demonstrate GDPR/DPDPA alignment on top of an ISMS.</li><li><strong>ISO/IEC 27031, 27035 </strong>— ICT readiness for business continuity, and incident management.</li></ul><div class=\"callout info\"><div class=\"callout-title\">The mental model to carry through this whole module</div><p><strong>You certify against ISO 27001 (the requirements). You read ISO 27002 to implement the controls.</strong> 27001 tells you the management system must exist, must do risk assessment, must select controls, and must improve. 27002 tells you what “good” looks like for each control. Many people muddle the two — keep them straight in client conversations.</p></div><h2>1.2 Brief history (why the 2022 update matters)</h2><p>ISO 27001's lineage is BS 7799 (British Standard, 1995) → ISO/IEC 17799 (2000) → ISO/IEC 27001:2005 → 27001:2013 → 27001:2022. The 2013 version was the workhorse for nearly a decade; the 2022 update modernised Annex A to reflect cloud, threat intelligence, and DLP, and added “attributes” to controls for filtering. Importantly, the transition window from 2013 to 2022 has now closed (it ran through October 2025), so any new or recertifying ISMS today is against 2022 — don't even discuss “27001:2013” in client work except historically.</p><h2>1.3 What the 2022 changes are (you must know these)</h2><ul><li><strong>Annex A reduced from 114 controls to 93 </strong>— some merged, some removed, eleven added.</li><li><strong>Annex A reorganised from 14 domains (A.5–A.18) into 4 themes </strong>— Organizational (37), People (8), Physical (14), Technological (34).</li><li><strong>11 brand-new controls </strong>— covered in full in Section 6 of this module.</li><li><strong>Five control attributes </strong>introduced for tagging and filtering: control type, information-security properties (CIA), cybersecurity concepts (Identify/Protect/Detect/Respond/Recover — mapping to NIST CSF), operational capabilities, and security domains.</li><li><strong>Clause text aligned </strong>with the latest ISO Annex SL high-level structure (the management-system structure shared with ISO 9001, 22301, 27701).</li></ul><h2>1.4 Why ISO 27001 wins business</h2><ul><li><strong>Universally recognised: </strong>more globally portable than SOC 2; respected in EU, India, Middle East, and Asia-Pacific procurement.</li><li><strong>Risk-based: </strong>the standard adapts to any organisation — a 30-person SaaS and a multinational bank can both certify if their ISMS matches their risk.</li><li><strong>Audit-defensible: </strong>a certified ISMS, run as designed, demonstrably reduces legal liability when something goes wrong.</li><li><strong>Reuse: </strong>the control set, mapped via crosswalks, simultaneously feeds SOC 2, DPDPA, GDPR, and customer questionnaires.</li></ul><h1 id=\"sec2\">2. The Structure of the Standard</h1><p>ISO 27001 has two halves. The clauses (numbered 0–10) state the mandatory requirements for the management system itself — the “shalls.” Annex A lists the 93 controls you choose from to treat your risks. Both halves are auditable: a certification audit checks that your management system meets the clauses AND that the controls you selected are implemented and operating.</p><h2>2.1 The clauses, mapped</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Clause</th><th>Title</th><th>What it requires (one-line)</th></tr></thead><tbody><tr><td>0–3</td><td>Introduction, scope, refs, terms</td><td>Informational; no 'shalls' to audit</td></tr><tr><td>4</td><td>Context of the organization</td><td>Define issues, parties, scope, ISMS</td></tr><tr><td>5</td><td>Leadership</td><td>Top-mgmt commitment, policy, roles</td></tr><tr><td>6</td><td>Planning</td><td>Risk &amp; opportunity, risk assessment, SoA, RTP, objectives</td></tr><tr><td>7</td><td>Support</td><td>Resources, competence, awareness, comms, documents</td></tr><tr><td>8</td><td>Operation</td><td>Operational planning; run the RTP</td></tr><tr><td>9</td><td>Performance evaluation</td><td>Monitor, internal audit, mgmt review</td></tr><tr><td>10</td><td>Improvement</td><td>Nonconformity, corrective action, continual improvement</td></tr></tbody></table></div><h2>2.2 PDCA mapped onto the clauses</h2><p>The clauses follow the Plan–Do–Check–Act loop that underpins every management-system standard. Understanding this mapping helps you remember the clauses and explain ISO 27001 to executives in five seconds.</p><ul><li><strong>Plan (4–7) </strong>— establish context, leadership, risk assessment, resources, competence.</li><li><strong>Do (8) </strong>— implement and operate the controls and treatment plan.</li><li><strong>Check (9) </strong>— monitor, internally audit, hold management reviews.</li><li><strong>Act (10) </strong>— correct nonconformities and improve.</li></ul><h2>2.3 Mandatory documented information (the auditor's first checklist)</h2><p>The standard explicitly names documents and records that </p><ul><li>ISMS scope (4.3) — the boundary statement.</li><li>Information security policy (5.2) — board-approved.</li><li>Risk-assessment process and results (6.1.2 / 8.2) — the method and the register.</li><li>Risk-treatment process and results (6.1.3 / 8.3) — incl. the SoA and RTP.</li><li>Information-security objectives (6.2) — measurable goals.</li><li>Evidence of competence (7.2) — training records, qualifications.</li><li>Operational planning and control evidence (8.1) — procedures and records of execution.</li><li>Monitoring and measurement results (9.1) — KPIs, dashboards.</li><li>Internal audit programme and audit results (9.2) — plan, reports, evidence.</li><li>Management review results (9.3) — minutes with required inputs/outputs.</li><li>Nonconformities and corrective actions (10.2) — the NC/CAPA register.</li></ul><h1 id=\"sec3\">3. Clauses 4 &amp; 5 — Context and Leadership</h1><h2>3.1 Clause 4 — Context of the Organization</h2><p>Clause 4 sets the foundations. Auditors begin here because if context is wrong, everything downstream is wrong.</p><ul><li><strong>4.1 Understanding the organization and its context: </strong>list internal issues (culture, capabilities, technology) and external issues (regulation, competition, threat landscape) that can affect the ISMS.</li><li><strong>4.2 Interested parties: </strong>identify stakeholders (customers, regulators, employees, suppliers) and their information-security requirements.</li><li><strong>4.3 Scope: </strong>define the boundaries of the ISMS — what (products/services/processes), where (sites), and the supporting functions. Exclusions must be justified.</li><li><strong>4.4 The ISMS: </strong>establish, implement, maintain, and continually improve the ISMS.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Writing a defensible ISMS scope statement</div><p>Scope is the single most consequential decision in your project. Too broad: you can't deliver. Too narrow: the certificate is worthless to customers. A defensible scope statement names what, where, and which supporting functions, and justifies any exclusions. Example: “The design, development, operation, and support of the SRXLABS [Platform] SaaS, including supporting corporate IT, hosted on AWS (ap-south-1) and the Jaipur head office. Exclusions: the public marketing website (static, no customer data) — justified as out of risk scope.” That sentence tells an auditor exactly what to sample and tells a customer exactly what's covered.</p></div><h2>3.2 Clause 5 — Leadership</h2><p>ISO 27001 is unusually explicit about leadership because boards historically delegated security and then disowned the result. Clause 5 makes top management's role specific and auditable.</p><ul><li><strong>5.1 Leadership and commitment: </strong>top management shall ensure the policy and objectives are established and compatible with strategy; integrate ISMS requirements into business processes; provide resources; communicate the importance; direct people; promote improvement.</li><li><strong>5.2 Information security policy: </strong>must be appropriate to the organisation, include the objectives or a framework for them, commit to satisfying applicable requirements, and commit to continual improvement. It must be documented, communicated, and available to interested parties.</li><li><strong>5.3 Organizational roles, responsibilities, and authorities: </strong>top management assigns and communicates responsibility and authority for the ISMS — typically encoded as a RACI matrix.</li></ul><p><strong>What auditors look for in clause 5: </strong>a signed and dated information security policy, evidence of management review (clause 9.3) running on schedule, and a RACI or role chart with names. “Top management is committed” as a sentence in a policy is not enough — commitment is evidenced through actions and decisions.</p><h1 id=\"sec4\">4. Clause 6 — Planning (The Heart of the Standard)</h1><p>Clause 6 is where the ISMS becomes real. It contains the risk assessment, risk treatment, the Statement of Applicability, the Risk Treatment Plan, and information-security objectives. Most certification effort and most audit time live here.</p><h2>4.1 Clause 6.1.1 — Actions to address risks and opportunities</h2><p>You must determine the risks and opportunities that could affect the ISMS achieving its intended outcomes, prevent or reduce undesired effects, and continually improve. This is the over-arching clause; 6.1.2 and 6.1.3 give the concrete process.</p><h2>4.2 Clause 6.1.2 — Information security risk assessment</h2><p>You must define and apply an information-security risk-assessment process that:</p><ul><li>Establishes and maintains criteria including risk acceptance and criteria for performing assessments.</li><li>Ensures repeated assessments produce consistent, valid, comparable results.</li><li>Identifies risks associated with loss of confidentiality, integrity, and availability of information in scope.</li><li>Identifies the risk owners.</li><li>Analyses risks (likelihood and consequences) and evaluates them against criteria.</li></ul><p>In practice this means: write a one-to-two-page “risk methodology” document defining your scales, scoring, acceptance criteria, and process. Apply it consistently to every risk in the register. The methodology document itself is mandatory information.</p><h2>4.3 Clause 6.1.3 — Information security risk treatment</h2><p>You must define and apply a risk-treatment process to:</p><ol><li><strong>Select treatment options </strong>(mitigate / transfer / avoid / accept) for each risk.</li><li><strong>Determine all controls necessary </strong>to implement the chosen options.</li><li><strong>Compare to Annex A </strong>to verify no necessary control has been overlooked.</li><li><strong>Produce a Statement of Applicability (SoA) </strong>with all Annex A controls listed, whether each applies, justification, and implementation status.</li><li><strong>Formulate the Risk Treatment Plan (RTP) </strong>with timelines, responsibilities, and resources.</li><li><strong>Obtain risk owners' approval </strong>of the RTP and acceptance of residual risks.</li></ol><div class=\"callout warn\"><div class=\"callout-title\">The Statement of Applicability — the document the auditor opens first</div><p>The SoA is the bridge between your risks and the standard's controls. Every applicable control must trace back to at least one risk; every non-applicable control must have a written justification an auditor will challenge. Exclusion reasons like “we're a SaaS — no physical-monitoring control” are valid; exclusions like “we don't have time” are not. Build it as a living spreadsheet with at minimum: control reference, applicable Y/N, justification, status, owner, linked risk IDs.</p></div><h2>4.4 Worked SoA excerpt</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Control</th><th>Applicable</th><th>Justification</th><th>Status</th><th>Owner</th></tr></thead><tbody><tr><td>A.5.7 Threat intelligence</td><td>Yes</td><td>Treats R-031 (targeted attacks)</td><td>Implemented</td><td>CISO</td></tr><tr><td>A.5.23 Cloud security</td><td>Yes</td><td>Core service on AWS — R-014, R-022</td><td>Implemented</td><td>Head of IT</td></tr><tr><td>A.8.12 DLP</td><td>Yes</td><td>Customer PII handled — R-019</td><td>In progress</td><td>Security Eng</td></tr><tr><td>A.7.4 Physical monitoring</td><td>No</td><td>Cloud-only; no datacentre owned</td><td>N/A (justified)</td><td>Head of IT</td></tr><tr><td>A.5.30 ICT BC readiness</td><td>Yes</td><td>Customer SLA on uptime — R-027</td><td>Implemented</td><td>Head of Eng</td></tr></tbody></table></div><h2>4.5 Clause 6.2 — Information security objectives and planning</h2><p>Objectives must be consistent with the policy, measurable, monitored, communicated, updated as appropriate, and documented. Each objective needs a plan stating what will be done, what resources, who is responsible, when it will be completed, and how the results will be evaluated. Example objective: “By 31 December 2026, reduce mean time to patch internet-facing critical CVEs to under 7 days, measured monthly.”</p><h2>4.6 Clause 6.3 — Planning of changes (new in 2022 alignment)</h2><p>When the ISMS needs change, the change shall be carried out in a planned manner. This formalises change management for the management system itself — not just IT change management.</p><h1 id=\"sec5\">5. Clauses 7–10 — Support, Operation, Performance, Improvement</h1><h2>5.1 Clause 7 — Support</h2><p>Support is the resourcing of the ISMS — people, knowledge, communication, and documents.</p><ul><li><strong>7.1 Resources: </strong>determine and provide the resources needed for the ISMS (people, budget, technology).</li><li><strong>7.2 Competence: </strong>determine the competence needed for roles affecting performance, ensure people are competent (education, training, experience), and retain documented evidence.</li><li><strong>7.3 Awareness: </strong>people doing work under the organisation's control shall be aware of the information-security policy, their contribution to ISMS effectiveness, and the implications of non-conformance.</li><li><strong>7.4 Communication: </strong>determine internal and external communications relevant to the ISMS (what, when, with whom, how).</li><li><strong>7.5 Documented information: </strong>create, update, and control documents. Includes versioning, access control, and retention. This is where the mandatory documents listed in Section 2.3 live.</li></ul><h2>5.2 Clause 8 — Operation</h2><p>Operation is the “Do” phase — you execute the plan and the controls.</p><ul><li><strong>8.1 Operational planning and control: </strong>plan, implement, and control the processes needed to meet ISMS requirements; keep evidence of execution; control planned changes; review unintended changes.</li><li><strong>8.2 Information security risk assessment: </strong>perform risk assessments at planned intervals or when significant changes occur. Keep results.</li><li><strong>8.3 Information security risk treatment: </strong>implement the Risk Treatment Plan. Keep results.</li></ul><p><strong>What auditors check in clause 8: </strong>that the risk assessment is current (typically annual at minimum, plus on major change) and that the RTP items have evidence of execution — tickets, change records, signed-off projects.</p><h2>5.3 Clause 9 — Performance Evaluation</h2><p>This is the “Check” phase, and the clause most often executed poorly by first-time certifiers.</p><ul><li><strong>9.1 Monitoring, measurement, analysis and evaluation: </strong>determine what needs monitoring, the methods, when monitoring/measurement is performed, and when results are analysed.</li><li><strong>9.2 Internal audit: </strong>conduct internal audits at planned intervals to confirm the ISMS conforms to the standard and to your own requirements, and is effectively implemented. Plan, perform, report, and retain documented information.</li><li><strong>9.3 Management review: </strong>top management reviews the ISMS at planned intervals. The required inputs are explicit and the required outputs are decisions.</li></ul><h3>Management review — the prescribed inputs and outputs (memorise these)</h3><p><strong>Inputs </strong>must include: status of actions from previous reviews; changes in external/internal issues; changes in interested-party needs; feedback on ISMS performance (NCs, monitoring, audit results, objective achievement); risk assessment results and RTP status; opportunities for improvement; feedback from interested parties.</p><p><strong>Outputs </strong>must include decisions related to continual improvement opportunities and any needed changes to the ISMS. Document them — minutes with decisions, owners, and dates. Skipping management review or running it as a tick-the-box meeting is one of the most common first-cert nonconformities.</p><h2>5.4 Clause 10 — Improvement</h2><ul><li><strong>10.1 Continual improvement: </strong>the organisation shall continually improve the suitability, adequacy, and effectiveness of the ISMS.</li><li><strong>10.2 Nonconformity and corrective action: </strong>react to nonconformities; evaluate the need for action to eliminate causes; implement; review effectiveness; update ISMS if necessary. Keep evidence — NC register + CAPA records.</li></ul><h1 id=\"sec6\">6. Annex A in Depth — The 93 Controls</h1><p>Annex A is the menu. You don't implement all 93; you select those that treat your identified risks and justify any you exclude in the SoA. Below: the four themes, with what each is about and the highest-frequency controls under each.</p><h2>6.1 A.5 Organizational controls (37 controls)</h2><p>The largest theme, covering policy, roles, supplier management, threat intelligence, incident management, and continuity. Examples you must know:</p><ul><li><strong>A.5.1 Policies for information security </strong>— the policy hierarchy.</li><li><strong>A.5.7 Threat intelligence </strong>(new in 2022) — collect and use threat information.</li><li><strong>A.5.9–5.12 Asset management &amp; classification </strong>— inventory, ownership, acceptable use, classification.</li><li><strong>A.5.15–5.18 Access control &amp; rights </strong>— access policy, provisioning, reviews, revocation.</li><li><strong>A.5.19–5.23 Supplier relationships and cloud </strong>(5.23 cloud new in 2022) — contracts, monitoring, cloud-specific.</li><li><strong>A.5.24–5.28 Incident management </strong>— planning, reporting, response, learning.</li><li><strong>A.5.29–5.30 BC + ICT readiness </strong>(5.30 new in 2022) — plan and test.</li><li><strong>A.5.37 Documented operating procedures </strong>— they exist and people follow them.</li></ul><h2>6.2 A.6 People controls (8 controls)</h2><ul><li><strong>A.6.1 Screening </strong>— background checks proportional to role.</li><li><strong>A.6.2 Terms &amp; conditions </strong>— information-security responsibilities in contracts.</li><li><strong>A.6.3 Awareness, education, training </strong>— ongoing, recorded.</li><li><strong>A.6.4 Disciplinary process </strong>— documented and applied.</li><li><strong>A.6.5 Post-termination responsibilities </strong>— NDAs, returns, revocation.</li><li><strong>A.6.6 Confidentiality agreements </strong>; <strong>A.6.7 Remote working </strong>; <strong>A.6.8 Event reporting</strong>.</li></ul><h2>6.3 A.7 Physical controls (14 controls)</h2><ul><li><strong>Secure perimeters &amp; entry (A.7.1–7.3) </strong>— zones, entry controls, securing offices/rooms.</li><li><strong>A.7.4 Physical security monitoring </strong>(new 2022) — CCTV, alarms, intrusion detection.</li><li>A.7.5–7.9 Threats, working in secure areas, desk/screen, equipment siting, security of assets off-premises.</li><li>A.7.10–7.14 Storage media, supporting utilities (power/HVAC), cabling, equipment maintenance, secure disposal.</li></ul><h2>6.4 A.8 Technological controls (34 controls)</h2><p>The largest technical theme. The high-frequency ones every implementer must know:</p><ul><li><strong>A.8.1 User end-point devices </strong>(MDM, EDR). <strong>A.8.2 Privileged access rights</strong>. <strong>A.8.3 Information access restriction</strong>.</li><li><strong>A.8.5 Secure authentication </strong>(MFA). <strong>A.8.6 Capacity management</strong>. <strong>A.8.7 Protection against malware</strong>.</li><li><strong>A.8.8 Vulnerability management </strong>— patching SLAs. <strong>A.8.9 Configuration management </strong>(new). <strong>A.8.10 Information deletion </strong>(new).</li><li><strong>A.8.11 Data masking </strong>(new). <strong>A.8.12 Data leakage prevention </strong>(new). <strong>A.8.13 Backup </strong>(performed AND tested).</li><li><strong>A.8.15 Logging </strong>+ <strong>A.8.16 Monitoring </strong>(new) — SIEM use cases + review.</li><li><strong>A.8.20–8.23 Network security, segregation, web filtering </strong>(8.23 new). <strong>A.8.24 Use of cryptography</strong>.</li><li><strong>A.8.25–8.28 Secure development lifecycle </strong>incl. 8.28 secure coding (new), 8.26 application security, 8.27 secure architecture, 8.29 security testing.</li></ul><h2>6.5 The 11 new controls in 2022 — one-liner + implementation</h2><div class=\"tbl-wrap\"><table><thead><tr><th>New control</th><th>Practical implementation</th></tr></thead><tbody><tr><td>5.7 Threat intelligence</td><td>Subscribe to feeds/ISAC; feed IOCs to SIEM; periodic threat reports</td></tr><tr><td>5.23 Cloud security</td><td>Cloud config baseline (CIS); CSPM continuous scanning; cloud shared-responsibility model</td></tr><tr><td>5.30 ICT BC readiness</td><td>Tested DR runbook with defined RTO/RPO; quarterly drill</td></tr><tr><td>7.4 Physical security monitoring</td><td>CCTV/alarms; monitoring procedures (if owned premises)</td></tr><tr><td>8.9 Configuration management</td><td>Golden images; drift detection; Infrastructure as Code</td></tr><tr><td>8.10 Information deletion</td><td>Retention schedule; secure-deletion mechanisms; proof of deletion</td></tr><tr><td>8.11 Data masking</td><td>Mask PII in non-production/test data; tokenisation</td></tr><tr><td>8.12 Data leakage prevention</td><td>Egress monitoring; block/alert on bulk exfiltration</td></tr><tr><td>8.16 Monitoring activities</td><td>SIEM use cases tied to threats; alert triage; periodic review</td></tr><tr><td>8.23 Web filtering</td><td>Categorical web filtering; block malicious domains; alert on bypass</td></tr><tr><td>8.28 Secure coding</td><td>Secure-coding standard; SAST/DAST in CI; training; peer review</td></tr></tbody></table></div><h2>6.6 The five control attributes (use them in your SoA filters)</h2><p>Every Annex A control in 2022 has five attributes you can use to filter/report:</p><ul><li><strong>Control type: </strong>Preventive / Detective / Corrective.</li><li><strong>Information security properties: </strong>Confidentiality / Integrity / Availability.</li><li><strong>Cybersecurity concepts: </strong>Identify / Protect / Detect / Respond / Recover (maps to NIST CSF).</li><li><strong>Operational capabilities: </strong>Governance / Asset management / Information protection / Identity &amp; access management / etc.</li><li><strong>Security domains: </strong>Governance &amp; ecosystem / Protection / Defence / Resilience.</li></ul><p>Practical use: tag your SoA rows with attributes so you can produce a report “all detective controls” or “all controls protecting confidentiality” for a board or an audit committee.</p><h2>6.7 Risk-to-evidence walkthrough (end to end)</h2><div class=\"callout info\"><div class=\"callout-title\">From one risk to audit-ready evidence</div><p><strong>Risk R-014: </strong>a departing employee retains access and exfiltrates customer data.</p><p><strong>Assessment: </strong>inherent 5×5 = 25 (High); appetite ≤12.</p><p><strong>Annex A controls selected: </strong>A.5.18 (access rights provision/review/revoke), A.6.5 (post-termination responsibilities), A.8.16 (monitoring), A.8.12 (DLP).</p><p><strong>Implementation: </strong>HRIS → IdP auto-deprovisioning within 24h; quarterly access reviews; DLP alert on bulk download; documented procedure.</p><p><strong>Residual: </strong>2×4 = 8 (Medium, within appetite).</p><p><strong>Evidence the auditor samples: </strong>the offboarding procedure; 25 of recent leavers with revocation timestamps; the last two access-review records; DLP alert logs; the SoA entries marking these controls applicable + implemented.</p></div><h1 id=\"sec7\">7. Implementation Roadmap — 4 to 9 Months</h1><p>A typical first-time implementation. SRXLABS engagements should hit the same milestones, faster for smaller scopes.</p><ol><li><strong>Month 1 — Initiate: </strong>secure executive sponsorship and budget; appoint a project lead; agree the scope; perform a gap analysis against clauses and Annex A.</li><li><strong>Month 2 — Context &amp; risk method: </strong>produce Clause 4 outputs (context, interested parties, scope); define the risk methodology and acceptance criteria; build the asset &amp; data inventory.</li><li><strong>Month 3 — Risk assessment: </strong>populate the risk register; score; assign owners; agree treatments; draft the SoA and RTP.</li><li><strong>Month 4 — Documentation: </strong>produce the policy hierarchy and all mandatory documented information.</li><li><strong>Month 5 — Implement controls: </strong>execute the RTP; wire each control to an automatic evidence source (tickets, logs, reports).</li><li><strong>Month 6 — Operate &amp; train: </strong>run awareness; controls operate and accumulate records; remediate any quick-find gaps.</li><li><strong>Month 7 — Internal audit (Clause 9.2): </strong>test against clauses and applicable controls; raise and close nonconformities (CAPA).</li><li><strong>Month 8 — Management review (Clause 9.3): </strong>run it with the required inputs and decision outputs; minute it.</li><li><strong>Month 9 — Certification: </strong>Stage 1 (documentation/readiness) then Stage 2 (implementation/operating effectiveness).</li></ol><p><strong>Common compression: </strong>for a 20–60-person SaaS using compliance automation tooling (Vanta/Drata/Sprinto), the same roadmap runs in 3–5 months because evidence collection is largely automated.</p><h1 id=\"sec8\">8. Certification, Surveillance, and Recertification</h1><h2>8.1 The three-year cycle</h2><p>Once certified, you are not done. ISO 27001 certification runs on a 3-year cycle: a full initial audit (Stage 1 + Stage 2) leading to certification, then two annual surveillance audits in years 1 and 2, then a full recertification audit in year 3. Each cycle restarts.</p><h2>8.2 Stage 1 (documentation review)</h2><p>The certification body reviews whether your ISMS is designed and documented. They check the scope, the SoA, the risk methodology, key policies, internal-audit and management-review evidence, and any prior corrective actions. Output: a Stage 1 report identifying any readiness gaps to fix before Stage 2. Typical duration: 1–2 days on-site/remote for a small org.</p><h2>8.3 Stage 2 (implementation audit)</h2><p>This is where certification is won or lost. The auditor tests whether the controls in your SoA are actually implemented and operating, by sampling evidence across the scope. They interview staff, inspect logs and records, observe operations, and verify the management system runs as documented. Typical duration: 3–10 days depending on scope size.</p><h2>8.4 Nonconformities at Stage 2</h2><ul><li><strong>Major nonconformity: </strong>a whole requirement is missing, or a control has systemically failed (e.g., no internal audit performed at all). Blocks certification until evidence of closure is provided.</li><li><strong>Minor nonconformity: </strong>an isolated lapse (e.g., 2 of 25 new joiners missed training). Certification can proceed conditional on an accepted CAPA plan.</li><li><strong>Observation / opportunity for improvement: </strong>not a failure — advice.</li></ul><h2>8.5 Surveillance and recertification</h2><p>Surveillance audits in years 1 and 2 are lighter — they verify that the ISMS is maintained: management reviews continue, internal audits run, NCs from the last audit are closed, and a sample of controls is still operating. Year-3 recertification is a full re-audit of the whole system, after which the cycle repeats.</p><h2>8.6 Worked Stage 2 case (typical)</h2><div class=\"callout info\"><div class=\"callout-title\">Stage 2 finding — awareness training</div><p><strong>Sample: </strong>auditor selects 10 of 28 new joiners over the 6-month period.</p><p><strong>Result: </strong>2 had no completed training record.</p><p><strong>Classification: </strong>minor nonconformity on A.6.3 — the control exists but wasn't consistently operated.</p><p><strong>5 Whys root cause: </strong>the onboarding checklist did not include a mandatory training step; HR could complete onboarding without it.</p><p><strong>Correction: </strong>assign + verify training for the two staff.</p><p><strong>Corrective action: </strong>make training a system-enforced gated step in the HR system; add a monthly completion report to management review.</p><p><strong>Outcome: </strong>certification issued with the corrective-action plan; verified at the year-1 surveillance audit.</p></div><h1 id=\"sec9\">9. Integration with Other Standards (Run One System, Certify Many)</h1><p>All recent ISO management-system standards share the “Annex SL” high-level structure — same clause numbering, same requirements for context, leadership, planning, etc. That means one set of governance documents (one policy framework, one internal-audit programme, one management review) can satisfy multiple standards simultaneously.</p><ul><li><strong>ISO 9001 (quality) </strong>— same structure; a manufacturer often runs both.</li><li><strong>ISO 22301 (business continuity) </strong>— same structure; covers BIA, BCP, DR maturity.</li><li><strong>ISO 27017 / 27018 </strong>— control extensions for cloud / PII in cloud.</li><li><strong>ISO 27701 (PIMS) </strong>— layered on 27001 to demonstrate GDPR/DPDPA alignment.</li><li><strong>ISO 42001 (AI management system) </strong>— new (2023); same Annex SL pattern; relevant for clients with significant AI use.</li></ul><p><strong>Practical impact: </strong>tell a client they can build one Integrated Management System (IMS) and run a single audit cycle covering ISO 27001 + 27701 + 22301. The marginal cost of adding standards drops sharply after the first.</p><h1 id=\"sec10\">10. Templates (Use Verbatim)</h1><h2>10.1 Risk methodology document — minimum contents</h2><ul><li>Purpose &amp; scope; risk-assessment process (steps); likelihood and impact scales; combined-score matrix; risk-acceptance criteria; risk-treatment options; roles; review frequency; integration with risk register.</li></ul><h2>10.2 Internal audit programme excerpt</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Clause/Control</th><th>Test</th><th>Sample</th><th>Evidence</th></tr></thead><tbody><tr><td>6.1.3 / SoA</td><td>Trace 5 risks to controls</td><td>5 risks</td><td>Risk register + SoA</td></tr><tr><td>A.5.18 Access rights</td><td>Inspect quarterly reviews; reperform 1</td><td>2 of 4 qtrs</td><td>Signed review sheets</td></tr><tr><td>A.8.13 Backup</td><td>Inspect logs; confirm a restore test</td><td>Monthly</td><td>Restore-test record</td></tr><tr><td>9.3 Mgmt review</td><td>Inspect minutes; check required inputs</td><td>All in period</td><td>Meeting minutes</td></tr></tbody></table></div><h2>10.3 Nonconformity &amp; CAPA record</h2><pre class=\"code\"><code>NC-2026-007  Date: 2026-05-20  Source: Internal audit\nStandard ref: A.6.3 (Awareness)\nFinding: 2 of 10 sampled joiners lack a training record.\nClassification: Minor\nRoot cause (5 Whys): onboarding checklist had no mandatory training step.\nCorrection (instance): assigned + verified training for the 2 staff.\nCorrective action (root): system-enforced gate in HR system + monthly KPI.\nOwner: Head of People    Due: 2026-06-30\nVerification: next surveillance audit; KPI report monthly to mgmt review.</code></pre><h2>10.4 Management review agenda (Clause 9.3 inputs)</h2><ul><li>Status of actions from prior reviews; changes in external/internal issues; interested-party feedback; ISMS performance (NCs, monitoring, audit results, objectives); risk assessment status &amp; RTP; improvement opportunities. Outputs: decisions on improvement and resource needs, minuted with owners and dates.</li></ul><h1 id=\"sec11\">11. Cases, Pitfalls, and How They Cost Certification</h1><h2>11.1 Patterns that cause certification failure</h2><ul><li><strong>SoA controls not traceable to risks </strong>— controls marked applicable with no risk in the register that justifies them. Auditor: “why is this control here?” — silence = nonconformity.</li><li><strong>Scope drawn to dodge risky systems </strong>— if the system holding customer data is “out of scope,” the certificate is worthless. Sophisticated buyers read the scope first.</li><li><strong>No evidence of internal audit or management review </strong>— both are mandatory and frequently skipped by first-timers. Either alone is a major nonconformity.</li><li><strong>Controls implemented but not operated </strong>— the policy exists; the records don't. Always operating-effectiveness fail.</li><li><strong>Risk register frozen after the initial assessment </strong>— no updates, no review evidence. Implies the ISMS is dormant.</li><li><strong>Evidence bulk-created the week of the audit </strong>— metadata gives it away; an integrity issue, not a control issue.</li></ul><h2>11.2 Sector cases worth knowing</h2><p>Most ISO 27001 cases are private (the certificate is the proof, the audit detail isn't public). But pattern lessons:</p><ul><li><strong>A SaaS startup </strong>lost a major enterprise deal because the auditor's report stated that 'production' was out of scope. Lesson: scope must reflect where customer-relevant risk lives, not where it's easiest.</li><li><strong>A fintech </strong>passed Stage 1 but failed Stage 2 because backups (A.8.13) had never been restore-tested in over 18 months. Lesson: “we back up nightly” is half a control; “we back up nightly AND restore-test quarterly” is the whole control.</li><li><strong>A consulting firm </strong>received a major NC for an absent supplier-management process (A.5.19–5.23) despite using 40+ SaaS tools. Lesson: third-party/cloud is not optional in 2022.</li></ul><h1 id=\"sec12\">12. Hands-On Labs</h1><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Scope and 10-row SoA (60 min)</div><p>For SRXLABS, write a one-paragraph ISMS scope (what / where / supporting functions / any exclusions with justification). Then build a 10-row SoA covering 5 of the new 2022 controls and 5 classic ones — each row with applicability, justification tied to a risk ID, status, and owner.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Risk-to-evidence chain (45 min)</div><p>Pick one risk from the GRC module register (e.g. R-014 VPN exploit). Walk it through: select Annex A controls, draft an implementation, estimate residual, and list the exact evidence an auditor would request.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Internal audit a control (45 min)</div><p>Pick A.5.18 (access rights). Define the test, the population, the sample size, the evidence requested. Then write any finding using the 5-C's format. State whether it's design or operating effectiveness.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — 5 Whys to CAPA (30 min)</div><p>Backups exist but have never been restore-tested. Run the 5 Whys to root cause; write the correction (instance fix) vs the corrective action (root-cause fix); define how you would verify closure at the next audit.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 5 — Management review minutes (45 min)</div><p>Draft mock minutes of a Clause 9.3 management review meeting that include EVERY required input and at least three decision outputs with owners and dates. Use it as a template for client engagements.</p></div><h1 id=\"sec13\">13. Lead Implementer / Interview Q&amp;A</h1><ul><li><strong>Q: Difference between ISO 27001 and ISO 27002? </strong>A: 27001 is the certifiable requirements; 27002 is implementation guidance for Annex A. You certify against 27001 and READ 27002.</li><li><strong>Q: What links risks to controls? </strong>A: The Statement of Applicability — every applicable control justified by a risk in the register.</li><li><strong>Q: Stage 1 vs Stage 2? </strong>A: Documentation/readiness vs implementation/operating-effectiveness sampling.</li><li><strong>Q: Major vs minor nonconformity? </strong>A: Major = whole requirement missing or systemic failure (blocks cert); minor = isolated lapse (CAPA plan).</li><li><strong>Q: Name five new 2022 controls. </strong>A: e.g., 5.7 threat intel, 5.23 cloud security, 8.9 config mgmt, 8.11 data masking, 8.28 secure coding.</li><li><strong>Q: Mandatory documents — name five. </strong>A: ISMS scope; infosec policy; risk-assessment process &amp; results; SoA; internal-audit programme &amp; results (others: RTP, objectives, mgmt review, NCs/CAPA).</li><li><strong>Q: Required inputs to management review? </strong>A: Prior actions; external/internal issues; interested-party feedback; performance (NCs, monitoring, audit, objectives); risk results; improvement opportunities.</li><li><strong>Q: Correction vs corrective action? </strong>A: Correction fixes the specific instance; corrective action removes the root cause to prevent recurrence.</li><li><strong>Q: Certification cycle length? </strong>A: Initial certification, then annual surveillance (yr 1 &amp; 2), then full recertification at year 3.</li><li><strong>Q: How does 27001 integrate with GDPR/DPDPA? </strong>A: Layer ISO 27701 (PIMS) on 27001 to demonstrate alignment; share the ISMS for governance &amp; evidence.</li></ul><h1 id=\"sec14\">14. Glossary, Certifications, and Next Steps</h1><h2>14.1 Glossary</h2><ul><li><strong>ISMS: </strong>Information Security Management System.</li><li><strong>SoA: </strong>Statement of Applicability — the list of all 93 Annex A controls with applicability + justification + status.</li><li><strong>RTP: </strong>Risk Treatment Plan — what gets done, by whom, by when, with what resources.</li><li><strong>NC / CAPA: </strong>Nonconformity / Corrective and Preventive Action.</li><li><strong>IMS: </strong>Integrated Management System (one system certified against multiple ISO standards).</li><li><strong>CIA: </strong>Confidentiality, Integrity, Availability.</li><li><strong>Annex SL: </strong>the shared high-level structure across recent ISO management-system standards.</li></ul><h2>14.2 Certifications mapping to this module</h2><ul><li><strong>ISO/IEC 27001 Lead Implementer </strong>(PECB / IBITGQ) — the immediate target; you implement and run an ISMS.</li><li><strong>ISO/IEC 27001 Lead Auditor </strong>— you assess and certify ISMSs; great complement.</li><li><strong>CISA (ISACA) </strong>— IT audit broadly; reinforces audit techniques.</li><li><strong>CISM / CISSP </strong>— security management.</li></ul><h2>14.3 One-line cheat sheet</h2><p><strong>Clauses 4–10 + Annex A 93 controls in 4 themes. </strong>PDCA. SoA links risks → controls. Mandatory docs: scope, policy, risk process &amp; results, SoA, RTP, objectives, internal audit, mgmt review, NCs/CAPA. Stage 1 then Stage 2; surveillance yr 1–2; recert yr 3. NCs: Major / Minor / Observation. 5 Whys → Correction + Corrective Action.</p><div class=\"callout info\"><div class=\"callout-title\">Mastery check — you can pass an LI viva if you can…</div><p>1. Recite clauses 4–10 with one 'shall' for each.</p><p>2. List the mandatory documented information from memory.</p><p>3. Explain the SoA and walk a risk to evidence end-to-end.</p><p>4. Name the 4 themes, the 11 new controls, and the 5 attributes.</p><p>5. Differentiate Stage 1, Stage 2, surveillance, recertification.</p><p>6. Distinguish correction from corrective action and run a 5 Whys.</p><p>7. Draft management-review inputs from memory.</p></div>","sections":[{"id":"sec1","title":"1. ISO/IEC 27001 — What It Is and Why It Dominates"},{"id":"sec2","title":"2. The Structure of the Standard"},{"id":"sec3","title":"3. Clauses 4 & 5 — Context and Leadership"},{"id":"sec4","title":"4. Clause 6 — Planning (The Heart of the Standard)"},{"id":"sec5","title":"5. Clauses 7–10 — Support, Operation, Performance, Improvement"},{"id":"sec6","title":"6. Annex A in Depth — The 93 Controls"},{"id":"sec7","title":"7. Implementation Roadmap — 4 to 9 Months"},{"id":"sec8","title":"8. Certification, Surveillance, and Recertification"},{"id":"sec9","title":"9. Integration with Other Standards (Run One System, Certify Many)"},{"id":"sec10","title":"10. Templates (Use Verbatim)"},{"id":"sec11","title":"11. Cases, Pitfalls, and How They Cost Certification"},{"id":"sec12","title":"12. Hands-On Labs"},{"id":"sec13","title":"13. Lead Implementer / Interview Q&A"},{"id":"sec14","title":"14. Glossary, Certifications, and Next Steps"}]},{"id":"03","navTitle":"SOC 2","title":"SOC 2","subtitle":"Trust Services Criteria & Attestation","html":"<h1 id=\"sec1\">1. What SOC 2 Is (Precisely)</h1><p><strong>SOC 2</strong> stands for <strong>System and Organization Controls 2</strong>. It is an <strong>attestation report</strong> issued by a licensed CPA firm under the AICPA's <strong>SSAE 18 / AT-C 205</strong> standard, reporting on whether a service organisation's controls are suitably designed and operating effectively against the <strong>Trust Services Criteria (TSC)</strong>. It is the de-facto trust signal for SaaS and cloud businesses selling into the United States and, increasingly, globally. Most enterprise procurement teams treat SOC 2 like an entry-ticket: no report, no contract.</p><p>A common source of confusion: SOC 2 is not a certification. ISO 27001 is a certification — you pass and get a certificate. SOC 2 is an auditor's opinion in a detailed report that enterprise buyers read under NDA. The opinion can be unqualified (clean), qualified (effective except for specific issues), adverse, or a disclaimer. The substance of the report — system description, controls listed, tests performed, exceptions noted — is what your prospects evaluate.</p><h2>1.1 History (so you can speak to seasoned procurement teams)</h2><p>Back in the 1990s and 2000s, the standard was SAS 70 — a financial-controls report largely used by outsourcers serving public companies under SOX. As cloud and SaaS exploded, the market needed assurance over more than just financial-reporting controls. The AICPA issued SSAE 16 in 2011, splitting the world into SOC 1 (controls relevant to financial reporting) and SOC 2 (security, availability, confidentiality, processing integrity, privacy). SSAE 18 replaced SSAE 16 in 2017, tightening requirements for using subservice organisations and risk assessment. SOC 2 today runs under SSAE 18 / AT-C 105 and AT-C 205.</p><h2>1.2 The SOC family</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Report</th><th>Subject</th><th>Audience</th><th>Distribution</th></tr></thead><tbody><tr><td>SOC 1 (Type I/II)</td><td>Controls relevant to a customer's financial reporting</td><td>Customer's auditors</td><td>Restricted</td></tr><tr><td>SOC 2 (Type I/II)</td><td>Security, availability, confidentiality, processing integrity, privacy</td><td>Customers' management &amp; risk teams</td><td>Restricted (NDA)</td></tr><tr><td>SOC 3</td><td>Public summary of a SOC 2</td><td>Marketing / public</td><td>Public, no detail</td></tr><tr><td>SOC for Cybersecurity</td><td>Enterprise cyber risk program (broader, board-level)</td><td>Boards, regulators</td><td>Selectively shared</td></tr><tr><td>SOC for Supply Chain</td><td>Production/distribution controls</td><td>Customers in supply chain</td><td>Restricted</td></tr></tbody></table></div><h2>1.3 SOC 2 vs ISO 27001 — the question every client asks</h2><p>You need to answer this fluently in client conversations. Both standards prove security to buyers; they differ in shape and audience.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Dimension</th><th>ISO 27001</th><th>SOC 2</th></tr></thead><tbody><tr><td>What you get</td><td>Pass/fail certificate</td><td>Detailed report + auditor opinion</td></tr><tr><td>Recognition</td><td>Global; strong in EU/India/APAC</td><td>US-centric (but global for SaaS)</td></tr><tr><td>Focus</td><td>Whole managed ISMS</td><td>Controls over a specific service</td></tr><tr><td>Period</td><td>Initial + surveillance + recert (3-yr)</td><td>Point in time (Type I) or period (Type II)</td></tr><tr><td>Who attests</td><td>Accredited certification body</td><td>Licensed CPA firm</td></tr><tr><td>Customer-readable detail</td><td>Limited (certificate + scope)</td><td>Extensive (every control + test result)</td></tr><tr><td>Cost (typical)</td><td>Higher initial; lower ongoing</td><td>Lower initial Type I; ongoing Type II annually</td></tr></tbody></table></div><p><strong>Practical recommendation: </strong>many SaaS firms eventually do both because they sell to both markets. Done well, one control set feeds both audits (use the crosswalk). For SRXLABS clients targeting US enterprise, start with SOC 2 Type II; for European, government, or Asia-Pacific buyers, start with ISO 27001.</p><h1 id=\"sec2\">2. The Trust Services Criteria (TSC) in Depth</h1><p>SOC 2 is built on five Trust Services Criteria categories. </p><div class=\"tbl-wrap\"><table><thead><tr><th>Category</th><th>When to include it</th><th>Typical controls</th></tr></thead><tbody><tr><td>Security (CC) — always</td><td>Required; the Common Criteria</td><td>MFA, access reviews, change mgmt, monitoring</td></tr><tr><td>Availability</td><td>You promise uptime/SLAs to customers</td><td>Monitoring, capacity, DR, backup, restore tests</td></tr><tr><td>Confidentiality</td><td>You hold data customers designated 'confidential'</td><td>Encryption, NDAs, classification, secure disposal</td></tr><tr><td>Processing Integrity</td><td>You process transactions for customers (e.g. payments)</td><td>Input validation, reconciliation, error handling</td></tr><tr><td>Privacy</td><td>You handle personal information of individuals</td><td>Notice, consent, retention, disposal, choice</td></tr></tbody></table></div><p><strong>Scoping advice: </strong>do NOT over-include categories. Each category you add adds controls that must be designed and operated. Privacy and Processing Integrity in particular impose real burden. Pick the categories that match commitments you genuinely make to customers.</p><h2>2.1 Points of Focus (the implementer's secret weapon)</h2><p>Each TSC criterion is accompanied by “points of focus” — specific considerations the AICPA suggests when designing controls. They are not mandatory checkboxes, but they describe what “good” looks like and are what auditors implicitly use when evaluating your controls. For each criterion you apply, read its points of focus carefully and ensure your control set addresses each.</p><h2>2.2 The Nine Common Criteria (CC1–CC9) — deep dive</h2><p>Security is articulated as nine Common Criteria series. They map directly onto the five components of the </p><h3>CC1 — Control Environment</h3><p>Foundational: ethics, integrity, board oversight, organisational structures, commitment to competence, accountability. Auditors will ask to see code of conduct, organisation chart, board minutes covering security, hiring/screening evidence, and disciplinary processes.</p><h3>CC2 — Communication and Information</h3><p>Quality information is generated and used; communicated internally (objectives, roles, accountability) and externally (privacy notices, breach communications). Auditors look for documented communication plans, internal/external messaging examples, and how complaints/feedback are handled.</p><h3>CC3 — Risk Assessment</h3><p>The organisation identifies risks to objectives, analyses them, and considers fraud. Required artefact: a documented annual risk assessment with results, treated risks, and owners — the same artefact you produce for ISO 27001's clause 6.</p><h3>CC4 — Monitoring Activities</h3><p>Ongoing and separate evaluations confirm that components of internal control function as intended; deficiencies are communicated and remediated. Evidence: internal-audit reports, control-testing logs, deficiency trackers, management review of issues.</p><h3>CC5 — Control Activities</h3><p>Selection and development of control activities; deployment through policies and procedures; technology controls. Evidence: control matrix, policies, procedures, and proof that controls are deployed and operating.</p><h3>CC6 — Logical and Physical Access (the biggest, busiest series)</h3><ul><li><strong>CC6.1 </strong>— logical access security software/infrastructure (MFA, password policy, federation).</li><li><strong>CC6.2 </strong>— register/authorise new users before issuing credentials; remove access when no longer needed.</li><li><strong>CC6.3 </strong>— manage user access throughout the lifecycle (changes, reviews).</li><li><strong>CC6.4 </strong>— physical access restrictions to facilities and assets.</li><li><strong>CC6.5 </strong>— discontinue logical and physical access when no longer required (offboarding).</li><li><strong>CC6.6 </strong>— protect against external threats from outside the system boundary.</li><li><strong>CC6.7 </strong>— restrict the transmission, movement, and removal of information (encryption, DLP).</li><li><strong>CC6.8 </strong>— prevent or detect/correct unauthorised software (endpoint protection, allowlisting).</li></ul><h3>CC7 — System Operations</h3><ul><li><strong>CC7.1 </strong>— detection of vulnerabilities and config issues (vuln scanning, baseline monitoring).</li><li><strong>CC7.2 </strong>— monitor system components for anomalies; SIEM, log review.</li><li><strong>CC7.3 </strong>— evaluate security events to determine response.</li><li><strong>CC7.4 </strong>— respond to identified security incidents (IR plan, response evidence).</li><li><strong>CC7.5 </strong>— develop and implement recovery activities (DR, BC, lessons learned).</li></ul><h3>CC8 — Change Management</h3><ul><li><strong>CC8.1 </strong>— authorise, design, develop, configure, document, test, approve, and implement changes. The control that catches most operating-effectiveness exceptions because every push to production must show a paper trail.</li></ul><h3>CC9 — Risk Mitigation</h3><ul><li><strong>CC9.1 </strong>— identify, select, and develop risk-mitigation activities for business disruption.</li><li><strong>CC9.2 </strong>— vendor and business-partner risk management (assessments, contracts, monitoring).</li></ul><div class=\"callout info\"><div class=\"callout-title\">Where most SOC 2 exceptions actually arise</div><p>CC6.2/6.3 (access provisioning + reviews), CC6.5 (offboarding within SLA), CC7.2 (someone actually reviews the SIEM alerts), CC8.1 (every prod change has a tested + approved trail), and CC9.2 (you actually reviewed vendor SOC 2s). Engineer your operations so these five generate clean automatic evidence and you will pass.</p></div><h1 id=\"sec3\">3. Type I vs Type II and the Observation Window</h1><p>Every SOC 2 is either Type I or Type II. The difference is profound — they sound similar but answer different questions, and buyers strongly prefer Type II.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Dimension</th><th>Type I</th><th>Type II</th></tr></thead><tbody><tr><td>Question answered</td><td>Are controls SUITABLY DESIGNED at this point?</td><td>Have controls OPERATED EFFECTIVELY over a period?</td></tr><tr><td>Timing</td><td>A single date (a snapshot)</td><td>A continuous period (commonly 3, 6, or 12 months)</td></tr><tr><td>Evidence</td><td>Walkthroughs, inspections at the date</td><td>Sampling across the period; multiple instances</td></tr><tr><td>Buyer perception</td><td>Lower trust (snapshot, easily passed)</td><td>Higher trust (sustained performance)</td></tr><tr><td>Typical use</td><td>First report to unblock a deal</td><td>The annual report enterprises really want</td></tr></tbody></table></div><h2>3.1 The observation window in practice</h2><p>During the window, every in-scope control must operate continuously and produce contemporaneous evidence. If you have a quarterly access review and the window is 6 months, the auditor expects to see 2 reviews completed within the window, on time, with signed records. Miss one and that's an exception.</p><p><strong>How long should the window be? </strong>Common choices: 3 months (fast first report, lower assurance), 6 months (good first-cycle balance), 12 months (mature, audit-aligned with fiscal year). Once established, most clients move to a 12-month annual cycle.</p><div class=\"callout warn\"><div class=\"callout-title\">Why “it operated mostly” isn't good enough</div><p>Imagine the window is 6 months, and your quarterly access review was skipped in month 3 because the reviewer was on leave. The auditor pulls the population (2 expected reviews); finds only 1; that's an exception on CC6.3. Even one missing run of a critical control can taint the report. Build redundancy into ownership (designated backups), automate scheduling, and treat each control as something that must run on time, every time, like payroll.</p></div><h2>3.2 The dual-report strategy (real-world)</h2><p>Many startups issue Type I quickly (often within 60–90 days of starting readiness) to unblock a deal, then complete the Type II window and issue Type II a few months later. Some buyers now require Type II out of the gate, so plan accordingly.</p><h1 id=\"sec4\">4. System Boundary, Subservice Organisations, and CUECs</h1><p>SOC 2 covers a specific “system” — not the whole company. Drawing the boundary correctly is critical; everything inside is audited, everything outside is not.</p><h2>4.1 The system description (Section 3 of the report)</h2><p>You must describe: services offered, infrastructure (cloud, network, devices), software, people, data, processes &amp; procedures, and the boundaries. The description must be accurate — if it omits a key component, the report's value is undermined and the auditor can refuse to issue it.</p><h2>4.2 Subservice organisations</h2><p>Your cloud provider (AWS, GCP, Azure), payments processor (Stripe), or other vendors that provide infrastructure or services to your system are “subservice organisations.” Two ways to handle them:</p><ul><li><strong>Carve-out method (common): </strong>exclude the subservice org's controls from your description. You rely on their own SOC 2 (or similar) and list complementary user-entity controls you operate on top. Cleanest for SaaS on top of hyperscalers.</li><li><strong>Inclusive method (rare): </strong>fold the subservice org's controls into your report, with their cooperation. Heavy operationally; usually only for tightly integrated services.</li></ul><h2>4.3 CUECs — Complementary User-Entity Controls</h2><p>CUECs are controls your CUSTOMER must operate for the system to be secure end-to-end. Your report explicitly lists them so customers know their responsibilities. Examples for a typical SaaS:</p><ul><li>Customer manages provisioning/deprovisioning of their own users in the application.</li><li>Customer configures SSO and enforces MFA in their identity provider.</li><li>Customer reviews API keys and rotates them periodically.</li><li>Customer encrypts data they upload that is more sensitive than their tier.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Forgetting CUECs is a frequent rookie mistake</div><p>If your report omits CUECs, the auditor may conclude that your system, as described, doesn't actually achieve the criteria without your customer doing something. You'd then take ownership of risks that aren't yours. Always include a clear CUEC section.</p></div><h1 id=\"sec5\">5. Anatomy of a SOC 2 Report</h1><p>Every SOC 2 report has the same five sections. Know each from both chairs: as the writer and as the buyer reading 30 of them.</p><ol><li><strong>Section 1 — Independent Service Auditor's Report (the opinion). </strong>The CPA's conclusion. Buyers flip here first.</li><li><strong>Section 2 — Management Assertion. </strong>Management's written statement about the system and the suitability/operating effectiveness of its controls. Signed.</li><li><strong>Section 3 — Description of the System. </strong>The narrative: services, infrastructure, software, people, data, processes, boundaries, subservice orgs, CUECs.</li><li><strong>Section 4 — Trust Services Criteria, Controls, Tests, and Results. </strong>The meat: every TSC criterion in scope, the controls mapped to it, the tests performed (inquiry, inspection, observation, reperformance), and any exceptions noted.</li><li><strong>Section 5 — Other Information (optional). </strong>Management's responses to exceptions, roadmap items, ancillary disclosures.</li></ol><h2>5.1 Reading the opinion (Section 1)</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Opinion</th><th>Meaning</th><th>Buyer reaction</th></tr></thead><tbody><tr><td>Unqualified (clean)</td><td>Controls suitably designed (Type I) AND operating effectively (Type II)</td><td>Pass; expected</td></tr><tr><td>Qualified</td><td>Effective except for specific noted exceptions</td><td>Acceptable if exceptions minor &amp; remediated</td></tr><tr><td>Adverse</td><td>Controls not effective</td><td>Red flag; deal likely lost</td></tr><tr><td>Disclaimer</td><td>Auditor could not gather sufficient evidence to form an opinion</td><td>Treated as worse than adverse</td></tr></tbody></table></div><h2>5.2 Reading Section 4 — the substance</h2><p>Section 4 is the longest. Each criterion lists the controls you operate to meet it, then for each control the test performed and the result. Look out for the phrase “no exceptions noted” (good) vs an exception (auditor describes what was found and the deviation). A handful of minor exceptions, with management responses showing root-cause fixes, is normal and usually acceptable to buyers. Many or systemic exceptions, or exceptions on critical controls (CC6.1 MFA, CC8.1 change), raise serious concerns.</p><h1 id=\"sec6\">6. Readiness Roadmap (How to Actually Get One)</h1><p>A typical first SOC 2 Type II runs 6–10 months end to end. Sequence:</p><ol><li><strong>Define scope </strong>— choose TSC categories and the system boundary.</li><li><strong>Gap assessment </strong>— compare current controls to the chosen criteria (often done by SRXLABS in 2–3 weeks).</li><li><strong>Remediate </strong>— fill gaps: access reviews, change management, IR plan, vendor reviews, logging review, risk assessment.</li><li><strong>Select an auditor + tooling </strong>— engage a CPA firm (cost typically ₹12–40 lakh for SMBs in India); deploy Vanta/Drata/Sprinto/Secureframe to auto-collect evidence.</li><li><strong>Operate the window </strong>— controls run continuously; evidence accumulates automatically.</li><li><strong>Fieldwork </strong>— auditor samples evidence, interviews, and tests.</li><li><strong>Report issued </strong>— share under NDA with prospects/customers.</li><li><strong>Annual renewal </strong>— repeat the cycle for the next period.</li></ol><h2>6.1 Compliance automation tooling — what to expect</h2><p>Tools like Vanta, Drata, Sprinto, and Secureframe connect to your identity provider, cloud accounts, HR system, and code host. They continuously check that controls are operating (e.g. “every user has MFA,” “no EC2 instance has port 22 open to the internet”) and surface drift instantly. They auto-collect screenshots, configs, and ticket links as evidence, dramatically reducing audit prep time. Cost (small firm): roughly ₹15–30 lakh/yr for tooling plus ₹20–40 lakh for the audit itself. Worth it once.</p><h2>6.2 The control matrix (your central artefact)</h2><p>Build a single matrix with: TSC reference — control statement — owner — frequency — evidence source — auditor test. Sample rows:</p><div class=\"tbl-wrap\"><table><thead><tr><th>TSC</th><th>Control</th><th>Frequency</th><th>Evidence</th></tr></thead><tbody><tr><td>CC6.1</td><td>MFA enforced on all production access</td><td>Continuous</td><td>IdP config + access logs</td></tr><tr><td>CC6.2/6.3</td><td>Access granted via approved ticket; quarterly review</td><td>Per request / qtr</td><td>Tickets + signed review</td></tr><tr><td>CC6.5</td><td>Access revoked within 24h of termination</td><td>Per event</td><td>HR + IdP timestamps</td></tr><tr><td>CC7.2</td><td>SIEM alerts triaged &amp; resolved</td><td>Daily/weekly</td><td>SIEM tickets + reviews</td></tr><tr><td>CC7.3/7.4</td><td>Incidents managed per IR plan</td><td>Per incident</td><td>IR plan + postmortems</td></tr><tr><td>CC8.1</td><td>Changes reviewed, tested, approved</td><td>Per change</td><td>PRs + CI test runs</td></tr><tr><td>A1.2</td><td>Backups performed and restore-tested</td><td>Daily/qtr</td><td>Backup logs + restore test</td></tr><tr><td>C1.1</td><td>Confidential data encrypted in transit/rest</td><td>Continuous</td><td>TLS config + KMS config</td></tr></tbody></table></div><h1 id=\"sec7\">7. Real Exceptions, Case Studies, and Lessons</h1><div class=\"callout info\"><div class=\"callout-title\">Case 1 — the emergency change that did NOT become an exception</div><p><strong>Setup: </strong>Type II, CC8.1 requires PR review + approval for all production changes.</p><p><strong>Sample: </strong>auditor pulls 25 of 180 changes; finds 1 emergency hotfix pushed without a PR.</p><p><strong>Why it survived: </strong>an emergency-change procedure existed, the fix was approved retroactively within 24h via ticket, and it was a one-off in 180 events.</p><p><strong>Outcome: </strong>auditor notes it as observed but does not record an exception; opinion remains unqualified.</p><p><strong>Lesson: </strong>even break-glass actions need a documented, evidenced path. 'We'll fix it later' becomes an exception; 'we followed the documented emergency procedure' does not.</p></div><div class=\"callout info\"><div class=\"callout-title\">Case 2 — access reviews skipped, certification delayed</div><p><strong>Setup: </strong>Type II Q1–Q4; CC6.3 quarterly access reviews.</p><p><strong>Sample: </strong>auditor pulls 4 expected reviews; finds 3 — Q3 was skipped because the reviewer was on parental leave with no backup.</p><p><strong>Classification: </strong>exception noted; opinion becomes qualified on CC6.3.</p><p><strong>Lesson: </strong>single-owner controls fail when the owner is unavailable. Always designate a documented backup; automate scheduling and reminders.</p></div><div class=\"callout info\"><div class=\"callout-title\">Case 3 — logging without review</div><p><strong>Setup: </strong>CC7.2 requires monitoring of security events.</p><p><strong>Finding: </strong>logs were collected centrally, but reviewing them was nobody's job in writing. The auditor asked for evidence of triage and got blank stares.</p><p><strong>Outcome: </strong>qualified opinion on CC7.2 with material remediation required.</p><p><strong>Lesson: </strong>collecting logs is half a control; reviewing/triaging them is the rest. Both halves need evidence — alerts, ticket queues, weekly review sign-off.</p></div><h2>7.1 Common pitfalls</h2><ul><li>Treating SOC 2 as a one-time event — it's a recurring annual report; controls must run all year.</li><li>Evidence created the week of the audit — file metadata gives it away; it's an integrity finding, not a control finding.</li><li>Over-scoping TSC categories — only commit to Privacy/Processing Integrity if you can sustain them.</li><li>Ignoring CUECs — forgetting to state what customers must do.</li><li>Stale risk assessment — CC3 requires it annual; auditors check the date.</li><li>Subservice orgs not addressed — your AWS responsibility split must be explicit.</li></ul><h1 id=\"sec8\">8. SOC 2 ↔ ISO 27001 Crosswalk (Run One Programme)</h1><p>Most controls cleanly map both ways. Build this crosswalk once and an ISO-certified org becomes SOC 2-ready in a fraction of the effort (and vice versa). A starter map:</p><div class=\"tbl-wrap\"><table><thead><tr><th>Theme</th><th>SOC 2 (TSC)</th><th>ISO 27001 (Annex A)</th></tr></thead><tbody><tr><td>Governance &amp; policy</td><td>CC1.x, CC2.x, CC5.x</td><td>A.5.1, A.5.2, A.5.4</td></tr><tr><td>Risk assessment</td><td>CC3.x</td><td>Clauses 6.1.2/8.2; A.5</td></tr><tr><td>Access management</td><td>CC6.1–6.3, 6.5</td><td>A.5.15–5.18, A.8.2, A.8.3, A.8.5</td></tr><tr><td>Encryption + data security</td><td>CC6.7, C1.1</td><td>A.8.24, A.8.10–8.12</td></tr><tr><td>Monitoring &amp; incident response</td><td>CC7.x</td><td>A.5.24–5.27, A.8.15, A.8.16</td></tr><tr><td>Change management</td><td>CC8.1</td><td>A.8.32</td></tr><tr><td>Vendor &amp; third-party</td><td>CC9.2</td><td>A.5.19–5.23</td></tr><tr><td>BC / DR / Availability</td><td>A1.x</td><td>A.5.29–5.30</td></tr><tr><td>Awareness &amp; training</td><td>CC1.4</td><td>A.6.3</td></tr><tr><td>Asset &amp; data classification</td><td>CC2.x, CC6.4</td><td>A.5.9–5.13</td></tr></tbody></table></div><p><strong>Practical use: </strong>engineer your control set once. Tag each control with both its SOC 2 reference and its ISO 27001 reference. Now every artefact — access review record, IR plan, backup test — satisfies both auditors simultaneously.</p><h1 id=\"sec9\">9. Hands-On Labs</h1><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Choose your TSC categories (30 min)</div><p>For a B2B SaaS that processes customer PII and promises 99.9% uptime but does no financial transactions, which TSC categories should be in scope and why? (Answer: Security mandatory; add Availability + Confidentiality + Privacy. Skip Processing Integrity — you don't process transactions.) Write a one-paragraph justification you would put in front of management.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Build a 10-row control matrix (60 min)</div><p>Design 10 controls across CC6, CC7, CC8 and one Availability control. For each row capture: TSC ref, control statement, owner, frequency, the evidence source, and the auditor test that would be performed. Use the matrix in Section 6.2 as a template.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Read and rate an opinion (20 min)</div><p>Given a SOC 2 report (real or sample) with 3 noted exceptions, decide whether you'd accept it as a buyer. State which exceptions are concerning (e.g. on CC6.1 MFA) vs tolerable (e.g. one missed monthly backup-test).</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — Map SOC 2 to ISO 27001 (45 min)</div><p>Take 8 of your controls; tag each with its SOC 2 (TSC) reference and its ISO 27001 (Annex A) reference. The output is the artefact that lets one programme satisfy two audits.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 5 — Draft CUECs (30 min)</div><p>Write 5 CUECs for a typical SaaS your client runs. Each should be a customer-side action without which the SOC 2 system description doesn't hold (e.g. customer enforces MFA on their IdP).</p></div><h1 id=\"sec10\">10. Interview / Sales Q&amp;A</h1><ul><li><strong>Q: Is SOC 2 a certification? </strong>A: No — it's a CPA attestation report/opinion under SSAE 18.</li><li><strong>Q: Which TSC categories are mandatory? </strong>A: Security (Common Criteria). The rest are optional based on commitments.</li><li><strong>Q: Type I vs II in one line? </strong>A: Design at a point in time vs design AND operation over a period.</li><li><strong>Q: What are the 9 Common Criteria? </strong>A: CC1 control environment; CC2 communication &amp; info; CC3 risk assessment; CC4 monitoring; CC5 control activities; CC6 access; CC7 system operations; CC8 change; CC9 risk mitigation.</li><li><strong>Q: What's a CUEC and why include it? </strong>A: A control the customer must perform for the system to meet the criteria; including them clarifies the responsibility split.</li><li><strong>Q: Carve-out vs inclusive? </strong>A: Exclude subservice org's controls and rely on their own SOC 2 (carve-out, common) vs fold them in (inclusive, rare).</li><li><strong>Q: Five report sections? </strong>A: Opinion; Management Assertion; System Description; Controls/Tests/Results; Other Information (optional).</li><li><strong>Q: What turns one missed control into an exception? </strong>A: It happens during the observation window AND in the sample; even one missed run can become an exception (e.g. a skipped quarterly access review).</li><li><strong>Q: Which controls cause the most exceptions? </strong>A: CC6.2/6.3 access reviews, CC6.5 offboarding, CC7.2 monitoring/review, CC8.1 change management, CC9.2 vendor reviews.</li><li><strong>Q: How does SOC 2 relate to ISO 27001? </strong>A: Different shape (report+opinion vs certification), different audience (US vs global), but the underlying controls overlap heavily — build one control set, map to both.</li></ul><h1 id=\"sec11\">11. Glossary, Certifications, and Next Steps</h1><h2>11.1 Glossary</h2><ul><li><strong>TSC: </strong>Trust Services Criteria — the five categories SOC 2 reports against.</li><li><strong>CC: </strong>Common Criteria — the nine series under Security.</li><li><strong>SSAE 18 / AT-C 205: </strong>the AICPA attestation standards SOC 2 runs under.</li><li><strong>CUEC: </strong>Complementary User-Entity Control — a customer-side control your description depends on.</li><li><strong>Subservice organisation: </strong>a vendor whose controls your service relies on (e.g., AWS).</li><li><strong>Points of Focus: </strong>AICPA-suggested considerations beneath each criterion; describe what good looks like.</li><li><strong>Exception: </strong>a sampled item where a control did not operate as designed; recorded in Section 4.</li></ul><h2>11.2 Roles &amp; relevant credentials</h2><ul><li><strong>For service organisations: </strong>CISA is the gold standard; ISO 27001 LI + SOC 2 hands-on experience is the common SRXLABS profile.</li><li><strong>For audit firms: </strong>CPA license is required to sign opinions in the US; ISACA's CISA is widely held by SOC 2 auditors.</li></ul><h2>11.3 Cheat sheet</h2><p><strong>5 TSC: Security (mandatory) + Availability/Confidentiality/Processing Integrity/Privacy. </strong>9 CC: CC1–9. Type I = design @ point in time; Type II = design + operation over a period. Report = 5 sections; opinion = unqualified/qualified/adverse/disclaimer. Subservice = carve-out vs inclusive; CUECs always listed.</p><div class=\"callout info\"><div class=\"callout-title\">Mastery check — you've mastered this module if you can…</div><p>1. Explain SOC 2 vs ISO 27001 to a CIO in two minutes.</p><p>2. Name the 5 TSC and decide which to include for a given client.</p><p>3. List the 9 Common Criteria and where exceptions concentrate.</p><p>4. Differentiate Type I, Type II, observation window, and sampling.</p><p>5. Define a CUEC and write three for a SaaS.</p><p>6. Build a 10-row control matrix mapping to both SOC 2 and ISO 27001.</p><p>7. Read a report opinion and triage findings as critical vs minor.</p></div>","sections":[{"id":"sec1","title":"1. What SOC 2 Is (Precisely)"},{"id":"sec2","title":"2. The Trust Services Criteria (TSC) in Depth"},{"id":"sec3","title":"3. Type I vs Type II and the Observation Window"},{"id":"sec4","title":"4. System Boundary, Subservice Organisations, and CUECs"},{"id":"sec5","title":"5. Anatomy of a SOC 2 Report"},{"id":"sec6","title":"6. Readiness Roadmap (How to Actually Get One)"},{"id":"sec7","title":"7. Real Exceptions, Case Studies, and Lessons"},{"id":"sec8","title":"8. SOC 2 ↔ ISO 27001 Crosswalk (Run One Programme)"},{"id":"sec9","title":"9. Hands-On Labs"},{"id":"sec10","title":"10. Interview / Sales Q&A"},{"id":"sec11","title":"11. Glossary, Certifications, and Next Steps"}]},{"id":"04","navTitle":"GDPR","title":"GDPR","subtitle":"EU General Data Protection Regulation","html":"<h1 id=\"sec1\">1. What GDPR Is and Why It Reaches India</h1><p><strong>The General Data Protection Regulation (GDPR)</strong> is the European Union's data-protection law, in force since 25 May 2018, replacing the 1995 Data Protection Directive. It governs the processing of <strong>personal data</strong> of individuals in the EU/EEA and is enforced by national supervisory authorities. Its fines — up to <strong>€20 million or 4% of global annual turnover, whichever is higher</strong> — made it the template that nearly every modern privacy law, including India's DPDPA, was modelled on. Master GDPR and the others become a smaller delta.</p><h2>1.1 Extraterritorial reach (Article 3) — the part Indian firms miss</h2><p>GDPR does not only bind EU companies. Article 3 extends it to any organisation, anywhere, that either offers goods or services to people in the EU (even free services), or monitors the behaviour of people in the EU (analytics, tracking, profiling). An Indian SaaS with EU customers, or an Indian site running EU-targeted ad-tracking, is in scope and may need to appoint an EU representative under Article 27. For SRXLABS this is a live, billable advisory area.</p><div class=\"callout info\"><div class=\"callout-title\">The chain of accountability</div><p>GDPR makes the data CONTROLLER accountable for compliance and able to DEMONSTRATE it (the accountability principle). A controller using a processor (e.g. a SaaS vendor) must bind that processor by contract (Article 28) and remains responsible. “Our vendor handles it” is not a defence; you must show you chose and bound them properly.</p></div><h2>1.2 Key definitions (precise, because they decide scope)</h2><ul><li><strong>Personal data: </strong>any
